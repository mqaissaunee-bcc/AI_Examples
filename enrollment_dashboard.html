    // shows everything this section would. Skipping it removes redundant noise.
    if (present.length === 1) {
      return '';
    }

    const inFilter = (r) =>
      (state.activeDisciplineFilter.size === 0 || state.activeDisciplineFilter.has(r._prefix)) &&
      (state.activeLocations.size === 0 || state.activeLocations.has(r.Location)) &&
      rowInFillBucket(r, state.fillBucket);

    const showBench = state.showBenchmarks;
    const cw = showBench ? collegeWideStats(snap) : null;

    // Build per-discipline rows, then filter out disciplines with zero
    // sections in the current filtered view. Otherwise the table fills
    // with noise rows like "AMSL: 0 sections, 0/0 enrolled, 0% fill, -37.6pp"
    // when a fill bucket like Full or Empty is active.
    const tableRows = present.map(p => {
      const rows = snap.rows.filter(r => r._prefix === p && inFilter(r));
      const prevRows = prevSnap ? prevSnap.rows.filter(r => r._prefix === p && inFilter(r)) : null;

      const sections = rows.length;
      const enrolled = sum(rows, 'Enrolled Students');
      const capacity = sum(rows, 'Capacity');
      const fill = capacity > 0 ? (enrolled / capacity * 100) : 0;

      return { p, rows, prevRows, sections, enrolled, capacity, fill };
    }).filter(d => d.sections > 0);

    if (tableRows.length === 0) {
      // Active filters eliminated every row — show a clear message instead
      // of an empty table
      return `<div class="section-title">By Discipline <span class="meta">no matches</span></div>
        <p style="color:var(--ink-mute);font-style:italic;padding:14px 0">No discipline has any sections matching the current filters.</p>`;
    }

    const renderedRows = tableRows.map(d => {
      const { p, rows, prevRows, sections, enrolled, capacity, fill } = d;

      let dFill = '';
      if (prevRows && prevRows.length > 0) {
        const ePrev = sum(prevRows, 'Enrolled Students');
        const cPrev = sum(prevRows, 'Capacity');
        const fPrev = cPrev > 0 ? (ePrev / cPrev * 100) : 0;
        dFill = miniDelta(fill - fPrev, 'pp', 1);
      }

      // vs. College only makes sense if this discipline has capacity to
      // compare. If capacity is 0 (e.g. all sections are placeholder-cap
      // independent study), suppress the delta — comparing 0% to the
      // college fill rate produces a misleading "-X.Xpp behind."
      const vsCollegeCell = (cw && capacity > 0)
        ? `<span class="ds-bench">${miniDelta(fill - cw.fill, 'pp', 1, 'Compared to the college-wide fill rate right now.')}</span>`
        : '<span style="color:var(--ink-mute)">—</span>';

      // Honest flag for fill > 100% from placeholder-capacity sections.
      // ACAD-089 independent study sections have cap=1, enr=7 → 700% fill.
      // The math is true but the display is confusing without context.
      const fillDisplay = fill > 200
        ? `<strong title="High fill % typically indicates placeholder-capacity sections (e.g., independent study) where ‘capacity’ is set to 1">${fill.toFixed(1)}%</strong>`
        : `<strong>${fill.toFixed(1)}%</strong>`;

      // Sparkline of total enrollment for this discipline across snapshots
      const enrSeries = state.snapshots.map(s =>
        sum(s.rows.filter(r => r._prefix === p && inFilter(r)), 'Enrolled Students')
      );
      const sparkCell = state.snapshots.length > 1
        ? renderSparkline(enrSeries, colorFor(p), 100, 22)
        : '<span style="color:var(--ink-mute)">—</span>';

      return `
        <tr>
          <td class="ds-disc"><span class="swatch" style="background:${colorFor(p)}"></span><strong>${escapeHtml(p)}</strong></td>
          <td class="right">${sections}</td>
          <td class="right">${enrolled} / ${capacity}</td>
          <td class="right">${fillDisplay} ${dFill}</td>
          <td class="right">${vsCollegeCell}</td>
          <td class="ds-trend">${sparkCell}</td>
        </tr>
      `;
    }).join('');

    return `
      <div class="section-title">By Discipline <span class="meta">${filteredRows().length} sections in view</span></div>
      <div class="discipline-table-wrap">
        <table class="discipline-table">
          <thead>
            <tr>
              <th>Discipline</th>
              <th class="right">Sections</th>
              <th class="right">Enrolled</th>
              <th class="right">Fill</th>
              <th class="right">vs. College</th>
              <th>Trend</th>
            </tr>
          </thead>
          <tbody>${renderedRows}</tbody>
        </table>
      </div>
    `;
  }

  function miniDelta(n, unit, dec, title) {
    const tt = title || (unit === 'pp'
      ? 'Change since the previous snapshot. "pp" = percentage points.'
      : 'Change since the previous snapshot.');
    if (n === 0 || isNaN(n)) return `<span class="flat" title="${escapeHtml(tt)}">—</span>`;
    const cls = n > 0 ? 'up' : 'down';
    const sign = n > 0 ? '+' : '';
    const v = dec ? n.toFixed(dec) : n.toLocaleString();
    return `<span class="${cls}" title="${escapeHtml(tt)}">${sign}${v}${unit || ''}</span>`;
  }

  /* =========================================================================
   * SPARKLINES (inline SVG)
   * ========================================================================= */

  function renderSparkline(series, color, w, h) {
    if (!series || series.length === 0) return '';
    if (series.length === 1) {
      return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
        <circle cx="${w/2}" cy="${h/2}" r="2.5" fill="${color}"/>
      </svg>`;
    }
    const max = Math.max(...series, 1);
    const min = Math.min(...series, 0);
    const pad = 4;
    const range = max - min || 1;
    const step = (w - 2 * pad) / (series.length - 1);
    const points = series.map((v, i) => {
      const x = pad + i * step;
      const y = pad + (h - 2 * pad) * (1 - (v - min) / range);
      return [x, y];
    });
    const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
    const lastPt = points[points.length - 1];
    // Light area fill
    const areaPath = path + ` L${lastPt[0]},${h - pad} L${pad},${h - pad} Z`;
    return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      <path d="${areaPath}" fill="${color}" opacity="0.12"/>
      <path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${lastPt[0].toFixed(1)}" cy="${lastPt[1].toFixed(1)}" r="2.5" fill="${color}"/>
    </svg>`;
  }

  /* =========================================================================
   * COURSE CARDS
   * ========================================================================= */

  // Smart default for whether a discipline's cards should be expanded.
  // Default is COLLAPSED for all disciplines — the dashboard now opens
  // with a tidy list of discipline headers, and users explicitly choose
  // which to expand. Per-discipline explicit choices in state.cardExpansion
  // override this default; they persist across sessions via localStorage.
  function isDisciplineExpanded(prefix, sectionCount) {
    if (Object.prototype.hasOwnProperty.call(state.cardExpansion, prefix)) {
      return state.cardExpansion[prefix];
    }
    return false;
  }

  // Render a single section card. Extracted so we can call it per-discipline.
  function renderSectionCard(r) {
    const fill = r['Section Fill %'];
    const fillCapped = Math.min(100, fill);
    const tags = [];
    if (fill >= 100) tags.push('<span class="tag full">● At Capacity</span>');
    else if (r['Enrolled Students'] === 0) tags.push('<span class="tag empty">● Empty</span>');
    if (r['Wait List'] > 0) tags.push(`<span class="tag wait">+${r['Wait List']} waitlist</span>`);

    const days = cleanCell(r['Meeting Days'], '—');
    const time = cleanCell(r['Section Start Time'], 'TBA');
    const instructor = cleanCell(r.Instructor, 'TBA');
    const color = colorFor(r._prefix);

    const hist = sectionHistory(r.Section);
    const enrSeries = hist.map(h => h.row ? h.row['Enrolled Students'] : null).filter(v => v !== null);
    const showSpark = enrSeries.length >= 2;

    const prevSnap = previousSnapshot();
    let velocity = '';
    if (prevSnap) {
      const prevRow = prevSnap.rows.find(x => x.Section === r.Section);
      if (prevRow) {
        const diff = r['Enrolled Students'] - prevRow['Enrolled Students'];
        velocity = diff === 0
          ? '<span class="v-flat">no change</span>'
          : diff > 0
            ? `<span class="v-up">+${diff} since ${fmtDateShort(prevSnap.date)}</span>`
            : `<span class="v-down">${diff} since ${fmtDateShort(prevSnap.date)}</span>`;
      } else {
        velocity = '<span class="v-flat">new section</span>';
      }
    }

    return `
      <div class="course-card" style="border-left-color:${color}">
        <div class="cc-head">
          <span class="code">${escapeHtml(r.Section)}</span>
          <span class="loc">${escapeHtml(r.Location || '—')}</span>
        </div>
        <div class="title">${escapeHtml(r['Course Title'] || '')}</div>
        <div class="meter"><div class="fill" style="width:${fillCapped}%;background:${color}"></div></div>
        <div class="num-row">
          <span><strong>${r['Enrolled Students']}</strong> / ${r.Capacity} enrolled</span>
          <span><strong>${fill.toFixed(0)}%</strong></span>
        </div>
        <div class="delta-row">
          <span>${velocity}</span>
          ${showSpark ? renderSparkline(enrSeries, color, 90, 22) : ''}
        </div>
        <div class="meta-row">
          <span>${escapeHtml(days)} · ${escapeHtml(time)}</span>
          <span>${escapeHtml(instructor)}</span>
          ${tags.length ? '<span style="flex-basis:100%;margin-top:4px">' + tags.join(' &nbsp; ') + '</span>' : ''}
        </div>
      </div>
    `;
  }

  function renderCourseGrid() {
    const allRows = filteredRows();

    if (allRows.length === 0) {
      return `<div class="section-title">Sections at a Glance</div>
        <p style="color:var(--ink-mute);font-style:italic;padding:14px 0">No sections match the current filters.</p>`;
    }

    // Group rows by discipline prefix
    const byPrefix = {};
    allRows.forEach(r => {
      if (!byPrefix[r._prefix]) byPrefix[r._prefix] = [];
      byPrefix[r._prefix].push(r);
    });

    // Sort prefixes alphabetically; sort rows within each group by section code
    const prefixes = Object.keys(byPrefix).sort();
    prefixes.forEach(p => byPrefix[p].sort((a, b) => String(a.Section).localeCompare(String(b.Section))));

    // Render one section per discipline with a collapsible header
    const groups = prefixes.map(prefix => {
      const sections = byPrefix[prefix];
      const expanded = isDisciplineExpanded(prefix, sections.length);
      const color = colorFor(prefix);
      const totalEnrolled = sum(sections, 'Enrolled Students');
      const totalCapacity = sum(sections, 'Capacity');
      const groupFill = totalCapacity > 0 ? (totalEnrolled / totalCapacity * 100) : 0;

      // Trace shows summary even when collapsed
      const arrow = expanded ? '▼' : '▶';
      const trace = expanded
        ? `<span class="discipline-meta">${sections.length} section${sections.length === 1 ? '' : 's'} · ${totalEnrolled} / ${totalCapacity} enrolled · ${groupFill.toFixed(0)}% fill</span>`
        : `<span class="discipline-meta collapsed-trace">${sections.length} section card${sections.length === 1 ? '' : 's'} (click to show) · ${totalEnrolled} / ${totalCapacity} enrolled · ${groupFill.toFixed(0)}% fill</span>`;

      const cardsHtml = expanded
        ? `<div class="course-grid">${sections.map(renderSectionCard).join('')}</div>`
        : '';

      return `
        <div class="discipline-group">
          <button class="discipline-header" data-toggle-discipline="${escapeHtml(prefix)}" aria-expanded="${expanded}">
            <span class="dh-arrow">${arrow}</span>
            <span class="dh-swatch" style="background:${color}"></span>
            <span class="dh-label">${escapeHtml(prefix)}</span>
            ${trace}
          </button>
          ${cardsHtml}
        </div>
      `;
    }).join('');

    // Determine the bulk-toggle button label. If any discipline is currently
    // expanded, the button collapses everything. If everything is already
    // collapsed, the button expands everything. Button label flips based on
    // the current state so it's always actionable.
    const anyExpanded = prefixes.some(p => isDisciplineExpanded(p, byPrefix[p].length));
    const bulkLabel = anyExpanded ? 'Collapse all' : 'Expand all';
    const bulkAction = anyExpanded ? 'collapse' : 'expand';
    const bulkTooltip = anyExpanded
      ? 'Collapse every discipline card group'
      : 'Expand every discipline card group';

    return `
      <div class="section-title">
        Sections at a Glance
        <span class="meta">click a discipline to expand or collapse its cards</span>
        <button type="button" class="bulk-toggle" id="bulkDisciplineToggle" data-bulk-action="${bulkAction}" title="${escapeHtml(bulkTooltip)}">${bulkLabel}</button>
      </div>
      ${groups}
    `;
  }

  function cleanCell(v, fallback) {
    if (v == null) return fallback;
    const s = String(v).trim();
    if (!s || s === ',' || s === ',,') return fallback;
    return s;
  }

  // ----- Section table search helpers (used by both list and grouped views) -----
  // Brookdale day codes. R is an alias for TH in some academic conventions;
  // we normalize both to "TH" internally.
  const DAY_CODES = new Set(['M', 'T', 'W', 'TH', 'F', 'S']);
  function isDayToken(raw) {
    const upper = String(raw).toUpperCase();
    if (upper === 'R') return 'TH';
    return DAY_CODES.has(upper) ? upper : null;
  }

  // Parse a Meeting Days string into a Set of canonical day codes.
  function parseDays(raw) {
    const codes = new Set();
    if (!raw) return codes;
    const tokens = String(raw).toUpperCase().split(/[^A-Z]+/).filter(Boolean);
    for (const tok of tokens) {
      if (DAY_CODES.has(tok)) codes.add(tok);
      else if (tok === 'R') codes.add('TH');
      else {
        let i = 0;
        while (i < tok.length) {
          if (tok.slice(i, i + 2) === 'TH') { codes.add('TH'); i += 2; continue; }
          const c = tok[i];
          if (DAY_CODES.has(c)) codes.add(c);
          else if (c === 'R') codes.add('TH');
          i += 1;
        }
      }
    }
    return codes;
  }

  const normCompact = (s) =>
    String(s == null ? '' : s).toLowerCase().replace(/[\s\-_,./()\[\]]+/g, '');

  const normPhrase = (s) =>
    String(s == null ? '' : s).toLowerCase().replace(/[\s\-_,./()\[\]]+/g, ' ').trim();

  function parseSearchTokens(input) {
    const tokens = [];
    const re = /"([^"]*)"|(\S+)/g;
    let m;
    while ((m = re.exec(input)) !== null) {
      if (m[1] !== undefined) {
        const phrase = normPhrase(m[1]);
        if (phrase) tokens.push({ kind: 'phrase', value: phrase });
      } else if (m[2] !== undefined) {
        const dayCode = isDayToken(m[2]);
        if (dayCode) {
          tokens.push({ kind: 'day', value: dayCode });
        } else {
          const word = normCompact(m[2]);
          if (word) tokens.push({ kind: 'word', value: word });
        }
      }
    }
    return tokens;
  }

  function sectionMatchesAllTokens(row, tokens) {
    if (tokens.length === 0) return true;
    const raw = [
      row.Section, row['Course Title'], row.Location, row['Meeting Days'],
      row['Section Start Time'], row.Instructor, row.Course,
    ].join(' ');
    const compact = normCompact(raw);
    const phrase = normPhrase(raw);
    const days = parseDays(row['Meeting Days']);
    return tokens.every(t => {
      if (t.kind === 'phrase') return phrase.includes(t.value);
      if (t.kind === 'day') return days.has(t.value);
      return compact.includes(t.value);
    });
  }

  function sectionHistory(sectionCode) {
    return state.snapshots.map(s => ({
      date: s.date,
      row: s.rows.find(r => r.Section === sectionCode) || null,
    }));
  }

  /* =========================================================================
   * TABLE
   * ========================================================================= */

  function renderTable() {
    // When Empty or Full bucket is active AND grouped view is on, render the
    // course-grouped panel display instead of the per-section row table.
    // The grouped view consolidates redundant alternative listings (e.g. for
    // MATH-021's 8 empty sections, alternatives are shown once instead of 8
    // times). Other buckets always use the list view.
    if (state.groupedView && (state.fillBucket === 'empty' || state.fillBucket === 'full')) {
      return renderTableGrouped();
    }

    const headers = [
      { k: 'Section', label: 'Section' },
      { k: 'Course Title', label: 'Title' },
      { k: 'Location', label: 'Loc' },
      { k: 'Capacity', label: 'Cap', right: true },
      { k: 'Enrolled Students', label: 'Enr', right: true },
      { k: '_delta', label: 'Δ Enr', right: true },
      { k: 'Section Fill %', label: 'Fill %', right: true },
      { k: 'Wait List', label: 'Wait', right: true },
      { k: 'Course Credit', label: 'Cr', right: true },
      { k: 'Total Student Credit Hours', label: 'SCH', right: true },
      { k: 'Meeting Days', label: 'Days' },
      { k: 'Section Start Time', label: 'Time' },
      { k: 'Instructor', label: 'Instructor' },
    ];

    const prevSnap = previousSnapshot();
    const prevByCode = {};
    if (prevSnap) prevSnap.rows.forEach(r => { prevByCode[r.Section] = r; });

    const enriched = filteredRows().map(r => ({
      ...r,
      _delta: prevByCode[r.Section] != null
        ? (r['Enrolled Students'] - prevByCode[r.Section]['Enrolled Students'])
        : null,
    }));

    // Apply free-text search across text-bearing columns.
    //
    // Semantics:
    //   1. Each whitespace-separated word is its own ANDed search term.
    //      "ENGI 101 LINC" => find rows containing "engi" AND "101" AND "linc".
    //   2. Quoted phrases are treated as a single term, preserving any spaces.
    //      'powell "Calculus I"' => name "powell" AND literal phrase "calculus i".
    //   3. Both the query and the haystack are normalized by lowercasing and
    //      collapsing all whitespace/punctuation to nothing for compact matching.
    //      So "M,W" in the data is matched as "mw"; the user typing "MW" finds it.
    //      The section code "ENGI-101-001RL" is matched as "engi101001rl", and
    //      a search for "engi 101" splits into "engi" + "101", both of which
    //      appear in the normalized haystack.
    //   4. Inside quoted phrases, internal spaces ARE preserved (other
    //      separators still get collapsed). So "Calculus I" matches "Calculus I"
    //      and "Calculus-I" but treats the space between Calculus and I as
    //      a single space.
    //   5. Day code tokens (M, T, W, TH, F, S, and R as alias for TH) are
    //      treated specially: they match only against the Meeting Days field,
    //      so "M W" means "section meets on both Monday AND Wednesday" rather
    //      than "row contains the letter m AND the letter w somewhere."
    //
    // Implementation note: the search helpers (parseSearchTokens,
    // sectionMatchesAllTokens, parseDays, etc.) are defined at module scope
    // so the grouped view (renderTableGrouped) can use them too.

    const tokens = parseSearchTokens(state.tableSearch);

    const searched = tokens.length === 0
      ? enriched
      : enriched.filter(r => sectionMatchesAllTokens(r, tokens));

    const sorted = searched.slice().sort((a, b) => {
      let av = a[state.sortKey], bv = b[state.sortKey];
      if (av === null) av = -Infinity; if (bv === null) bv = -Infinity;
      if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * state.sortDir;
      av = String(av || ''); bv = String(bv || '');
      return av.localeCompare(bv) * state.sortDir;
    });

    // Sibling map: Course code -> all sections of that course (in current snapshot).
    // Used when a fill-status bucket is active to surface context the filter hides:
    // "this section is full — are there alternative sections?" or
    // "this section is empty — is it the only one, or can students go elsewhere?"
    const showSiblings = state.fillBucket !== 'all';
    const snapNow = currentSnapshot();
    const siblingsByCourse = {};
    if (showSiblings && snapNow) {
      snapNow.rows.forEach(row => {
        if (!siblingsByCourse[row.Course]) siblingsByCourse[row.Course] = [];
        siblingsByCourse[row.Course].push(row);
      });
    }

    // Test whether a sibling row would have been visible under the user's
    // current scope (selected disciplines, sub-filters, location). If not,
    // we tag it as "outside scope" in the display.
    const isInScope = (r) => {
      if (!state.selectedDisciplines.has(r._prefix)) return false;
      if (state.activeDisciplineFilter.size > 0 && !state.activeDisciplineFilter.has(r._prefix)) return false;
      if (state.activeLocations.size > 0 && !state.activeLocations.has(r.Location)) return false;
      return true;
    };

    // Build the sibling indicator HTML for a given row, or '' if none
    function renderSiblingIndicator(row) {
      const allSections = siblingsByCourse[row.Course] || [];
      const allSiblings = allSections.filter(s => s.Section !== row.Section);
      const totalSectionsOfCourse = allSections.length;

      // No other sections at all — high-stakes flag (especially for "empty" view,
      // where cancelling this section would kill the course for the term)
      if (allSiblings.length === 0) {
        return `<div class="sibling-row warn" title="No other sections of this course exist in this snapshot">⚠ Only section of ${escapeHtml(row.Course)}</div>`;
      }

      // Filter to "useful" siblings based on the active bucket.
      // The principle: show alternatives, summarize non-alternatives.
      //
      //   Full bucket   -> useful sibling = one with available seats
      //                    (a full sibling isn't an answer to "where do extras go")
      //   Empty bucket  -> useful sibling = one with any enrollment
      //                    (an empty sibling doesn't help absorb students;
      //                     it's just another section in trouble)
      //   Almost/Under  -> useful sibling = one with seats
      //                    (people viewing these are still capacity-planning)
      //   All bucket    -> shouldn't reach here (siblings hidden in 'all' view)
      const bucket = state.fillBucket;
      let isUseful;
      let principle;
      if (bucket === 'empty') {
        isUseful = (s) => (Number(s['Enrolled Students']) || 0) > 0;
        principle = 'with enrollment';
      } else {
        // full, almost, under: show siblings that can absorb students
        isUseful = (s) => {
          const cap = Number(s.Capacity) || 0;
          const enr = Number(s['Enrolled Students']) || 0;
          return cap > enr;
        };
        principle = 'with available seats';
      }

      const useful = allSiblings.filter(isUseful);
      const uselessCount = allSiblings.length - useful.length;

      // No useful alternatives — flag it prominently
      if (useful.length === 0) {
        const tot = totalSectionsOfCourse;
        let warningText;
        if (bucket === 'empty') {
          warningText = `⚠ All ${tot} sections of ${escapeHtml(row.Course)} are empty`;
        } else {
          warningText = `⚠ No alternatives — all ${tot} sections of ${escapeHtml(row.Course)} are full`;
        }
        return `<div class="sibling-row warn">${warningText}</div>`;
      }

      // Render useful siblings; show a small note about hidden non-alternatives
      const items = useful.map(s => {
        const sEnr = Number(s['Enrolled Students']) || 0;
        const sCap = Number(s.Capacity) || 0;
        const seats = Math.max(0, sCap - sEnr);
        const outOfScope = !isInScope(s);
        // Pick a CSS class based on the sibling's own state
        const sFill = Number(s['Section Fill %']) || 0;
        const cls = sEnr === 0 ? 'sib-empty' : sFill >= 100 ? 'sib-full' : 'sib-available';
        const scopeTag = outOfScope ? ` <span class="sib-scope">${escapeHtml(s.Location || '?')}</span>` : '';
        const seatsHtml = bucket === 'empty'
          ? ` <em>(${sEnr} enrolled)</em>`
          : seats > 0 ? ` <em>(${seats} open)</em>` : '';
        return `<span class="sib ${cls}"><strong>${escapeHtml(s.Section.split('-').slice(-1)[0] || s.Section)}</strong> ${sEnr}/${sCap}${seatsHtml}${scopeTag}</span>`;
      }).join(' ');

      const usefulNoun = useful.length === 1 ? 'alternative' : 'alternatives';
      let label = `${useful.length} ${usefulNoun} of ${escapeHtml(row.Course)} ${principle}:`;
      if (uselessCount > 0) {
        const otherWord = bucket === 'empty' ? 'also empty' : 'also full';
        label += ` <span class="sib-note">(${uselessCount} other section${uselessCount === 1 ? '' : 's'} ${otherWord})</span>`;
      }

      return `<div class="sibling-row">${label} ${items}</div>`;
    }

    const rows = sorted.map(r => {
      const fill = r['Section Fill %'];
      const fillBadge =
        fill >= 100 ? `<span class="badge full">FULL</span>` :
        fill >= 75 ? `<span class="badge high">${fill.toFixed(0)}%</span>` :
        r['Enrolled Students'] === 0 ? `<span class="badge zero">0%</span>` :
        `<span class="badge low">${fill.toFixed(0)}%</span>`;
      const days = cleanCell(r['Meeting Days'], '—');
      const time = cleanCell(r['Section Start Time'], '—');
      const instructor = cleanCell(r.Instructor, '');
      const fillCapped = Math.min(100, fill);
      const color = colorFor(r._prefix);

      let deltaCell = '<span style="color:var(--ink-mute)">—</span>';
      if (r._delta != null) {
        if (r._delta === 0) deltaCell = '<span class="delta-cell flat">0</span>';
        else if (r._delta > 0) deltaCell = `<span class="delta-cell up">+${r._delta}</span>`;
        else deltaCell = `<span class="delta-cell down">${r._delta}</span>`;
      } else if (prevSnap) {
        deltaCell = '<span style="color:var(--ink-mute);font-style:italic">new</span>';
      }

      const siblingHTML = showSiblings ? renderSiblingIndicator(r) : '';

      return `
        <tr>
          <td style="border-left:3px solid ${color}"><strong>${escapeHtml(r.Section)}</strong>${siblingHTML}</td>
          <td>${escapeHtml(r['Course Title'] || '')}</td>
          <td>${escapeHtml(r.Location || '')}</td>
          <td class="right">${r.Capacity}</td>
          <td class="right">${r['Enrolled Students']}</td>
          <td class="right">${deltaCell}</td>
          <td class="right"><span class="mini-meter"><span class="mf" style="width:${fillCapped}%;background:${color}"></span></span>${fillBadge}</td>
          <td class="right">${r['Wait List'] || ''}</td>
          <td class="right">${r['Course Credit']}</td>
          <td class="right">${r['Total Student Credit Hours']}</td>
          <td>${escapeHtml(days)}</td>
          <td>${escapeHtml(time)}</td>
          <td>${escapeHtml(instructor) || '<em style="color:var(--ink-mute)">TBA</em>'}</td>
        </tr>
      `;
    }).join('');

    const arrow = (k) => state.sortKey === k ? `<span class="arrow">${state.sortDir === 1 ? '▲' : '▼'}</span>` : '';

    // Whether the user has typed something into the search box (active search)
    const hasActiveSearch = tokens.length > 0;

    // Choose an appropriate empty-state message based on cause
    const emptyMessage = searched.length === 0
      ? (hasActiveSearch
          ? `No sections match "${escapeHtml(state.tableSearch)}".`
          : 'No sections match the current filters.')
      : null;

    // Match count display: only shown when searching
    const matchCount = hasActiveSearch
      ? `<span class="search-count">${searched.length} of ${enriched.length}</span>`
      : '';

    return `
      <div class="section-title">Full Section Detail <span class="meta">click any column to sort</span></div>
      <div class="table-toolbar">
        <div class="table-search">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input
            type="text"
            id="tableSearchInput"
            class="search-input"
            placeholder='Search — try "ENGI 101 LINC" or "Powell M W" or "MATH T TH"'
            value="${escapeHtml(state.tableSearch)}"
            autocomplete="off"
            spellcheck="false">
          ${state.tableSearch ? '<button class="search-clear" id="tableSearchClear" type="button" aria-label="Clear search">×</button>' : ''}
        </div>
        ${matchCount}
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              ${headers.map(h => `<th data-sort="${h.k}" class="${h.right ? 'right' : ''}">${h.label}${arrow(h.k)}</th>`).join('')}
            </tr>
          </thead>
          <tbody>${rows || `<tr><td colspan="13" style="text-align:center;padding:24px;color:var(--ink-mute);font-style:italic">${emptyMessage}</td></tr>`}</tbody>
        </table>
      </div>
    `;
  }

  /* =========================================================================
   * TABLE — GROUPED VIEW (Empty and Full buckets only)
   *
   * Consolidates the per-section sibling display into a per-course panel.
   * Instead of repeating MATH-021's 25 alternatives once for each of its 8
   * empty sections, we show the empty sections together and the alternatives
   * once underneath.
   * ========================================================================= */

  function renderTableGrouped() {
    const snap = currentSnapshot();
    if (!snap) {
      return `<div class="section-title">Full Section Detail</div>
        <p style="color:var(--ink-mute);padding:14px 0;font-style:italic">No snapshot loaded.</p>`;
    }

    const bucket = state.fillBucket;  // 'empty' or 'full'
    const prevSnap = previousSnapshot();
    const prevByCode = {};
    if (prevSnap) prevSnap.rows.forEach(r => { prevByCode[r.Section] = r; });

    // Get the filtered rows (respects discipline/location/sub-filter selection
    // AND the active fill bucket). These are the "triggered" sections — what
    // the user is currently filtering to.
    const triggered = filteredRows();

    // Apply table search if present (same logic as list view)
    const tokens = parseSearchTokens(state.tableSearch);
    const searched = tokens.length > 0
      ? triggered.filter(r => sectionMatchesAllTokens(r, tokens))
      : triggered;

    if (searched.length === 0) {
      const hasActiveSearch = tokens.length > 0;
      const emptyMessage = hasActiveSearch
        ? `No sections match "${escapeHtml(state.tableSearch)}".`
        : `No sections match the current filters.`;
      return `${renderTableToolbar(triggered.length, searched.length, hasActiveSearch)}
        <p style="color:var(--ink-mute);padding:24px;font-style:italic;text-align:center">${emptyMessage}</p>`;
    }

    // Group triggered sections by course code (e.g. "MATH-021", "ENGL-121")
    const byCourse = {};
    searched.forEach(r => {
      if (!byCourse[r.Course]) byCourse[r.Course] = [];
      byCourse[r.Course].push(r);
    });

    // Sort courses alphabetically. Predictable position is more valuable
    // than "biggest problem first" — chairs looking for a specific course
    // (e.g., "where's BIOL-112?") want to know exactly where to find it.
    const courseOrder = Object.keys(byCourse).sort((a, b) => a.localeCompare(b));

    // For each course, also collect ALL sections from the snapshot (not just
    // the triggered ones), so we can show alternatives.
    const allSectionsByCourse = {};
    snap.rows.forEach(r => {
      if (!allSectionsByCourse[r.Course]) allSectionsByCourse[r.Course] = [];
      allSectionsByCourse[r.Course].push(r);
    });

    // Determine "useful alternative" predicate based on bucket.
    //
    //   Empty bucket -> alternative = has enrollment AND open seats.
    //     The "has enrollment" part rules out other empty siblings (which
    //     don't help absorb students). The "open seats" part rules out
    //     siblings that are already full — a 23/23 section has zero room
    //     to redirect students to, even though it's nominally a sibling.
    //
    //   Full bucket  -> alternative = has open seats.
    //     Same logic from the other direction: full siblings don't help.
    const isAlternative = (s) => {
      const enr = Number(s['Enrolled Students']) || 0;
      const cap = Number(s.Capacity) || 0;
      const hasOpenSeats = cap > enr;
      if (bucket === 'empty') return enr > 0 && hasOpenSeats;
      // bucket === 'full'
      return hasOpenSeats;
    };

    // Render one course panel
    const panels = courseOrder.map(courseCode => {
      const triggeredSections = byCourse[courseCode];
      const allSections = allSectionsByCourse[courseCode] || [];
      const alternatives = allSections.filter(s =>
        !triggeredSections.some(t => t.Section === s.Section) && isAlternative(s)
      );
      const courseTitle = triggeredSections[0]['Course Title'] || '';
      const prefix = triggeredSections[0]._prefix;
      const color = colorFor(prefix);

      // Stats for the course header
      const totalSections = allSections.length;
      const triggeredCount = triggeredSections.length;
      const enrolledCount = allSections.filter(s => (Number(s['Enrolled Students']) || 0) > 0).length;
      const totalWait = sum(allSections, 'Wait List');

      const courseStats = bucket === 'empty'
        ? `<strong>${triggeredCount}</strong> of ${totalSections} section${totalSections === 1 ? '' : 's'} empty · <strong>${enrolledCount}</strong> with enrollment`
        : `<strong>${triggeredCount}</strong> of ${totalSections} section${totalSections === 1 ? '' : 's'} at/over capacity${totalWait > 0 ? ` · <strong>${totalWait}</strong> students waitlisted` : ''}`;

      // Waitlist callout for full bucket. Includes day-summary alongside
      // each section so chairs can see at a glance whether a schedule
      // mismatch might be why students aren't switching to an alternative.
      let waitlistCallout = '';
      if (bucket === 'full' && totalWait > 0) {
        const withWait = triggeredSections
          .filter(s => (Number(s['Wait List']) || 0) > 0)
          .sort((a, b) => (Number(b['Wait List']) || 0) - (Number(a['Wait List']) || 0));
        if (withWait.length > 0) {
          const parts = withWait.map(s => {
            const w = Number(s['Wait List']) || 0;
            const code = s.Section.split('-').slice(-1)[0] || s.Section;
            const days = cleanCell(s['Meeting Days'], '');
            const time = cleanCell(s['Section Start Time'], '');
            const schedule = (days || time)
              ? ` <span class="cg-callout-schedule">${escapeHtml(days)}${days && time ? ' ' : ''}${escapeHtml(time)}</span>`
              : '';
            return `${escapeHtml(code)} (${w})${schedule}`;
          }).join(', ');
          waitlistCallout = `<div class="cg-waitlist-callout">⚠ <strong>Unmet demand:</strong> Waitlists on ${parts}</div>`;
        }
      }

      // Placeholder-capacity note for fill > 200% (e.g. ACAD-089 with cap=1)
      let placeholderNote = '';
      if (bucket === 'full') {
        const allOverFill = triggeredSections.every(s => {
          const enr = Number(s['Enrolled Students']) || 0;
          const cap = Number(s.Capacity) || 0;
          return cap > 0 && (enr / cap) > 2;
        });
        if (allOverFill && triggeredSections.length > 0) {
          placeholderNote = `<div class="cg-placeholder-note">ℹ <strong>Note:</strong> Sections show very high fill percentages, likely due to placeholder-capacity convention (e.g., capacity of 1 for independent study). Decisions here differ from regular capacity decisions.</div>`;
        }
      }

      // Render triggered sections (compact rows). When the user has
      // explicitly expanded this course's triggered list, show all of them;
      // otherwise truncate after 6 with a "show all" toggle.
      const MAX_TRIGGERED_INLINE = 8;
      const triggeredExpansionKey = `${courseCode}:triggered`;
      const triggeredExpanded = state.groupedExpansion[triggeredExpansionKey] === true;
      const naturallyFits = triggeredSections.length <= MAX_TRIGGERED_INLINE;
      const showAllTriggered = triggeredExpanded || naturallyFits;
      const triggeredVisible = showAllTriggered ? triggeredSections : triggeredSections.slice(0, 6);

      const triggeredRowsHTML = triggeredVisible.map(s => {
        const sectionCode = s.Section.split('-').slice(-1)[0] || s.Section;
        const days = cleanCell(s['Meeting Days'], '—');
        const time = cleanCell(s['Section Start Time'], 'TBA');
        const instructor = cleanCell(s.Instructor, '');
        const instructorHTML = instructor
          ? escapeHtml(instructor)
          : '<span class="cg-instr-tba">TBA</span>';
        const enr = Number(s['Enrolled Students']) || 0;
        const cap = Number(s.Capacity) || 0;
        const wait = Number(s['Wait List']) || 0;
        const fillPct = cap > 0 ? (enr / cap * 100) : 0;
        const formatTag = formatTagFor(s);

        if (bucket === 'empty') {
          return `
            <div class="cg-triggered-row cg-row-empty">
              <span class="code">${escapeHtml(sectionCode)}</span>
              <span>${formatTag}</span>
              <span>${escapeHtml(days)}</span>
              <span>${escapeHtml(time)}</span>
              <span>${instructorHTML}</span>
            </div>
          `;
        } else {
          // Full bucket: show fill % and waitlist alongside day/time so
          // chairs can see *why* students might not be switching to an
          // open alternative ("the full section meets MWF at 10am but the
          // alternative is M only at 4pm — schedule mismatch")
          const waitCell = wait > 0
            ? `<span style="color:var(--warn);font-weight:600">${wait} waiting</span>`
            : '<span style="color:var(--ink-mute)">—</span>';
          return `
            <div class="cg-triggered-row cg-row-full">
              <span class="code">${escapeHtml(sectionCode)}</span>
              <span>${formatTag}</span>
              <span>${enr}/${cap} (${fillPct.toFixed(0)}%)</span>
              <span>${waitCell}</span>
              <span>${escapeHtml(days)}</span>
              <span>${escapeHtml(time)}</span>
              <span>${instructorHTML}</span>
            </div>
          `;
        }
      }).join('');

      const triggeredHeaderRow = bucket === 'empty'
        ? `<div class="cg-triggered-row cg-row-empty cg-row-header">
            <span class="code">Section</span><span>Format</span><span>Days</span><span>Time</span><span>Instructor</span>
          </div>`
        : `<div class="cg-triggered-row cg-row-full cg-row-header">
            <span class="code">Section</span><span>Format</span><span>Fill</span><span>Waitlist</span><span>Days</span><span>Time</span><span>Instructor</span>
          </div>`;

      // Build the "show all / collapse" toggle (only when truncating could apply)
      let triggeredTruncatedMsg = '';
      if (!naturallyFits) {
        triggeredTruncatedMsg = triggeredExpanded
          ? `<div class="cg-truncation-note"><button type="button" class="cg-toggle-link" data-grouped-toggle="${escapeHtml(triggeredExpansionKey)}">show fewer</button></div>`
          : `<div class="cg-truncation-note">Showing first 6 of ${triggeredSections.length} · <button type="button" class="cg-toggle-link" data-grouped-toggle="${escapeHtml(triggeredExpansionKey)}">show all</button></div>`;
      }

      const triggeredPanel = `
        <div class="cg-triggered-sections">
          <div class="cg-panel-label">${bucket === 'empty' ? 'Empty sections' : 'Full sections'} (${triggeredSections.length})</div>
          ${triggeredHeaderRow}
          ${triggeredRowsHTML}
          ${triggeredTruncatedMsg}
        </div>
      `;

      // Render alternatives — split into priority (50%+ full) and more-room
      let alternativesPanel = '';
      if (alternatives.length === 0) {
        // The warning text adapts based on whether this course has just one
        // section or multiple. With one section, there's nothing to say about
        // "course-level problems" or "intervention" — it's just that the only
        // section is empty/full. With multiple sections all in the same state,
        // the broader "this is a course-level concern" framing is genuine and
        // worth surfacing.
        let warningText;
        if (totalSections === 1) {
          warningText = bucket === 'empty'
            ? `⚠ <strong>The only section of ${escapeHtml(courseCode)} is empty.</strong>`
            : `⚠ <strong>The only section of ${escapeHtml(courseCode)} is at or over capacity.</strong>`;
        } else {
          warningText = bucket === 'empty'
            ? `⚠ <strong>No in-course alternatives</strong> — all ${totalSections} sections of ${escapeHtml(courseCode)} are empty. This suggests a course-level enrollment problem, not a section-specific one. Cancellation or marketing-side intervention may be needed at the course level.`
            : `⚠ <strong>No in-course alternatives</strong> — all ${totalSections} sections of ${escapeHtml(courseCode)} are at or over capacity. Consider opening additional sections; redirecting waitlisted students within this course is not possible.`;
        }
        alternativesPanel = `<div class="cg-alternatives"><div class="cg-no-alts-warning">${warningText}</div></div>`;
      } else {
        // Merge all alternatives into a single list sorted by fill descending.
        // Rows that are 50%+ full retain a subtle green-tinted background as
        // a visual leverage cue, but the explicit grouping headings are gone —
        // the fill bar plus the row tint communicates the same thing without
        // editorial labels.
        const sortedAlts = alternatives.slice().sort((a, b) => {
          const fa = Number(a['Section Fill %']) || 0;
          const fb = Number(b['Section Fill %']) || 0;
          return fb - fa;
        });

        function renderAltRow(s) {
          const sectionCode = s.Section.split('-').slice(-1)[0] || s.Section;
          const enr = Number(s['Enrolled Students']) || 0;
          const cap = Number(s.Capacity) || 0;
          const fillPct = cap > 0 ? (enr / cap * 100) : 0;
          const isPriority = fillPct >= 50;
          const open = Math.max(0, cap - enr);
          const days = cleanCell(s['Meeting Days'], '—');
          const time = cleanCell(s['Section Start Time'], 'TBA');
          const instructor = cleanCell(s.Instructor, '');
          const instructorHTML = instructor ? escapeHtml(instructor) : '<span class="cg-instr-tba">TBA</span>';
          const formatTag = formatTagFor(s);
          const fillBarWidth = Math.min(100, fillPct);
          const overCap = fillPct > 100;
          return `
            <div class="cg-alt-row ${isPriority ? 'priority' : ''}">
              <span class="code">${escapeHtml(sectionCode)}</span>
              <span><span class="cg-fill-bar"><span class="cg-fill-bar-inner ${overCap ? 'over' : ''}" style="width:${fillBarWidth}%"></span></span> ${enr}/${cap}</span>
              <span class="right cg-open">${open}</span>
              <span>${formatTag}</span>
              <span>${escapeHtml(days)}</span>
              <span>${escapeHtml(time)} · ${instructorHTML}</span>
            </div>
          `;
        }

        // Truncate long lists; per-course expansion state persists the toggle
        const MAX_ALTS_VISIBLE = 8;
        const altKey = `${courseCode}:alts`;
        const altsExpanded = state.groupedExpansion[altKey] === true;
        const visibleAlts = altsExpanded ? sortedAlts : sortedAlts.slice(0, MAX_ALTS_VISIBLE);
        const remaining = sortedAlts.length - visibleAlts.length;

        let truncationMsg = '';
        if (altsExpanded && sortedAlts.length > MAX_ALTS_VISIBLE) {
          truncationMsg = `<div class="cg-truncation-note"><button type="button" class="cg-toggle-link" data-grouped-toggle="${escapeHtml(altKey)}">show fewer</button></div>`;
        } else if (remaining > 0) {
          truncationMsg = `<div class="cg-truncation-note">+ ${remaining} more — <button type="button" class="cg-toggle-link" data-grouped-toggle="${escapeHtml(altKey)}">show all</button></div>`;
        }

        // Column header row mirrors the visual columns of the alt rows below
        const altHeader = `
          <div class="cg-alt-row cg-alt-header">
            <span class="code">Section</span>
            <span>Fill</span>
            <span class="right">Open</span>
            <span>Format</span>
            <span>Days</span>
            <span>Time · Instructor</span>
          </div>
        `;

        alternativesPanel = `
          <div class="cg-alternatives">
            <div class="cg-panel-label">${bucket === 'empty' ? 'Available alternatives in ' + escapeHtml(courseCode) : 'Sections with room in ' + escapeHtml(courseCode)} (${alternatives.length})</div>
            ${altHeader}
            ${visibleAlts.map(renderAltRow).join('')}
            ${truncationMsg}
          </div>
        `;
      }

      const groupClass = bucket === 'empty' ? 'cg-empty' : 'cg-full';

      return `
        <div class="cg-panel ${groupClass}" style="border-left-color:${color}">
          <div class="cg-panel-head">
            <div>
              <span class="cg-course-id">${escapeHtml(courseCode)}</span>
              <span class="cg-course-title">${escapeHtml(courseTitle)}</span>
            </div>
            <div class="cg-course-stats">${courseStats}</div>
          </div>
          ${waitlistCallout}
          ${placeholderNote}
          ${triggeredPanel}
          ${alternativesPanel}
        </div>
      `;
    }).join('');

    const totalCourses = courseOrder.length;
    const totalTriggered = searched.length;
    const subtitle = bucket === 'empty'
      ? `${totalTriggered} empty section${totalTriggered === 1 ? '' : 's'} across ${totalCourses} course${totalCourses === 1 ? '' : 's'}`
      : `${totalTriggered} full section${totalTriggered === 1 ? '' : 's'} across ${totalCourses} course${totalCourses === 1 ? '' : 's'}`;

    return `
      <div class="section-title">Full Section Detail <span class="meta">${subtitle}</span></div>
      ${renderTableToolbar(triggered.length, searched.length, tokens.length > 0)}
      <div class="cg-container">
        ${panels}
      </div>
    `;
  }

  // Helper: format/modality tag for a section (used in both triggered rows and alternatives)
  function formatTagFor(s) {
    const sec = String(s.Section || '');
    const loc = String(s.Location || '').toUpperCase();
    // Distance Ed section codes contain "DE" or location is DE
    if (/-DE\d/.test(sec) || loc === 'DE') {
      return '<span class="cg-format-tag online">Online async</span>';
    }
    // Evening: 800-series section codes (legacy convention at Brookdale)
    if (/-8\d{2}/.test(sec)) {
      return '<span class="cg-format-tag evening">Evening</span>';
    }
    // Wall campus
    if (loc === 'WALL') {
      return '<span class="cg-format-tag wall">Wall campus</span>';
    }
    return '<span class="cg-format-tag in-person">In-person</span>';
  }

  // Helper: shared toolbar (search box + match count) extracted so both list
  // and grouped renderers can use it
  function renderTableToolbar(totalCount, matchCount, hasActiveSearch) {
    const matchHTML = hasActiveSearch
      ? `<span class="search-count">${matchCount} of ${totalCount}</span>`
      : '';
    return `
      <div class="table-toolbar">
        <div class="table-search">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input
            type="text"
            id="tableSearchInput"
            class="search-input"
            placeholder='Search — try "ENGI 101 LINC" or "Powell M W" or "MATH T TH"'
            value="${escapeHtml(state.tableSearch)}"
            autocomplete="off"
            spellcheck="false">
          ${state.tableSearch ? `<button class="search-clear" id="tableSearchClear" type="button" aria-label="Clear search">×</button>` : ''}
        </div>
        ${matchHTML}
      </div>
    `;
  }

  /* =========================================================================
   * TRENDS VIEW
   * ========================================================================= */

  function renderTrendsView() {
    if (state.snapshots.length < 2) {
      return `
        <div class="welcome" style="margin-top:32px">
          <h2>One snapshot so far.</h2>
          <p>Trends become visible once you've uploaded a second report. Each new release adds a point to the timeline.</p>
        </div>
      `;
    }

    let present = [...state.selectedDisciplines]
      .filter(p => state.snapshots.some(s => s.rows.some(r => r._prefix === p)))
      .sort();

    // Honor the discipline filter chips here too, so the trends chart focuses
    // on what the user has narrowed to.
    if (state.activeDisciplineFilter.size > 0) {
      present = present.filter(p => state.activeDisciplineFilter.has(p));
    }

    // Build series per discipline
    const series = present.map(p => {
      const enr = state.snapshots.map(s => sum(s.rows.filter(r => r._prefix === p), 'Enrolled Students'));
      const fill = state.snapshots.map(s => {
        const rows = s.rows.filter(r => r._prefix === p);
        const cap = sum(rows, 'Capacity');
        const en = sum(rows, 'Enrolled Students');
        return cap > 0 ? (en / cap * 100) : 0;
      });
      return { code: p, color: colorFor(p), enr, fill };
    });

    // College-wide reference series (rendered as dashed line on charts when toggle is on)
    const cwSeries = state.showBenchmarks ? {
      code: 'College',
      color: 'var(--flat)',
      dashed: true,
      enr: state.snapshots.map(s => sum(s.rows, 'Enrolled Students')),
      fill: state.snapshots.map(s => {
        const cap = sum(s.rows, 'Capacity');
        const en = sum(s.rows, 'Enrolled Students');
        return cap > 0 ? (en / cap * 100) : 0;
      }),
    } : null;

    const dates = state.snapshots.map(s => fmtDateShort(s.date));

    // Movers — biggest enrollment changes between first and last snapshot
    const firstSnap = state.snapshots[0];
    const lastSnap = state.snapshots[state.snapshots.length - 1];
    const allSections = new Set();
    state.snapshots.forEach(s => s.rows.forEach(r => {
      if (state.selectedDisciplines.has(r._prefix)) allSections.add(r.Section);
    }));

    const movers = [...allSections].map(sec => {
      const fr = firstSnap.rows.find(r => r.Section === sec);
      const lr = lastSnap.rows.find(r => r.Section === sec);
      if (!lr) return null;
      const startEnr = fr ? fr['Enrolled Students'] : 0;
      const endEnr = lr['Enrolled Students'];
      return {
        section: sec,
        title: lr['Course Title'],
        prefix: lr._prefix,
        location: lr.Location,
        capacity: lr.Capacity,
        startEnr, endEnr,
        diff: endEnr - startEnr,
        startFill: fr ? fr['Section Fill %'] : 0,
        endFill: lr['Section Fill %'],
        isNew: !fr,
      };
    }).filter(Boolean);

    const gainers = movers.filter(m => m.diff > 0).sort((a, b) => b.diff - a.diff).slice(0, 8);
    const stalled = movers.filter(m => m.diff === 0 && m.endFill < 50).sort((a, b) => a.endEnr - b.endEnr).slice(0, 8);
    const losers = movers.filter(m => m.diff < 0).sort((a, b) => a.diff - b.diff).slice(0, 8);

    return `
      <div class="section-title">Enrollment Over Time <span class="meta">${state.snapshots.length} snapshots · ${fmtDate(firstSnap.date)} → ${fmtDate(lastSnap.date)}</span></div>
      ${renderMultiSeriesChart(series, dates, 'enr', 'Enrolled Students', null)}
      ${renderMultiSeriesChart(series, dates, 'fill', 'Fill Rate (%)', cwSeries)}

      <div class="section-title">Movers</div>
      <div class="grid-auto">
        ${renderMoverPanel('Biggest Gainers', gainers, 'up')}
        ${renderMoverPanel('Stalled (no growth, under-filled)', stalled, 'flat')}
        ${renderMoverPanel('Lost Enrollment', losers, 'down')}
      </div>
    `;
  }

  function renderMultiSeriesChart(series, dates, key, title, refSeries) {
    const W = 1100, H = 280, padL = 60, padR = 20, padT = 30, padB = 50;
    const innerW = W - padL - padR;
    const innerH = H - padT - padB;
    if (series.length === 0 || dates.length === 0) return '';

    const allSeries = refSeries ? [...series, refSeries] : series;
    const allVals = allSeries.flatMap(s => s[key]);
    const max = Math.max(...allVals, key === 'fill' ? 100 : 1);
    const min = 0;
    const xStep = dates.length > 1 ? innerW / (dates.length - 1) : 0;

    const xCoord = (i) => padL + i * xStep;
    const yCoord = (v) => padT + innerH * (1 - (v - min) / (max - min || 1));

    // Y axis ticks (5)
    const ticks = 5;
    const yTicks = [];
    for (let i = 0; i <= ticks; i++) {
      const v = min + (max - min) * (i / ticks);
      yTicks.push({ v, y: yCoord(v) });
    }

    const renderLine = (s) => {
      const path = s[key].map((v, i) => `${i === 0 ? 'M' : 'L'}${xCoord(i)},${yCoord(v)}`).join(' ');
      const dots = s[key].map((v, i) => `<circle cx="${xCoord(i)}" cy="${yCoord(v)}" r="${s.dashed ? 2 : 3}" fill="${s.color}" opacity="${s.dashed ? 0.6 : 1}"/>`).join('');
      const dash = s.dashed ? 'stroke-dasharray="5,4"' : '';
      const opacity = s.dashed ? '0.6' : '1';
      return `
        <path d="${path}" fill="none" stroke="${s.color}" stroke-width="${s.dashed ? 1.5 : 2}" ${dash} stroke-linejoin="round" stroke-linecap="round" opacity="${opacity}"/>
        ${dots}
      `;
    };

    const lines = series.map(renderLine).join('') + (refSeries ? renderLine(refSeries) : '');

    const xLabels = dates.map((d, i) =>
      `<text x="${xCoord(i)}" y="${H - padB + 18}" text-anchor="middle" font-size="11" fill="var(--ink-mute)" font-family="Helvetica Neue, sans-serif">${escapeHtml(d)}</text>`
    ).join('');

    const yLabels = yTicks.map(t =>
      `<line x1="${padL}" x2="${W - padR}" y1="${t.y}" y2="${t.y}" stroke="var(--rule)" stroke-width="0.5"/>
       <text x="${padL - 8}" y="${t.y + 3}" text-anchor="end" font-size="10" fill="var(--ink-mute)" font-family="Helvetica Neue, sans-serif">${key === 'fill' ? t.v.toFixed(0) + '%' : t.v.toFixed(0)}</text>`
    ).join('');

    const legendItems = series.map(s =>
      `<span><span class="sw" style="background:${s.color}"></span>${escapeHtml(s.code)}</span>`
    );
    if (refSeries) {
      legendItems.push(`<span><span class="sw" style="background:${refSeries.color};opacity:0.6;background-image:repeating-linear-gradient(90deg, ${refSeries.color} 0 4px, transparent 4px 7px)"></span>${escapeHtml(refSeries.code)} <em style="color:var(--ink-mute)">(reference)</em></span>`);
    }
    const legend = legendItems.join('');

    return `
      <div class="trend-chart-wrap">
        <h4>${escapeHtml(title)}</h4>
        <div class="legend">${legend}</div>
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
          ${yLabels}
          ${lines}
          ${xLabels}
        </svg>
      </div>
    `;
  }

  function renderMoverPanel(title, items, kind) {
    if (items.length === 0) {
      return `<div class="panel">
        <h3>${escapeHtml(title)}</h3>
        <div class="panel-sub">None in current view.</div>
      </div>`;
    }
    const rows = items.map(m => {
      const cls = kind === 'up' ? 'up' : kind === 'down' ? 'down' : 'flat';
      const sign = m.diff > 0 ? '+' : m.diff < 0 ? '' : '';
      const color = colorFor(m.prefix);
      return `
        <div class="stat-row">
          <span class="k" style="text-transform:none;letter-spacing:0;font-size:11px">
            <strong style="color:var(--ink);font-family:Helvetica Neue, sans-serif">${escapeHtml(m.section)}</strong>
            <span style="color:var(--ink-mute)"> · ${escapeHtml(m.location || '')}</span>
          </span>
          <span class="v" style="font-size:11px">${m.endEnr}/${m.capacity}</span>
          <span class="d ${cls}" style="font-weight:700">${m.isNew ? 'NEW' : sign + m.diff}</span>
        </div>
      `;
    }).join('');
    return `
      <div class="panel">
        <h3>${escapeHtml(title)}</h3>
        <div class="panel-sub">${items.length} section${items.length !== 1 ? 's' : ''}</div>
        ${rows}
      </div>
    `;
  }

  /* =========================================================================
   * SNAPSHOT MANAGER
   * ========================================================================= */

  function renderSnapshotManager() {
    const rows = state.snapshots.slice().reverse().map(s => {
      const isCurrent = s.id === state.currentSnapshotId;
      const totalSections = s.rows.length;
      const totalEnr = sum(s.rows, 'Enrolled Students');
      return `
        <div class="snap-row ${isCurrent ? 'current' : ''}">
          <div class="date">${fmtDateShort(s.date)}</div>
          <div>
            <div style="font-weight:600">${escapeHtml(s.label)}</div>
            <div class="name">${escapeHtml(s.filename)}</div>
          </div>
          <div class="stats">${totalSections} sections · ${totalEnr} enrolled</div>
          ${isCurrent ? '<span class="badge cur">VIEWING</span>' : `<button class="btn ghost" data-set-current="${s.id}">View</button>`}
          <span></span>
        </div>
      `;
    }).join('');

    const updatedNote = state.manifestUpdatedAt
      ? `Data last updated ${fmtDate(state.manifestUpdatedAt.slice(0, 10))}`
      : `Loaded ${state.loadedAt ? new Date(state.loadedAt).toLocaleString() : ''}`;

    return `
      <div class="section-title">Snapshot Library <span class="meta">${state.snapshots.length} snapshots from data folder</span></div>

      <div style="background:var(--surface-2);border:1px solid var(--rule);padding:14px 18px;margin-bottom:18px;font-size:13px;color:var(--ink-soft)">
        <strong style="font-family:Helvetica Neue, sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink)">Data Source</strong><br>
        Reports load automatically from the <code>${escapeHtml(DATA_PATH)}</code> folder. New reports appear here as they're added. ${updatedNote}.
        <div style="margin-top:10px">
          <button class="btn" id="refreshBtn2" type="button">↻ Refresh from source</button>
        </div>
      </div>

      <div class="snapshot-list">${rows || '<div style="padding:20px;color:var(--ink-mute);font-style:italic">No snapshots yet.</div>'}</div>
    `;
  }

  /* =========================================================================
   * DISCIPLINE PICKER MODAL
   * ========================================================================= */

  function openDisciplineModal() {
    const root = el('modalRoot');
    root.innerHTML = renderDisciplineModal();
    bindDisciplineModal();
  }

  function closeModal() {
    el('modalRoot').innerHTML = '';
  }

  function renderDisciplineModal() {
    const grouped = {};
    state.allDisciplines.forEach(d => {
      const inst = d.institute || '(unspecified)';
      if (!grouped[inst]) grouped[inst] = [];
      grouped[inst].push(d);
    });
    const institutes = Object.keys(grouped).sort();

    const presetChips = state.presets.map((p, i) => `
      <button class="preset-chip" data-load-preset="${i}">
        ${escapeHtml(p.name)} <span style="color:var(--ink-mute)">(${p.disciplines.length})</span>
        <span class="x" data-delete-preset="${i}" title="Delete preset">×</span>
      </button>
    `).join('');

    const groups = institutes.map(inst => `
      <div class="institute-group">
        <div class="ig-head">
          <span>${escapeHtml(inst)} <span style="color:var(--ink-mute);font-weight:400">· ${grouped[inst].length} disciplines</span></span>
          <span class="ig-actions">
            <a data-select-inst="${escapeHtml(inst)}">Select all</a>
            <a data-deselect-inst="${escapeHtml(inst)}">Clear</a>
          </span>
        </div>
        <div class="ig-body">
          ${grouped[inst].map(d => `
            <span class="disc-chip ${state.selectedDisciplines.has(d.code) ? 'selected' : ''}" data-discipline="${d.code}">
              <span class="swatch" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${colorFor(d.code)}"></span>
              ${d.code}
              <span class="ct">${d.count}</span>
            </span>
          `).join('')}
        </div>
      </div>
    `).join('');

    return `
      <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalCard">
          <div class="modal-head">
            <h2>Choose Your Disciplines</h2>
            <button class="close" id="modalClose">×</button>
          </div>
          <div class="modal-body">
            <p style="color:var(--ink-soft);font-size:13px;margin-bottom:18px">Select any course prefixes you want to track. Counts shown reflect sections across all your snapshots.</p>

            ${state.presets.length > 0 ? `
              <div class="preset-row">
                <span class="preset-label">Presets</span>
                ${presetChips}
              </div>
            ` : ''}

            ${groups || '<p style="color:var(--ink-mute);font-style:italic">No disciplines found. Upload a report first.</p>'}

            <div style="margin-top:18px;padding:12px 14px;background:var(--surface-2);border:1px solid var(--rule)">
              <div style="font-family:Helvetica Neue, sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-mute);margin-bottom:6px">Save current selection as preset</div>
              <div style="display:flex;gap:8px">
                <input type="text" id="presetName" placeholder="e.g., Engineering & Tech Chair" style="flex:1;padding:8px 10px;border:1px solid var(--rule);background:var(--surface);color:var(--ink);font-family:inherit;font-size:13px">
                <button class="btn" id="savePresetBtn" type="button">Save</button>
              </div>
            </div>
          </div>
          <div class="modal-foot">
            <span style="color:var(--ink-mute);font-size:12px;align-self:center" id="selectedCount">${state.selectedDisciplines.size} selected</span>
            <div style="display:flex;gap:8px">
              <button class="btn ghost" id="clearAllDisc" type="button">Clear All</button>
              <button class="btn primary" id="applyDisc" type="button">Apply</button>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function bindDisciplineModal() {
    el('modalClose').addEventListener('click', closeModal);
    el('modalOverlay').addEventListener('click', (e) => {
      if (e.target.id === 'modalOverlay') closeModal();
    });

    document.querySelectorAll('[data-discipline]').forEach(chip => {
      chip.addEventListener('click', () => {
        const code = chip.dataset.discipline;
        if (state.selectedDisciplines.has(code)) state.selectedDisciplines.delete(code);
        else state.selectedDisciplines.add(code);
        chip.classList.toggle('selected');
        el('selectedCount').textContent = state.selectedDisciplines.size + ' selected';
      });
    });

    document.querySelectorAll('[data-select-inst]').forEach(a => {
      a.addEventListener('click', () => {
        const inst = a.dataset.selectInst;
        state.allDisciplines.filter(d => (d.institute || '(unspecified)') === inst)
          .forEach(d => state.selectedDisciplines.add(d.code));
        openDisciplineModal();
      });
    });
    document.querySelectorAll('[data-deselect-inst]').forEach(a => {
      a.addEventListener('click', () => {
        const inst = a.dataset.deselectInst;
        state.allDisciplines.filter(d => (d.institute || '(unspecified)') === inst)
          .forEach(d => state.selectedDisciplines.delete(d.code));
        openDisciplineModal();
      });
    });

    document.querySelectorAll('[data-load-preset]').forEach(b => {
      b.addEventListener('click', (e) => {
        if (e.target.dataset.deletePreset != null) return; // delete handler will fire
        const idx = parseInt(b.dataset.loadPreset, 10);
        const preset = state.presets[idx];
        if (preset) {
          state.selectedDisciplines = new Set(preset.disciplines);
          openDisciplineModal();
        }
      });
    });
    document.querySelectorAll('[data-delete-preset]').forEach(x => {
      x.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(x.dataset.deletePreset, 10);
        if (confirm(`Delete preset "${state.presets[idx].name}"?`)) {
          state.presets.splice(idx, 1);
          saveStorage();
          openDisciplineModal();
        }
      });
    });

    el('savePresetBtn').addEventListener('click', () => {
      const name = el('presetName').value.trim();
      if (!name) { toast('Give the preset a name.', 3000); return; }
      if (state.selectedDisciplines.size === 0) { toast('Select at least one discipline.', 3000); return; }
      // Replace if name exists
      const idx = state.presets.findIndex(p => p.name === name);
      const preset = { name, disciplines: [...state.selectedDisciplines] };
      if (idx >= 0) state.presets[idx] = preset;
      else state.presets.push(preset);
      saveStorage();
      toast(`Saved preset "${name}".`, 3000);
      openDisciplineModal();
    });

    el('clearAllDisc').addEventListener('click', () => {
      state.selectedDisciplines.clear();
      openDisciplineModal();
    });

    el('applyDisc').addEventListener('click', () => {
      saveStorage();
      closeModal();
      // Reset sub-filters that no longer apply
      state.activeDisciplineFilter = new Set(
        [...state.activeDisciplineFilter].filter(p => state.selectedDisciplines.has(p))
      );
      render();
    });
  }

  /* =========================================================================
   * EVENT BINDING (DASHBOARD)
   * ========================================================================= */

  function bindAllEvents() {
    // Tabs
    document.querySelectorAll('[data-tab]').forEach(t => {
      t.addEventListener('click', () => {
        state.activeTab = t.dataset.tab;
        render();
      });
    });

    // Discipline sub-filters
    document.querySelectorAll('[data-disc-filter]').forEach(b => {
      b.addEventListener('click', () => {
        const code = b.dataset.discFilter;
        if (state.activeDisciplineFilter.has(code)) state.activeDisciplineFilter.delete(code);
        else state.activeDisciplineFilter.add(code);
        render();
      });
    });

    // Location filters
    document.querySelectorAll('[data-location]').forEach(b => {
      b.addEventListener('click', () => {
        const l = b.dataset.location;
        if (state.activeLocations.has(l)) state.activeLocations.delete(l);
        else state.activeLocations.add(l);
        render();
      });
    });

    // Fill-status bucket filter (mutually exclusive)
    document.querySelectorAll('[data-bucket]').forEach(b => {
      b.addEventListener('click', () => {
        state.fillBucket = b.dataset.bucket;
        render();
      });
    });

    // Grouped vs. list view toggle (only relevant when Empty or Full filter active)
    document.querySelectorAll('[data-view-mode]').forEach(b => {
      b.addEventListener('click', () => {
        state.groupedView = b.dataset.viewMode === 'grouped';
        saveStorage();
        render();
      });
    });

    // Per-course-per-group expansion toggles in the grouped view.
    // Click "show all" -> expand that group; click "show fewer" -> collapse.
    // State lives in state.groupedExpansion as { "MATH-021:priority": true }
    document.querySelectorAll('[data-grouped-toggle]').forEach(b => {
      b.addEventListener('click', () => {
        const key = b.dataset.groupedToggle;
        state.groupedExpansion[key] = !state.groupedExpansion[key];
        render();
      });
    });

    // Per-discipline card collapse/expand toggle
    document.querySelectorAll('[data-toggle-discipline]').forEach(b => {
      b.addEventListener('click', () => {
        const prefix = b.dataset.toggleDiscipline;
        // Read the current effective state (smart default if no override)
        const snap = currentSnapshot();
        const count = snap
          ? snap.rows.filter(r => r._prefix === prefix && state.selectedDisciplines.has(r._prefix)).length
          : 0;
        const wasExpanded = isDisciplineExpanded(prefix, count);
        // Store explicit user choice (the opposite of current state)
        state.cardExpansion[prefix] = !wasExpanded;
        saveStorage();
        render();
      });
    });

    // Bulk collapse-all / expand-all toggle for the entire card grid.
    // Sets explicit overrides for every currently-visible discipline so the
    // choice persists. Reading data-bulk-action tells us which direction:
    // 'collapse' -> set all to false, 'expand' -> set all to true.
    const bulkBtn = el('bulkDisciplineToggle');
    if (bulkBtn) {
      bulkBtn.addEventListener('click', () => {
        const action = bulkBtn.dataset.bulkAction;
        const targetValue = action === 'expand';
        const snap = currentSnapshot();
        if (!snap) return;
        // Find every discipline currently in scope (matches filteredRows logic)
        const inScopePrefixes = new Set();
        filteredRows().forEach(r => inScopePrefixes.add(r._prefix));
        inScopePrefixes.forEach(prefix => {
          state.cardExpansion[prefix] = targetValue;
        });
        saveStorage();
        render();
      });
    }

    const reset = el('resetFilters');
    if (reset) reset.addEventListener('click', () => {
      state.activeDisciplineFilter.clear();
      state.activeLocations.clear();
      state.fillBucket = 'all';
      render();
    });

    // Show all disciplines — quick path back from a narrow drill-in view
    const showAll = el('showAllDisciplines');
    if (showAll) showAll.addEventListener('click', () => {
      state.selectedDisciplines = new Set(state.allDisciplines.map(d => d.code));
      state.activeDisciplineFilter.clear();
      saveStorage();
      toast(`Showing all ${state.allDisciplines.length} disciplines`, 2200);
      render();
    });

    // Discipline-group chips — additive toggle. Clicking BUSS adds all BUSS
    // disciplines to selection; clicking again when all are present removes
    // them. Lets users compose multi-institute views by clicking several.
    document.querySelectorAll('[data-institute]').forEach(b => {
      b.addEventListener('click', () => {
        const inst = b.dataset.institute;
        const codes = state.instituteIndex[inst] || [];
        if (codes.length === 0) return;
        const allSelected = codes.every(c => state.selectedDisciplines.has(c));
        if (allSelected) {
          // Remove all disciplines of this institute
          codes.forEach(c => state.selectedDisciplines.delete(c));
          toast(`Removed ${inst} (${codes.length} disciplines)`, 2000);
        } else {
          // Add all disciplines of this institute
          codes.forEach(c => state.selectedDisciplines.add(c));
          toast(`Added ${inst} (${codes.length} disciplines)`, 2000);
        }
        state.activeDisciplineFilter.clear();
        saveStorage();
        render();
      });
    });

    const benchT = el('benchToggle');
    if (benchT) benchT.addEventListener('click', () => {
      state.showBenchmarks = !state.showBenchmarks;
      saveStorage();
      render();
    });

    // Sort
    document.querySelectorAll('th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const k = th.dataset.sort;
        if (state.sortKey === k) state.sortDir *= -1;
        else { state.sortKey = k; state.sortDir = 1; }
        render();
      });
    });

    // Table search input
    const searchInput = el('tableSearchInput');
    if (searchInput) {
      // Re-render on each keystroke; restore focus/cursor after re-render
      // since render() replaces the input element.
      searchInput.addEventListener('input', (e) => {
        const newValue = e.target.value;
        const cursorPos = e.target.selectionStart;
        state.tableSearch = newValue;
        render();
        const restored = el('tableSearchInput');
        if (restored) {
          restored.focus();
          // Restore cursor to the spot the user was typing
          try { restored.setSelectionRange(cursorPos, cursorPos); } catch (_) {}
        }
      });
    }

    const searchClear = el('tableSearchClear');
    if (searchClear) {
      searchClear.addEventListener('click', () => {
        state.tableSearch = '';
        render();
        const restored = el('tableSearchInput');
        if (restored) restored.focus();
      });
    }

    // Snapshot manager actions (view-only since data comes from GitHub)
    document.querySelectorAll('[data-set-current]').forEach(b => {
      b.addEventListener('click', () => {
        state.currentSnapshotId = b.dataset.setCurrent;
        toast('Switched to snapshot ' + fmtDate(currentSnapshot().date), 2500);
        state.activeTab = 'snapshot';
        render();
      });
    });

    const refreshBtn2 = el('refreshBtn2');
    if (refreshBtn2) refreshBtn2.addEventListener('click', loadFromManifest);
  }

  /* =========================================================================
   * IMPORT / EXPORT
   * ========================================================================= */

  function exportSnapshots() {
    const payload = {
      version: 1,
      exportedAt: new Date().toISOString(),
      snapshots: state.snapshots,
      presets: state.presets,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `enrollment-snapshots-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast(`Exported ${state.snapshots.length} snapshots.`, 3000);
  }

  function importSnapshots(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.snapshots || !Array.isArray(data.snapshots)) throw new Error('Invalid file format');

        const action = state.snapshots.length > 0
          ? prompt(`You have ${state.snapshots.length} existing snapshots. Type "merge" to combine, "replace" to overwrite, or cancel:`, 'merge')
          : 'replace';

        if (!action) return;
        if (action === 'replace') {
          state.snapshots = data.snapshots;
        } else if (action === 'merge') {
          // Replace by date, add new
          data.snapshots.forEach(s => {
            const idx = state.snapshots.findIndex(x => x.date === s.date);
            if (idx >= 0) state.snapshots[idx] = s;
            else state.snapshots.push(s);
          });
          state.snapshots.sort((a, b) => a.date.localeCompare(b.date));
        } else {
          toast('Import canceled.', 2500);
          return;
        }

        if (data.presets && Array.isArray(data.presets)) {
          // Merge presets by name
          data.presets.forEach(p => {
            const idx = state.presets.findIndex(x => x.name === p.name);
            if (idx >= 0) state.presets[idx] = p;
            else state.presets.push(p);
          });
        }

        if (state.snapshots.length > 0) {
          state.currentSnapshotId = state.snapshots[state.snapshots.length - 1].id;
        }
        recomputeAllDisciplines();
        saveStorage();
        render();
        toast(`Imported. Now have ${state.snapshots.length} snapshots.`, 3000);
      } catch (err) {
        console.error(err);
        toast('⚠ Could not import: ' + err.message, 5000);
      }
    };
    reader.readAsText(file);
    // Reset input so same file can be re-selected
    e.target.value = '';
  }

  /* =========================================================================
   * TOAST
   * ========================================================================= */

  let toastTimer = null;
  function toast(msg, ms) {
    const root = el('toastRoot');
    root.innerHTML = `<div class="toast">${msg}</div>`;
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { root.innerHTML = ''; }, ms || 4000);
  }

  /* =========================================================================
   * STATIC EVENT BINDING
   * ========================================================================= */

  el('refreshBtn').addEventListener('click', loadFromManifest);
  el('disciplineBtn').addEventListener('click', openDisciplineModal);
  el('themeBtn').addEventListener('click', () => {
    // Cycle: cream (no attribute) -> white -> dark -> cream
    const cur = document.documentElement.getAttribute('data-theme') || 'cream';
    let next;
    if (cur === 'cream') next = 'white';
    else if (cur === 'white') next = 'dark';
    else next = 'cream';

    if (next === 'cream') {
      document.documentElement.removeAttribute('data-theme');
    } else {
      document.documentElement.setAttribute('data-theme', next);
    }
    localStorage.setItem(STORAGE.THEME, next);
    updateThemeButtonLabel();
    render();
  });

  // Reflect current theme in the button label so the user knows what's active
  // and what they'll get next
  function updateThemeButtonLabel() {
    const btn = el('themeBtn');
    if (!btn) return;
    const cur = document.documentElement.getAttribute('data-theme') || 'cream';
    const label = cur === 'cream' ? 'Cream' : cur === 'white' ? 'White' : 'Dark';
    btn.textContent = '◐ Theme · ' + label;
    btn.title = 'Click to cycle through Cream, White, and Dark themes';
  }
  el('printBtn').addEventListener('click', () => window.print());

  /* =========================================================================
   * INIT
   * ========================================================================= */

  loadStorage();
  updateThemeButtonLabel();
  // Snapshots now come from GitHub, not localStorage. Clear any leftovers.
  state.snapshots = [];
  state.currentSnapshotId = null;
  loadFromManifest();
})();
</script>
</body>
