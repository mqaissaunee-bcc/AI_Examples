        const parsed = parseSuffix(String(r.Section));
        if (!parsed || parsed.role !== 'X') return;
        if (matched.has(String(r.Section))) return;
        const partnerKey = (parsed.number + 1) + ':' + parsed.loc + ':R';
        const partner = byNum.get(partnerKey);
        if (!partner) return;
        if (matched.has(String(partner.Section))) return;
        const key = 'unsched|' + cohortKey + '|' + parsed.number;
        finalizeGroup([r, partner], key);
      });
    });

    _combinedClassCache.set(snap.id, sectionToGroup);
    return sectionToGroup;
  }
  // Clear cache when snapshots change
  function invalidateCombinedClassCache() { _combinedClassCache.clear(); }

  function rowInFillBucket(r, bucket) {
    if (bucket === 'all') return true;
    const fill = Number(r['Section Fill %']) || 0;
    const enrolled = Number(r['Enrolled Students']) || 0;
    if (bucket === 'full')   return fill >= 100;
    if (bucket === 'almost') return fill >= 75 && fill < 100;
    if (bucket === 'under')  return enrolled > 0 && fill < 50;
    if (bucket === 'empty')  return enrolled === 0 && !isIndependentEnrollment(r);
    return true;
  }

  function filteredRows() {
    const snap = currentSnapshot();
    if (!snap) return [];
    return snap.rows.filter(r => {
      if (!state.selectedDisciplines.has(r._prefix)) return false;
      if (state.activeDisciplineFilter.size > 0 && !state.activeDisciplineFilter.has(r._prefix)) return false;
      if (state.activeLocations.size > 0 && !state.activeLocations.has(r.Location)) return false;
      if (!rowInFillBucket(r, state.fillBucket)) return false;
      return true;
    });
  }

  // College-wide stats for a snapshot — every fall section, all disciplines.
  // Returns { sections, enrolled, capacity, fill, sch }.
  function collegeWideStats(snap) {
    if (!snap) return { sections: 0, enrolled: 0, capacity: 0, fill: 0, sch: 0 };
    const rows = snap.rows;
    const enrolled = sum(rows, 'Enrolled Students');
    const capacity = sum(rows, 'Capacity');
    return {
      sections: rows.length,
      enrolled,
      capacity,
      fill: capacity > 0 ? (enrolled / capacity * 100) : 0,
      sch: sum(rows, 'Total Student Credit Hours'),
    };
  }

  // FTE (Full-Time Equivalent) = Total Student Credit Hours / 30.
  // This is the institutional planning metric, used here to track progress
  // toward a college-wide FTE goal (set in manifest.json as goals.fte).
  const FTE_DIVISOR = 30;

  function fteFromRows(rows) {
    return sum(rows, 'Total Student Credit Hours') / FTE_DIVISOR;
  }

  function collegeWideFTE(snap) {
    if (!snap) return 0;
    return fteFromRows(snap.rows);
  }

  function fteGoal() {
    return state.goals && state.goals.fte ? Number(state.goals.fte) : null;
  }

  function pctOfGoal(fte) {
    const g = fteGoal();
    return g ? (fte / g * 100) : null;
  }

  // True if comparison to college-wide is meaningful — i.e., user is looking
  // at a real subset, not (effectively) the whole college.
  function comparisonMeaningful() {
    if (!state.showBenchmarks) return false;
    const snap = currentSnapshot();
    if (!snap) return false;
    const totalDisciplines = state.allDisciplines.length;
    if (totalDisciplines === 0) return false;
    // Selected fewer than all disciplines OR has location/sub-filter narrowing
    if (state.selectedDisciplines.size < totalDisciplines) return true;
    if (state.activeDisciplineFilter.size > 0) return true;
    if (state.activeLocations.size > 0) return true;
    return false;
  }

  /* =========================================================================
   * RENDER ROOT
   * ========================================================================= */

  function render() {
    updateHeader();
    const dash = el('dashboard');

    // Loading or error → show welcome panel which handles those states
    if (state.loadStatus === 'loading' || state.loadStatus === 'error' || state.snapshots.length === 0) {
      dash.innerHTML = renderWelcome();
      el('disciplineBtn').style.display = 'none';
      bindBasic();
      return;
    }

    if (state.selectedDisciplines.size === 0) {
      dash.innerHTML = renderNoDisciplines();
      el('disciplineBtn').style.display = '';
      bindBasic();
      return;
    }

    el('disciplineBtn').style.display = '';

    let body = renderTabs();
    if (state.activeTab === 'snapshot') {
      body += renderKPIs();
      body += renderFilters();
      body += renderDisciplineSummaries();
      body += renderCourseGrid();
      body += renderTable();
    } else if (state.activeTab === 'trends') {
      body += renderTrendsView();
    } else if (state.activeTab === 'snapshots') {
      body += renderSnapshotManager();
    }

    dash.innerHTML = body;
    bindAllEvents();
  }

  function updateHeader() {
    const snap = currentSnapshot();
    if (state.loadStatus === 'loading') {
      el('reportDate').textContent = 'Loading…';
    } else if (state.loadStatus === 'error') {
      el('reportDate').textContent = 'Load failed';
    } else if (snap) {
      el('reportDate').textContent = `Latest report: ${fmtDate(snap.date)}`;
    } else {
      el('reportDate').textContent = 'No data loaded';
    }

    if (state.selectedDisciplines.size === 0) {
      el('disciplineSummary').textContent = 'No disciplines selected';
    } else {
      const list = [...state.selectedDisciplines].sort();
      const display = list.length <= 4 ? list.join(' · ') : `${list.slice(0, 3).join(' · ')} +${list.length - 3} more`;
      el('disciplineSummary').textContent = display;
    }

    el('snapshotCount').textContent =
      state.snapshots.length === 0 ? '0 snapshots'
      : state.snapshots.length === 1 ? '1 snapshot'
      : `${state.snapshots.length} snapshots`;

    if (snap) {
      const updated = state.manifestUpdatedAt
        ? `Data updated ${fmtDate(state.manifestUpdatedAt.slice(0, 10))}`
        : `Loaded ${state.loadedAt ? new Date(state.loadedAt).toLocaleString() : ''}`;
      el('footerStamp').textContent = `${updated} · ${snap.rows.length} sections in latest`;
    }
  }

  /* =========================================================================
   * WELCOME / EMPTY STATES
   * ========================================================================= */

  function renderWelcome() {
    if (state.loadStatus === 'loading') {
      return `
        <div class="welcome">
          <h2>Loading enrollment data…</h2>
          <p>Fetching the latest reports from the data folder. This usually takes a couple of seconds.</p>
          <div class="loader-bar"><div class="loader-fill"></div></div>
        </div>
      `;
    }

    if (state.loadStatus === 'error') {
      return `
        <div class="welcome">
          <h2>Couldn't load enrollment data.</h2>
          <p>${escapeHtml(state.loadError || 'Unknown error.')}</p>
          <p style="font-size:12px;color:var(--ink-mute);margin-top:16px">
            This dashboard reads from <code>${escapeHtml(DATA_PATH + MANIFEST_FILE)}</code> in the same folder as this page.
            If you're testing locally, make sure you're serving the directory through a web server (open files via <code>file://</code> won't work — browsers block fetch from local files).
          </p>
          <button class="upload-btn" id="retryBtn" type="button">Retry</button>
        </div>
      `;
    }

    // idle, no data — shouldn't normally hit this since init triggers a load
    return `
      <div class="welcome">
        <h2>Enrollment Dashboard</h2>
        <p>This dashboard tracks Fall enrollment for the disciplines you select. Data updates automatically as new reports are published.</p>
        <button class="upload-btn" id="loadDataBtn" type="button">Load Data</button>
      </div>
    `;
  }

  function renderNoDisciplines() {
    return `
      <div class="welcome">
        <h2>Choose the disciplines you teach.</h2>
        <p>Your data is loaded. Now tell the dashboard which course prefixes to focus on.</p>
        <button class="upload-btn" id="openDiscBtn" type="button">Choose Disciplines</button>
      </div>
    `;
  }

  function bindBasic() {
    const b = el('openDiscBtn');
    if (b) b.addEventListener('click', openDisciplineModal);
    const r = el('retryBtn');
    if (r) r.addEventListener('click', loadFromManifest);
    const l = el('loadDataBtn');
    if (l) l.addEventListener('click', loadFromManifest);
  }

  /* =========================================================================
   * TABS
   * ========================================================================= */

  function renderTabs() {
    const sections = filteredRows().length;
    return `
      <div class="tabs">
        <button class="tab ${state.activeTab === 'snapshot' ? 'active' : ''}" data-tab="snapshot">Current Snapshot <span class="count">${sections}</span></button>
        <button class="tab ${state.activeTab === 'trends' ? 'active' : ''}" data-tab="trends">Trends <span class="count">${state.snapshots.length}</span></button>
        <button class="tab ${state.activeTab === 'snapshots' ? 'active' : ''}" data-tab="snapshots">Snapshots</button>
      </div>
    `;
  }

  /* =========================================================================
   * KPI STRIP — with delta vs. previous snapshot
   * ========================================================================= */

  function renderKPIs() {
    const cur = filteredRows();
    const prevSnap = previousSnapshot();
    const prev = prevSnap
      ? prevSnap.rows.filter(r =>
          state.selectedDisciplines.has(r._prefix) &&
          (state.activeDisciplineFilter.size === 0 || state.activeDisciplineFilter.has(r._prefix)) &&
          (state.activeLocations.size === 0 || state.activeLocations.has(r.Location)) &&
          rowInFillBucket(r, state.fillBucket)
        )
      : null;

    const sectionsNow = cur.length;
    const enrolledNow = sum(cur, 'Enrolled Students');
    const capacityNow = sum(cur, 'Capacity');
    const fillNow = capacityNow > 0 ? (enrolledNow / capacityNow * 100) : 0;
    const schNow = sum(cur, 'Total Student Credit Hours');

    let dEnrolled = '', dFill = '', dSCH = '', dSections = '';
    if (prev) {
      const enrolledPrev = sum(prev, 'Enrolled Students');
      const capacityPrev = sum(prev, 'Capacity');
      const fillPrev = capacityPrev > 0 ? (enrolledPrev / capacityPrev * 100) : 0;
      const schPrev = sum(prev, 'Total Student Credit Hours');
      dSections = renderDelta(sectionsNow - prev.length, '');
      dEnrolled = renderDelta(enrolledNow - enrolledPrev, '');
      dFill = renderDelta(fillNow - fillPrev, 'pp', 1);
      dSCH = renderDelta(schNow - schPrev, '');
    }

    const fullCount = cur.filter(r => r['Section Fill %'] >= 100).length;
    const emptyCount = cur.filter(r => r['Enrolled Students'] === 0).length;
    const waitlistTotal = sum(cur, 'Wait List');

    // College-wide benchmark for fill comparison
    const showBench = comparisonMeaningful();
    const cw = showBench ? collegeWideStats(currentSnapshot()) : null;
    const fillVsCollege = cw ? (fillNow - cw.fill) : null;
    const fillSubtext = cw
      ? `${(capacityNow - enrolledNow).toLocaleString()} seats remaining · College: ${cw.fill.toFixed(1)}% ${benchDelta(fillVsCollege, 'pp', 1)}`
      : `${(capacityNow - enrolledNow).toLocaleString()} seats remaining`;

    // Fifth KPI: FTE vs. fall goal (only renders if a goal is set)
    const goal = fteGoal();
    const snap = currentSnapshot();
    let fteCard = '';
    if (goal && snap) {
      const collegeFTE = collegeWideFTE(snap);
      const collegePct = pctOfGoal(collegeFTE);
      const prevFTE = prevSnap ? collegeWideFTE(prevSnap) : null;
      const dFTE = prevFTE !== null ? collegeFTE - prevFTE : null;
      const dStr = dFTE !== null && Math.abs(dFTE) >= 0.05
        ? `<span class="delta ${dFTE > 0 ? 'up' : 'down'}" title="Change in college-wide FTE since the previous snapshot">${dFTE > 0 ? '+' : ''}${dFTE.toFixed(1)}</span>`
        : '';

      // Your selection's contribution
      const yourFTE = fteFromRows(cur);
      const totalDisciplines = state.allDisciplines.length;
      const showYourSelection =
        state.selectedDisciplines.size > 0 &&
        state.selectedDisciplines.size < totalDisciplines;

      const sub = showYourSelection
        ? `${collegePct.toFixed(1)}% of ${goal.toLocaleString()} · your selection: ${yourFTE.toFixed(1)}`
        : `${collegePct.toFixed(1)}% of ${goal.toLocaleString()} · ${Math.max(0, goal - collegeFTE).toFixed(0)} to go`;

      // Tooltip explains FTE, calculation, and goal scope. A custom CSS
      // tooltip (not native title=) so it appears immediately on hover,
      // stays put while the cursor is on the trigger, and renders with
      // dashboard styling rather than OS chrome. Native title tooltips are
      // unreliable: delayed, dismissed quickly, and styled inconsistently.
      const fteTooltip = `Full-Time Equivalent (FTE) = Total Student Credit Hours ÷ 30 (Brookdale convention). Compared against the fall enrollment goal of ${goal.toLocaleString()}, set by Institutional Research. Goals reset each semester.`;

      fteCard = `
        <div class="kpi">
          <div class="label">
            FTE vs. fall goal
            <span class="kpi-info-wrap">
              <span class="kpi-info" tabindex="0" role="button" aria-label="About FTE">i</span>
              <span class="kpi-tooltip" role="tooltip">${escapeHtml(fteTooltip)}</span>
            </span>
          </div>
          <div class="value">${collegeFTE.toFixed(1)} ${dStr}</div>
          <div class="sub">${sub}</div>
        </div>
      `;
    }

    return `
      <div class="kpi-strip${goal ? ' has-fte' : ''}">
        <div class="kpi">
          <div class="label">Sections</div>
          <div class="value">${sectionsNow} ${dSections}</div>
          <div class="sub">${fullCount} at capacity · ${emptyCount} with zero enrolled</div>
        </div>
        <div class="kpi">
          <div class="label">Enrollment</div>
          <div class="value">${enrolledNow} ${dEnrolled}</div>
          <div class="sub">of ${capacityNow} total seats</div>
        </div>
        <div class="kpi">
          <div class="label">Overall Fill</div>
          <div class="value">${fillNow.toFixed(1)}% ${dFill}</div>
          <div class="sub">${fillSubtext}</div>
        </div>
        <div class="kpi">
          <div class="label">Student Credit Hrs</div>
          <div class="value">${schNow} ${dSCH}</div>
          <div class="sub">${waitlistTotal > 0 ? waitlistTotal + ' on waitlist' : 'no waitlist activity'}</div>
        </div>
        ${fteCard}
      </div>
    `;
  }

  // Inline benchmark delta, used in KPI subtexts and panel rows.
  // Distinct from time-delta: shows "+X.Xpp ahead" / "-X.Xpp behind".
  function benchDelta(n, unit, decimals) {
    if (n === null || n === undefined || isNaN(n)) return '';
    const tt = 'Compared to the college-wide fill rate right now (across every fall section). "pp" = percentage points.';
    if (Math.abs(n) < 0.05) return `<span class="bench flat" title="${escapeHtml(tt)}">at college avg</span>`;
    const sign = n > 0 ? '+' : '';
    const cls = n > 0 ? 'up' : 'down';
    const v = decimals ? n.toFixed(decimals) : n.toLocaleString();
    return `<span class="bench ${cls}" title="${escapeHtml(tt)}">${sign}${v}${unit || ''}</span>`;
  }

  function renderDelta(n, unit, decimals, title) {
    if (n === 0 || n === undefined || isNaN(n)) return `<span class="delta flat" title="No change since the previous snapshot">—</span>`;
    const sign = n > 0 ? '+' : '';
    const cls = n > 0 ? 'up' : 'down';
    const v = decimals ? n.toFixed(decimals) : n.toLocaleString();
    const tt = title || (unit === 'pp'
      ? 'Change since the previous snapshot. "pp" = percentage points (a simple subtraction between two percentages).'
      : 'Change since the previous snapshot.');
    return `<span class="delta ${cls}" title="${escapeHtml(tt)}">${sign}${v}${unit || ''}</span>`;
  }

  /* =========================================================================
   * FILTERS
   * ========================================================================= */

  function renderFilters() {
    const snap = currentSnapshot();
    if (!snap) return '';
    // Limit filter chips to selected disciplines that are present in current snapshot
    const present = [...state.selectedDisciplines].filter(p =>
      snap.rows.some(r => r._prefix === p)
    ).sort();
    const locations = [...new Set(snap.rows
      .filter(r => state.selectedDisciplines.has(r._prefix))
      .map(r => r.Location)
      .filter(Boolean))].sort();

    const buckets = [
      { id: 'all',    label: 'All',         title: 'Show every section' },
      { id: 'full',   label: 'Full',        title: 'Sections at 100% capacity' },
      { id: 'almost', label: 'Almost full', title: 'Sections at 75-99% fill — likely to fill before classes start' },
      { id: 'under',  label: 'Underfilled', title: 'Sections under 50% fill with at least one student' },
      { id: 'empty',  label: 'Empty',       title: 'Sections with zero enrolled students' },
    ];

    // Discipline-group shortcuts: institute-level chips (BUSS, STEM, etc.) for quick
    // broad-category switching. Institutes are mutually exclusive sets of
    // disciplines, so clicking BUSS adds all BUSS disciplines to the
    // selection. Clicking again (when BUSS is fully selected) removes them.
    //
    // A chip shows as "active" when every discipline in that institute is
    // currently in the selection. "Other" (orphans without an Institute
    // classification from IR) always sorts last so the five primary
    // Institutes appear in their familiar order first.
    const institutes = Object.keys(state.instituteIndex).sort((a, b) => {
      if (a === 'Other') return 1;
      if (b === 'Other') return -1;
      return a.localeCompare(b);
    });

    const isInstituteFullySelected = (inst) => {
      const codes = state.instituteIndex[inst] || [];
      return codes.length > 0 && codes.every(c => state.selectedDisciplines.has(c));
    };

    const instituteChips = institutes.length > 0
      ? institutes.map(inst => {
          const codes = state.instituteIndex[inst] || [];
          const active = isInstituteFullySelected(inst);
          // Special tooltip for "Other" since it isn't an actual Institute
          // — it's the dashboard's catch-all for disciplines without an
          // Institute assignment in IR's data.
          let tip;
          if (inst === 'Other') {
            const list = codes.join(', ');
            tip = active
              ? `Remove unclassified disciplines from selection (${list})`
              : `Add unclassified disciplines to selection. These have no Institute assignment in IR's data: ${list}`;
          } else {
            tip = active
              ? `Remove all ${codes.length} ${inst} disciplines from selection`
              : `Add all ${codes.length} ${inst} disciplines to selection`;
          }
          return `<button class="chip ${active ? 'active' : ''}" data-institute="${escapeHtml(inst)}" title="${escapeHtml(tip)}">${escapeHtml(inst)}</button>`;
        }).join('')
      : '';

    // Show "Show all" button when the user has narrowed to a subset.
    // Lets users restore the full college view without opening the
    // discipline picker modal.
    const totalDisciplines = state.allDisciplines.length;
    const selectedCount = state.selectedDisciplines.size;
    const showAllChip = (totalDisciplines > 0 && selectedCount < totalDisciplines)
      ? `<button class="chip" id="showAllDisciplines" type="button" title="Select all ${totalDisciplines} disciplines (currently showing ${selectedCount})">≡ Show all (${totalDisciplines})</button>`
      : '';

    const scopeGroup = (instituteChips || showAllChip)
      ? `<div class="filter-group">
          <span class="lbl">Discipline group</span>
          ${showAllChip}
          ${instituteChips}
        </div>`
      : '';

    return `
      <div class="filter-bar">
        ${present.length > 1 ? `
          <div class="filter-group">
            <span class="lbl">Discipline</span>
            ${present.map(p => `
              <button class="chip ${state.activeDisciplineFilter.has(p) ? 'active' : ''}" data-disc-filter="${p}">
                <span class="swatch" style="background:${colorFor(p)}"></span>${p}
              </button>
            `).join('')}
          </div>
        ` : ''}
        ${locations.length > 1 ? `
          <div class="filter-group">
            <span class="lbl">Location</span>
            ${locations.map(l => `
              <button class="chip ${state.activeLocations.has(l) ? 'active' : ''}" data-location="${escapeHtml(l)}">${escapeHtml(l)}</button>
            `).join('')}
          </div>
        ` : ''}
        <div class="filter-group">
          <span class="lbl">Fill</span>
          ${buckets.map(b => `
            <button class="chip ${state.fillBucket === b.id ? 'active' : ''}" data-bucket="${b.id}" title="${escapeHtml(b.title)}">${escapeHtml(b.label)}</button>
          `).join('')}
        </div>
        ${(state.fillBucket === 'empty' || state.fillBucket === 'full') ? `
          <div class="filter-group">
            <span class="lbl">View</span>
            <button class="chip ${state.groupedView ? 'active' : ''}" data-view-mode="grouped" title="Group sections by course with shared alternatives">Grouped</button>
            <button class="chip ${!state.groupedView ? 'active' : ''}" data-view-mode="list" title="Show each section as its own row (original behavior)">List</button>
          </div>
        ` : ''}
        <div class="filter-group">
          <span class="lbl">Compare</span>
          <button class="chip ${state.showBenchmarks ? 'active' : ''}" id="benchToggle" type="button" title="Compare against college-wide fall enrollment">
            ⊕ vs. College
          </button>
        </div>
        ${scopeGroup}
        <button class="reset" id="resetFilters">Reset filters</button>
      </div>
    `;
  }

  /* =========================================================================
   * DISCIPLINE SUMMARY PANELS
   * ========================================================================= */

  function renderDisciplineSummaries() {
    const snap = currentSnapshot();
    const prevSnap = previousSnapshot();
    let present = [...state.selectedDisciplines]
      .filter(p => snap.rows.some(r => r._prefix === p))
      .sort();

    // If the user has narrowed via the discipline filter chips, only show
    // panels for those disciplines.
    if (state.activeDisciplineFilter.size > 0) {
      present = present.filter(p => state.activeDisciplineFilter.has(p));
    }

    if (present.length === 0) {
      return `<div class="section-title">By Discipline</div>
        <p style="color:var(--ink-mute);font-style:italic;padding:14px 0">None of your selected disciplines appear in this snapshot.</p>`;
    }

    // Note: the auto-hide-when-single-discipline behavior was removed when
    // the per-discipline accordion expansion was added. With expansion, the
    // table provides unique value even at single-discipline scope (it shows
    // the per-course breakdown that the KPI strip cannot). The redundancy
    // concern that motivated the auto-hide is now outweighed by the new
    // information layer.

    const inFilter = (r) =>
      (state.activeDisciplineFilter.size === 0 || state.activeDisciplineFilter.has(r._prefix)) &&
      (state.activeLocations.size === 0 || state.activeLocations.has(r.Location)) &&
      rowInFillBucket(r, state.fillBucket);

    const showBench = state.showBenchmarks;
    const cw = showBench ? collegeWideStats(snap) : null;

    // Build per-discipline rows, then filter out disciplines with zero
    // sections in the current filtered view. Otherwise the table fills
    // with noise rows like "AMSL: 0 sections, 0/0 enrolled, 0% fill, -37.6pp"
    // when a fill bucket like Full or Empty is active.
    const tableRows = present.map(p => {
      const rows = snap.rows.filter(r => r._prefix === p && inFilter(r));
      const prevRows = prevSnap ? prevSnap.rows.filter(r => r._prefix === p && inFilter(r)) : null;

      const sections = rows.length;
      const enrolled = sum(rows, 'Enrolled Students');
      const capacity = sum(rows, 'Capacity');
      const fill = capacity > 0 ? (enrolled / capacity * 100) : 0;

      return { p, rows, prevRows, sections, enrolled, capacity, fill };
    }).filter(d => d.sections > 0);

    if (tableRows.length === 0) {
      return `<div class="section-title">By Discipline <span class="meta">no matches</span></div>
        <p style="color:var(--ink-mute);font-style:italic;padding:14px 0">No discipline has any sections matching the current filters.</p>`;
    }

    // Determine bulk-toggle label. If ANY discipline is currently expanded,
    // the bulk button collapses everything; otherwise it expands. The button
    // operates on the currently-visible discipline set (tableRows), so it
    // doesn't touch state for disciplines not on screen.
    const visiblePrefixes = tableRows.map(d => d.p);
    const anyExpanded = visiblePrefixes.some(p => state.disciplineRowExpansion[p] === true);
    const bulkLabel = anyExpanded ? 'Collapse all' : 'Expand all';
    const bulkAction = anyExpanded ? 'collapse' : 'expand';

    const renderedRows = tableRows.map(d => {
      const { p, rows, prevRows, sections, enrolled, capacity, fill } = d;
      const isExpanded = state.disciplineRowExpansion[p] === true;
      const chevron = isExpanded
        ? '<span class="ds-chev open" aria-hidden="true">▼</span>'
        : '<span class="ds-chev" aria-hidden="true">▶</span>';

      let dFill = '';
      if (prevRows && prevRows.length > 0) {
        const ePrev = sum(prevRows, 'Enrolled Students');
        const cPrev = sum(prevRows, 'Capacity');
        const fPrev = cPrev > 0 ? (ePrev / cPrev * 100) : 0;
        dFill = miniDelta(fill - fPrev, 'pp', 1);
      }

      const vsCollegeCell = (cw && capacity > 0)
        ? `<span class="ds-bench">${miniDelta(fill - cw.fill, 'pp', 1, 'Compared to the college-wide fill rate right now.')}</span>`
        : '<span style="color:var(--ink-mute)">—</span>';

      const fillDisplay = fill > 200
        ? `<strong title="High fill % typically indicates placeholder-capacity sections (e.g., independent study) where ‘capacity’ is set to 1">${fill.toFixed(1)}%</strong>`
        : `<strong>${fill.toFixed(1)}%</strong>`;

      const enrSeries = state.snapshots.map(s =>
        sum(s.rows.filter(r => r._prefix === p && inFilter(r)), 'Enrolled Students')
      );
      const sparkCell = state.snapshots.length > 1
        ? renderSparkline(enrSeries, colorFor(p), 100, 22)
        : '<span style="color:var(--ink-mute)">—</span>';

      // Click target: the row itself toggles both filter and expansion.
      // The chevron toggles only expansion (no filter side-effect). Both
      // are wired up in the event-binding section.
      const disciplineRow = `
        <tr class="ds-row ${isExpanded ? 'expanded' : ''}" data-disc-row="${escapeHtml(p)}">
          <td class="ds-chev-cell" data-disc-chev="${escapeHtml(p)}" title="${isExpanded ? 'Hide course breakdown' : 'Show course breakdown'}">${chevron}</td>
          <td class="ds-disc"><span class="swatch" style="background:${colorFor(p)}"></span><strong>${escapeHtml(p)}</strong></td>
          <td class="right">${sections}</td>
          <td class="right">${enrolled} / ${capacity}</td>
          <td class="right">${fillDisplay} ${dFill}</td>
          <td class="right">${vsCollegeCell}</td>
          <td class="ds-trend">${sparkCell}</td>
        </tr>
      `;

      // Course sub-rows. Only computed when expanded — for collapsed rows
      // we just emit the discipline row alone, keeping render cost down on
      // pages with many disciplines.
      let subRows = '';
      if (isExpanded) {
        // Group this discipline's filtered rows by course code (e.g.
        // 'ENGL-121'). Course rows show the same Sections/Enrolled/Fill
        // columns as the parent so numbers align vertically. The Trend
        // column at course-level is repurposed to show the course title
        // (computing course-level historical trends would require a deeper
        // refactor and isn't yet justified by the use case).
        const byCourse = new Map();
        rows.forEach(r => {
          const c = r.Course;
          if (!byCourse.has(c)) byCourse.set(c, []);
          byCourse.get(c).push(r);
        });

        // Sort alphabetically for predictable position. The
        // higher-volume-first sort that the grouped-view uses isn't
        // appropriate here — chairs scanning the per-course breakdown
        // tend to look for specific courses by code.
        const courseOrder = [...byCourse.keys()].sort((a, b) => a.localeCompare(b));

        subRows = courseOrder.map(courseCode => {
          const courseRows = byCourse.get(courseCode);
          const cSec = courseRows.length;
          const cEnr = sum(courseRows, 'Enrolled Students');
          const cCap = sum(courseRows, 'Capacity');
          const cFill = cCap > 0 ? (cEnr / cCap * 100) : 0;
          const cTitle = courseRows[0]['Course Title'] || '';
          // Suppress fill display for placeholder-capacity oddities (same
          // logic the parent row uses, but inline for course rows).
          const cFillDisplay = cFill > 200
            ? `<strong title="High fill % typically indicates placeholder-capacity sections">${cFill.toFixed(1)}%</strong>`
            : `<strong>${cFill.toFixed(1)}%</strong>`;
          return `
            <tr class="ds-course-row">
              <td></td>
              <td class="ds-course-code">${escapeHtml(courseCode)}</td>
              <td class="right">${cSec}</td>
              <td class="right">${cEnr} / ${cCap}</td>
              <td class="right">${cFillDisplay}</td>
              <td></td>
              <td class="ds-course-title">${escapeHtml(cTitle)}</td>
            </tr>
          `;
        }).join('');
      }

      return disciplineRow + subRows;
    }).join('');

    return `
      <div class="section-title">
        By Discipline
        <span class="meta">${filteredRows().length} sections in view</span>
        <button type="button" class="bulk-toggle" id="bulkDiscRowToggle" data-bulk-action="${bulkAction}" title="${anyExpanded ? 'Collapse course breakdown on every discipline' : 'Expand course breakdown on every discipline'}">${bulkLabel}</button>
      </div>
      <div class="discipline-table-wrap">
        <table class="discipline-table">
          <thead>
            <tr>
              <th class="ds-chev-th"></th>
              <th>Discipline</th>
              <th class="right">Sections</th>
              <th class="right">Enrolled</th>
              <th class="right">Fill</th>
              <th class="right">vs. College</th>
              <th>Trend</th>
            </tr>
          </thead>
          <tbody>${renderedRows}</tbody>
        </table>
      </div>
    `;
  }

  function miniDelta(n, unit, dec, title) {
    const tt = title || (unit === 'pp'
      ? 'Change since the previous snapshot. "pp" = percentage points.'
      : 'Change since the previous snapshot.');
    if (n === 0 || isNaN(n)) return `<span class="flat" title="${escapeHtml(tt)}">—</span>`;
    const cls = n > 0 ? 'up' : 'down';
    const sign = n > 0 ? '+' : '';
    const v = dec ? n.toFixed(dec) : n.toLocaleString();
    return `<span class="${cls}" title="${escapeHtml(tt)}">${sign}${v}${unit || ''}</span>`;
  }

  /* =========================================================================
   * SPARKLINES (inline SVG)
   * ========================================================================= */

  function renderSparkline(series, color, w, h) {
    if (!series || series.length === 0) return '';
    if (series.length === 1) {
      return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
        <circle cx="${w/2}" cy="${h/2}" r="2.5" fill="${color}"/>
      </svg>`;
    }
    const max = Math.max(...series, 1);
    const min = Math.min(...series, 0);
    const pad = 4;
    const range = max - min || 1;
    const step = (w - 2 * pad) / (series.length - 1);
    const points = series.map((v, i) => {
      const x = pad + i * step;
      const y = pad + (h - 2 * pad) * (1 - (v - min) / range);
      return [x, y];
    });
    const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
    const lastPt = points[points.length - 1];
    // Light area fill
    const areaPath = path + ` L${lastPt[0]},${h - pad} L${pad},${h - pad} Z`;
    return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      <path d="${areaPath}" fill="${color}" opacity="0.12"/>
      <path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${lastPt[0].toFixed(1)}" cy="${lastPt[1].toFixed(1)}" r="2.5" fill="${color}"/>
    </svg>`;
  }

  /* =========================================================================
   * COURSE CARDS
   * ========================================================================= */

  // Smart default for whether a discipline's cards should be expanded.
  // Default is COLLAPSED for all disciplines — the dashboard now opens
  // with a tidy list of discipline headers, and users explicitly choose
  // which to expand. Per-discipline explicit choices in state.cardExpansion
  // override this default; they persist across sessions via localStorage.
  function isDisciplineExpanded(prefix, sectionCount) {
    if (Object.prototype.hasOwnProperty.call(state.cardExpansion, prefix)) {
      return state.cardExpansion[prefix];
    }
    return false;
  }

  // Render a single section card. Extracted so we can call it per-discipline.
  function renderSectionCard(r) {
    const fill = r['Section Fill %'];
    const fillCapped = Math.min(100, fill);
    const tags = [];
    if (fill >= 100) tags.push('<span class="tag full">● At Capacity</span>');
    else if (r['Enrolled Students'] === 0) tags.push('<span class="tag empty">● Empty</span>');
    if (r['Wait List'] > 0) tags.push(`<span class="tag wait">+${r['Wait List']} waitlist</span>`);

    const days = cleanCell(r['Meeting Days'], '—');
    const time = cleanCell(r['Section Start Time'], 'TBA');
    const instructor = cleanCell(r.Instructor, 'TBA');
    const color = colorFor(r._prefix);

    const hist = sectionHistory(r.Section);
    const enrSeries = hist.map(h => h.row ? h.row['Enrolled Students'] : null).filter(v => v !== null);
    const showSpark = enrSeries.length >= 2;

    const prevSnap = previousSnapshot();
    let velocity = '';
    if (prevSnap) {
      const prevRow = prevSnap.rows.find(x => x.Section === r.Section);
      if (prevRow) {
        const diff = r['Enrolled Students'] - prevRow['Enrolled Students'];
        velocity = diff === 0
          ? '<span class="v-flat">no change</span>'
          : diff > 0
            ? `<span class="v-up">+${diff} since ${fmtDateShort(prevSnap.date)}</span>`
            : `<span class="v-down">${diff} since ${fmtDateShort(prevSnap.date)}</span>`;
      } else {
        velocity = '<span class="v-flat">new section</span>';
      }
    }

    return `
      <div class="course-card" style="border-left-color:${color}">
        <div class="cc-head">
          <span class="code">${escapeHtml(r.Section)}</span>
          <span class="loc">${escapeHtml(r.Location || '—')}</span>
        </div>
        <div class="title">${escapeHtml(r['Course Title'] || '')}</div>
        <div class="meter"><div class="fill" style="width:${fillCapped}%;background:${color}"></div></div>
        <div class="num-row">
          <span><strong>${r['Enrolled Students']}</strong> / ${r.Capacity} enrolled</span>
          <span><strong>${fill.toFixed(0)}%</strong></span>
        </div>
        <div class="delta-row">
          <span>${velocity}</span>
          ${showSpark ? renderSparkline(enrSeries, color, 90, 22) : ''}
        </div>
        <div class="meta-row">
          <span>${escapeHtml(days)} · ${escapeHtml(time)}</span>
          <span>${escapeHtml(instructor)}</span>
          ${tags.length ? '<span style="flex-basis:100%;margin-top:4px">' + tags.join(' &nbsp; ') + '</span>' : ''}
        </div>
      </div>
    `;
  }

  function renderCourseGrid() {
    const allRows = filteredRows();

    if (allRows.length === 0) {
      return `<div class="section-title">Sections at a Glance</div>
        <p style="color:var(--ink-mute);font-style:italic;padding:14px 0">No sections match the current filters.</p>`;
    }

    // Group rows by discipline prefix
    const byPrefix = {};
    allRows.forEach(r => {
      if (!byPrefix[r._prefix]) byPrefix[r._prefix] = [];
      byPrefix[r._prefix].push(r);
    });

    // Sort prefixes alphabetically; sort rows within each group by section code
    const prefixes = Object.keys(byPrefix).sort();
    prefixes.forEach(p => byPrefix[p].sort((a, b) => String(a.Section).localeCompare(String(b.Section))));

    // Render one section per discipline with a collapsible header
    const groups = prefixes.map(prefix => {
      const sections = byPrefix[prefix];
      const expanded = isDisciplineExpanded(prefix, sections.length);
      const color = colorFor(prefix);
      const totalEnrolled = sum(sections, 'Enrolled Students');
      const totalCapacity = sum(sections, 'Capacity');
      const groupFill = totalCapacity > 0 ? (totalEnrolled / totalCapacity * 100) : 0;

      // Trace shows summary even when collapsed
      const arrow = expanded ? '▼' : '▶';
      const trace = expanded
        ? `<span class="discipline-meta">${sections.length} section${sections.length === 1 ? '' : 's'} · ${totalEnrolled} / ${totalCapacity} enrolled · ${groupFill.toFixed(0)}% fill</span>`
        : `<span class="discipline-meta collapsed-trace">${sections.length} section card${sections.length === 1 ? '' : 's'} (click to show) · ${totalEnrolled} / ${totalCapacity} enrolled · ${groupFill.toFixed(0)}% fill</span>`;

      const cardsHtml = expanded
        ? `<div class="course-grid">${sections.map(renderSectionCard).join('')}</div>`
        : '';

      return `
        <div class="discipline-group">
          <button class="discipline-header" data-toggle-discipline="${escapeHtml(prefix)}" aria-expanded="${expanded}">
            <span class="dh-arrow">${arrow}</span>
            <span class="dh-swatch" style="background:${color}"></span>
            <span class="dh-label">${escapeHtml(prefix)}</span>
            ${trace}
          </button>
          ${cardsHtml}
        </div>
      `;
    }).join('');

    // Determine the bulk-toggle button label. If any discipline is currently
    // expanded, the button collapses everything. If everything is already
    // collapsed, the button expands everything. Button label flips based on
    // the current state so it's always actionable.
    const anyExpanded = prefixes.some(p => isDisciplineExpanded(p, byPrefix[p].length));
    const bulkLabel = anyExpanded ? 'Collapse all' : 'Expand all';
    const bulkAction = anyExpanded ? 'collapse' : 'expand';
    const bulkTooltip = anyExpanded
      ? 'Collapse every discipline card group'
      : 'Expand every discipline card group';

    return `
      <div class="section-title">
        Sections at a Glance
        <span class="meta">click a discipline to expand or collapse its cards</span>
        <button type="button" class="bulk-toggle" id="bulkDisciplineToggle" data-bulk-action="${bulkAction}" title="${escapeHtml(bulkTooltip)}">${bulkLabel}</button>
      </div>
      ${groups}
    `;
  }

  function cleanCell(v, fallback) {
    if (v == null) return fallback;
    const s = String(v).trim();
    if (!s || s === ',' || s === ',,') return fallback;
    return s;
  }

  // ----- Section table search helpers (used by both list and grouped views) -----
  // Brookdale day codes. R is an alias for TH in some academic conventions;
  // we normalize both to "TH" internally.
  const DAY_CODES = new Set(['M', 'T', 'W', 'TH', 'F', 'S']);
  function isDayToken(raw) {
    const upper = String(raw).toUpperCase();
    if (upper === 'R') return 'TH';
    return DAY_CODES.has(upper) ? upper : null;
  }

  // Parse a Meeting Days string into a Set of canonical day codes.
  function parseDays(raw) {
    const codes = new Set();
    if (!raw) return codes;
    const tokens = String(raw).toUpperCase().split(/[^A-Z]+/).filter(Boolean);
    for (const tok of tokens) {
      if (DAY_CODES.has(tok)) codes.add(tok);
      else if (tok === 'R') codes.add('TH');
      else {
        let i = 0;
        while (i < tok.length) {
          if (tok.slice(i, i + 2) === 'TH') { codes.add('TH'); i += 2; continue; }
          const c = tok[i];
          if (DAY_CODES.has(c)) codes.add(c);
          else if (c === 'R') codes.add('TH');
          i += 1;
        }
      }
    }
    return codes;
  }

  const normCompact = (s) =>
    String(s == null ? '' : s).toLowerCase().replace(/[\s\-_,./()\[\]]+/g, '');

  const normPhrase = (s) =>
    String(s == null ? '' : s).toLowerCase().replace(/[\s\-_,./()\[\]]+/g, ' ').trim();

  function parseSearchTokens(input) {
    const tokens = [];
    const re = /"([^"]*)"|(\S+)/g;
    let m;
    while ((m = re.exec(input)) !== null) {
      if (m[1] !== undefined) {
        const phrase = normPhrase(m[1]);
        if (phrase) tokens.push({ kind: 'phrase', value: phrase });
      } else if (m[2] !== undefined) {
        const dayCode = isDayToken(m[2]);
        if (dayCode) {
          tokens.push({ kind: 'day', value: dayCode });
        } else {
          const word = normCompact(m[2]);
          if (word) tokens.push({ kind: 'word', value: word });
        }
      }
    }
    return tokens;
  }

  function sectionMatchesAllTokens(row, tokens) {
    if (tokens.length === 0) return true;
    const raw = [
      row.Section, row['Course Title'], row.Location, row['Meeting Days'],
      row['Section Start Time'], row.Instructor, row.Course,
    ].join(' ');
    const compact = normCompact(raw);
    const phrase = normPhrase(raw);
    const days = parseDays(row['Meeting Days']);
    return tokens.every(t => {
      if (t.kind === 'phrase') return phrase.includes(t.value);
      if (t.kind === 'day') return days.has(t.value);
      return compact.includes(t.value);
    });
  }

  function sectionHistory(sectionCode) {
    return state.snapshots.map(s => ({
      date: s.date,
      row: s.rows.find(r => r.Section === sectionCode) || null,
    }));
  }

  /* =========================================================================
   * TABLE
   * ========================================================================= */

  function renderTable() {
    // When Empty or Full bucket is active AND grouped view is on, render the
    // course-grouped panel display instead of the per-section row table.
    // The grouped view consolidates redundant alternative listings (e.g. for
    // MATH-021's 8 empty sections, alternatives are shown once instead of 8
    // times). Other buckets always use the list view.
    if (state.groupedView && (state.fillBucket === 'empty' || state.fillBucket === 'full')) {
      return renderTableGrouped();
    }

    const headers = [
      { k: 'Section', label: 'Section' },
      { k: 'Course Title', label: 'Title' },
      { k: 'Location', label: 'Loc' },
      { k: 'Capacity', label: 'Cap', right: true },
      { k: 'Enrolled Students', label: 'Enr', right: true },
      { k: '_delta', label: 'Δ Enr', right: true },
      { k: 'Section Fill %', label: 'Fill %', right: true },
      { k: 'Wait List', label: 'Wait', right: true },
      { k: 'Course Credit', label: 'Cr', right: true },
      { k: 'Total Student Credit Hours', label: 'SCH', right: true },
      { k: 'Meeting Days', label: 'Days' },
      { k: 'Section Start Time', label: 'Time' },
      { k: 'Instructor', label: 'Instructor' },
    ];

    const prevSnap = previousSnapshot();
    const prevByCode = {};
    if (prevSnap) prevSnap.rows.forEach(r => { prevByCode[r.Section] = r; });

    const enriched = filteredRows().map(r => ({
      ...r,
      _delta: prevByCode[r.Section] != null
        ? (r['Enrolled Students'] - prevByCode[r.Section]['Enrolled Students'])
        : null,
    }));

    // Apply free-text search across text-bearing columns.
    //
    // Semantics:
    //   1. Each whitespace-separated word is its own ANDed search term.
    //      "ENGI 101 LINC" => find rows containing "engi" AND "101" AND "linc".
    //   2. Quoted phrases are treated as a single term, preserving any spaces.
    //      'powell "Calculus I"' => name "powell" AND literal phrase "calculus i".
    //   3. Both the query and the haystack are normalized by lowercasing and
    //      collapsing all whitespace/punctuation to nothing for compact matching.
    //      So "M,W" in the data is matched as "mw"; the user typing "MW" finds it.
    //      The section code "ENGI-101-001RL" is matched as "engi101001rl", and
    //      a search for "engi 101" splits into "engi" + "101", both of which
    //      appear in the normalized haystack.
    //   4. Inside quoted phrases, internal spaces ARE preserved (other
    //      separators still get collapsed). So "Calculus I" matches "Calculus I"
    //      and "Calculus-I" but treats the space between Calculus and I as
    //      a single space.
    //   5. Day code tokens (M, T, W, TH, F, S, and R as alias for TH) are
    //      treated specially: they match only against the Meeting Days field,
    //      so "M W" means "section meets on both Monday AND Wednesday" rather
    //      than "row contains the letter m AND the letter w somewhere."
    //
    // Implementation note: the search helpers (parseSearchTokens,
    // sectionMatchesAllTokens, parseDays, etc.) are defined at module scope
    // so the grouped view (renderTableGrouped) can use them too.

    const tokens = parseSearchTokens(state.tableSearch);

    const searched = tokens.length === 0
      ? enriched
      : enriched.filter(r => sectionMatchesAllTokens(r, tokens));

    const sorted = searched.slice().sort((a, b) => {
      let av = a[state.sortKey], bv = b[state.sortKey];
      if (av === null) av = -Infinity; if (bv === null) bv = -Infinity;
      if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * state.sortDir;
      av = String(av || ''); bv = String(bv || '');
      return av.localeCompare(bv) * state.sortDir;
    });

    // Combined-class enrichment for the list view (Option A treatment):
    // - For any row in `sorted` that's part of a combined class (MATH only
    //   this iteration), find its partner(s) in the snapshot. If a partner
    //   isn't already in `sorted` (e.g., user filtered to Empty and only
    //   one half of the pair is empty), we pull it in so the chair sees
    //   the full combined picture.
    // - The pair is positioned where the first-encountered member naturally
    //   sorted to; the partner is inserted immediately after, with the
    //   higher-enrolled member sorting to the top of the pair (so the
    //   visual reads "this section is carrying enrollment, this one isn't").
    // - A synthetic summary row is inserted above the pair carrying the
    //   combined-class header information.
    // - Counts ("N of M sections in view") are based on `sorted` BEFORE
    //   this enrichment, so pulled-in partners don't inflate the count.
    const snapForLinked = currentSnapshot();
    const combinedMapList = getCombinedClassMap(snapForLinked);
    const sortedBySection = {};
    snapForLinked && snapForLinked.rows.forEach(r => { sortedBySection[String(r.Section)] = r; });
    const inSortedSet = new Set(sorted.map(r => String(r.Section)));

    // Build the rendering sequence: a list of objects with a type and payload.
    // type='row' carries a single section row; type='linked' carries a group
    // header plus its members. Walk `sorted` in order, but skip subsequent
    // members of a group once it's been emitted.
    const renderSeq = [];
    const emittedLinkedGroups = new Set();
    sorted.forEach(r => {
      const code = String(r.Section);
      const group = combinedMapList.get(code);
      if (!group) {
        renderSeq.push({ type: 'row', row: r });
        return;
      }
      if (emittedLinkedGroups.has(group.key)) return;
      emittedLinkedGroups.add(group.key);
      // Resolve every member of the group to its enriched-row form. If a
      // member is already in `sorted`, use that (carries _delta). Otherwise
      // synthesize a delta from prevByCode the same way `enriched` did.
      const members = group.sections.map(m => {
        const mCode = String(m.Section);
        const inSorted = sorted.find(x => String(x.Section) === mCode);
        if (inSorted) return inSorted;
        // Pulled-in partner — build a comparable enriched object
        const prev = prevByCode[mCode];
        return {
          ...m,
          _delta: prev != null
            ? ((Number(m['Enrolled Students']) || 0) - (Number(prev['Enrolled Students']) || 0))
            : null,
        };
      });
      // Sort group members: higher-fill first so the row that's carrying
      // enrollment reads first, the partner that looks "empty" sits below.
      members.sort((a, b) => {
        const fa = Number(a['Section Fill %']) || 0;
        const fb = Number(b['Section Fill %']) || 0;
        if (fb !== fa) return fb - fa;
        // Tie-breaker: enrollment desc, then section code asc
        const ea = Number(a['Enrolled Students']) || 0;
        const eb = Number(b['Enrolled Students']) || 0;
        if (eb !== ea) return eb - ea;
        return String(a.Section).localeCompare(String(b.Section));
      });
      renderSeq.push({ type: 'linked', group, members });
    });

    // Sibling map: Course code -> all sections of that course (in current snapshot).
    // Used when a fill-status bucket is active to surface context the filter hides:
    // "this section is full — are there alternative sections?" or
    // "this section is empty — is it the only one, or can students go elsewhere?"
    const showSiblings = state.fillBucket !== 'all';
    const snapNow = currentSnapshot();
    const siblingsByCourse = {};
    if (showSiblings && snapNow) {
      snapNow.rows.forEach(row => {
        if (!siblingsByCourse[row.Course]) siblingsByCourse[row.Course] = [];
        siblingsByCourse[row.Course].push(row);
      });
    }

    // Test whether a sibling row would have been visible under the user's
    // current scope (selected disciplines, sub-filters, location). If not,
    // we tag it as "outside scope" in the display.
    const isInScope = (r) => {
      if (!state.selectedDisciplines.has(r._prefix)) return false;
      if (state.activeDisciplineFilter.size > 0 && !state.activeDisciplineFilter.has(r._prefix)) return false;
      if (state.activeLocations.size > 0 && !state.activeLocations.has(r.Location)) return false;
      return true;
    };

    // Build the sibling indicator HTML for a given row, or '' if none
    function renderSiblingIndicator(row) {
      const allSections = siblingsByCourse[row.Course] || [];
      const allSiblings = allSections.filter(s => s.Section !== row.Section);
      const totalSectionsOfCourse = allSections.length;

      // No other sections at all — high-stakes flag (especially for "empty" view,
      // where cancelling this section would kill the course for the term)
      if (allSiblings.length === 0) {
        return `<div class="sibling-row warn" title="No other sections of this course exist in this snapshot">⚠ Only section of ${escapeHtml(row.Course)}</div>`;
      }

      // Filter to "useful" siblings based on the active bucket.
      // The principle: show alternatives, summarize non-alternatives.
      //
      //   Full bucket   -> useful sibling = one with available seats
      //                    (a full sibling isn't an answer to "where do extras go")
      //   Empty bucket  -> useful sibling = one with any enrollment
      //                    (an empty sibling doesn't help absorb students;
      //                     it's just another section in trouble)
      //   Almost/Under  -> useful sibling = one with seats
      //                    (people viewing these are still capacity-planning)
      //   All bucket    -> shouldn't reach here (siblings hidden in 'all' view)
      const bucket = state.fillBucket;
      let isUseful;
      let principle;
      if (bucket === 'empty') {
        isUseful = (s) => (Number(s['Enrolled Students']) || 0) > 0;
        principle = 'with enrollment';
      } else {
        // full, almost, under: show siblings that can absorb students
        isUseful = (s) => {
          const cap = Number(s.Capacity) || 0;
          const enr = Number(s['Enrolled Students']) || 0;
          return cap > enr;
        };
        principle = 'with available seats';
      }

      const useful = allSiblings.filter(isUseful);
      const uselessCount = allSiblings.length - useful.length;

      // No useful alternatives — flag it prominently
      if (useful.length === 0) {
        const tot = totalSectionsOfCourse;
        let warningText;
        if (bucket === 'empty') {
          warningText = `⚠ All ${tot} sections of ${escapeHtml(row.Course)} are empty`;
        } else {
          warningText = `⚠ No alternatives — all ${tot} sections of ${escapeHtml(row.Course)} are full`;
        }
        return `<div class="sibling-row warn">${warningText}</div>`;
      }

      // Render useful siblings; show a small note about hidden non-alternatives
      const items = useful.map(s => {
        const sEnr = Number(s['Enrolled Students']) || 0;
        const sCap = Number(s.Capacity) || 0;
        const seats = Math.max(0, sCap - sEnr);
        const outOfScope = !isInScope(s);
        // Pick a CSS class based on the sibling's own state
        const sFill = Number(s['Section Fill %']) || 0;
        const cls = sEnr === 0 ? 'sib-empty' : sFill >= 100 ? 'sib-full' : 'sib-available';
        const scopeTag = outOfScope ? ` <span class="sib-scope">${escapeHtml(s.Location || '?')}</span>` : '';
        const seatsHtml = bucket === 'empty'
          ? ` <em>(${sEnr} enrolled)</em>`
          : seats > 0 ? ` <em>(${seats} open)</em>` : '';
        return `<span class="sib ${cls}"><strong>${escapeHtml(s.Section.split('-').slice(-1)[0] || s.Section)}</strong> ${sEnr}/${sCap}${seatsHtml}${scopeTag}</span>`;
      }).join(' ');

      const usefulNoun = useful.length === 1 ? 'alternative' : 'alternatives';
      let label = `${useful.length} ${usefulNoun} of ${escapeHtml(row.Course)} ${principle}:`;
      if (uselessCount > 0) {
        const otherWord = bucket === 'empty' ? 'also empty' : 'also full';
        label += ` <span class="sib-note">(${uselessCount} other section${uselessCount === 1 ? '' : 's'} ${otherWord})</span>`;
      }

      return `<div class="sibling-row">${label} ${items}</div>`;
    }

    // Single-row renderer. Extracted so we can call it for standalone rows
    // and for the sub-rows of a combined-class group. The linkedClass param
    // is empty for standalone rows or 'cg-list-linked' for sub-rows; the
    // linkedTagHTML param is empty for standalone or carries the small
    // "linked" tag with tooltip for sub-rows.
    function renderListRow(r, linkedClass, linkedTagHTML) {
      const fill = r['Section Fill %'];
      const fillBadge =
        fill >= 100 ? `<span class="badge full">FULL</span>` :
        fill >= 75 ? `<span class="badge high">${fill.toFixed(0)}%</span>` :
        r['Enrolled Students'] === 0 ? `<span class="badge zero">0%</span>` :
        `<span class="badge low">${fill.toFixed(0)}%</span>`;
      const days = cleanCell(r['Meeting Days'], '—');
      const time = cleanCell(r['Section Start Time'], '—');
      const instructor = cleanCell(r.Instructor, '');
      const fillCapped = Math.min(100, fill);
      const color = colorFor(r._prefix);

      let deltaCell = '<span style="color:var(--ink-mute)">—</span>';
      if (r._delta != null) {
        if (r._delta === 0) deltaCell = '<span class="delta-cell flat">0</span>';
        else if (r._delta > 0) deltaCell = `<span class="delta-cell up">+${r._delta}</span>`;
        else deltaCell = `<span class="delta-cell down">${r._delta}</span>`;
      } else if (prevSnap) {
        deltaCell = '<span style="color:var(--ink-mute);font-style:italic">new</span>';
      }

      const siblingHTML = showSiblings ? renderSiblingIndicator(r) : '';
      const trClass = linkedClass ? ` class="${linkedClass}"` : '';

      return `
        <tr${trClass}>
          <td style="border-left:3px solid ${color}"><strong>${escapeHtml(r.Section)}</strong>${linkedTagHTML || ''}${siblingHTML}</td>
          <td>${escapeHtml(r['Course Title'] || '')}</td>
          <td>${escapeHtml(r.Location || '')}</td>
          <td class="right">${r.Capacity}</td>
          <td class="right">${r['Enrolled Students']}</td>
          <td class="right">${deltaCell}</td>
          <td class="right"><span class="mini-meter"><span class="mf" style="width:${fillCapped}%;background:${color}"></span></span>${fillBadge}</td>
          <td class="right">${r['Wait List'] || ''}</td>
          <td class="right">${r['Course Credit']}</td>
          <td class="right">${r['Total Student Credit Hours']}</td>
          <td>${escapeHtml(days)}</td>
          <td>${escapeHtml(time)}</td>
          <td>${escapeHtml(instructor) || '<em style="color:var(--ink-mute)">TBA</em>'}</td>
        </tr>
      `;
    }

    // Walk the render sequence. Standalone rows render as one <tr>; linked
    // groups emit a colspan summary <tr> followed by their member <tr>s.
    const rows = renderSeq.map(item => {
      if (item.type === 'row') {
        return renderListRow(item.row, '', '');
      }
      // type === 'linked'
      const g = item.group;
      const memberCodes = g.sectionCodes
        .map(c => c.split('-').slice(-1)[0])
        .join(' + ');
      const fillStr = g.combinedCapacity > 0
        ? `${g.combinedEnrolled}/${g.combinedCapacity} · ${g.combinedFill.toFixed(0)}%`
        : `${g.combinedEnrolled} enrolled (capacity not set)`;
      const days = cleanCell(g.days, '—');
      const time = cleanCell(g.time, '—');
      const instr = cleanCell(g.instructor, '');
      const courseShort = String(g.course);
      const summaryRow = `
        <tr class="cg-list-summary">
          <td colspan="13">
            <span class="cg-list-summary-label">Combined class</span>
            <span class="cg-list-summary-pair">${escapeHtml(courseShort)} · ${escapeHtml(memberCodes)}</span>
            <span class="cg-list-summary-meta">${escapeHtml(days)} ${escapeHtml(time)} · ${escapeHtml(instr)}</span>
            <span class="cg-list-summary-fill">${escapeHtml(fillStr)} combined</span>
          </td>
        </tr>
      `;
      const memberRows = item.members.map((m, idx) => {
        const partners = g.sectionCodes
          .filter(c => String(c) !== String(m.Section))
          .map(c => c.split('-').slice(-1)[0])
          .join(', ');
        const tag = ` <span class="cg-linked-tag" title="Co-meets with ${escapeHtml(partners)} — combined ${escapeHtml(fillStr)}">linked</span>`;
        const cls = idx === item.members.length - 1
          ? 'cg-list-linked cg-list-linked-last'
          : 'cg-list-linked';
        return renderListRow(m, cls, tag);
      }).join('');
      return summaryRow + memberRows;
    }).join('');


    const arrow = (k) => state.sortKey === k ? `<span class="arrow">${state.sortDir === 1 ? '▲' : '▼'}</span>` : '';

    // Whether the user has typed something into the search box (active search)
    const hasActiveSearch = tokens.length > 0;

    // Choose an appropriate empty-state message based on cause
    const emptyMessage = searched.length === 0
      ? (hasActiveSearch
          ? `No sections match "${escapeHtml(state.tableSearch)}".`
          : 'No sections match the current filters.')
      : null;

    // Match count display: only shown when searching
    const matchCount = hasActiveSearch
      ? `<span class="search-count">${searched.length} of ${enriched.length}</span>`
      : '';

    return `
      <div class="section-title">Full Section Detail <span class="meta">click any column to sort</span></div>
      <div class="table-toolbar">
        <div class="table-search">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input
            type="text"
            id="tableSearchInput"
            class="search-input"
            placeholder='Search — try "ENGI 101 LINC" or "Powell M W" or "MATH T TH"'
            value="${escapeHtml(state.tableSearch)}"
            autocomplete="off"
            spellcheck="false">
          ${state.tableSearch ? '<button class="search-clear" id="tableSearchClear" type="button" aria-label="Clear search">×</button>' : ''}
        </div>
        ${matchCount}
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              ${headers.map(h => `<th data-sort="${h.k}" class="${h.right ? 'right' : ''}">${h.label}${arrow(h.k)}</th>`).join('')}
            </tr>
          </thead>
          <tbody>${rows || `<tr><td colspan="13" style="text-align:center;padding:24px;color:var(--ink-mute);font-style:italic">${emptyMessage}</td></tr>`}</tbody>
        </table>
      </div>
    `;
  }

  /* =========================================================================
   * TABLE — GROUPED VIEW (Empty and Full buckets only)
   *
   * Consolidates the per-section sibling display into a per-course panel.
   * Instead of repeating MATH-021's 25 alternatives once for each of its 8
   * empty sections, we show the empty sections together and the alternatives
   * once underneath.
   * ========================================================================= */

  function renderTableGrouped() {
    const snap = currentSnapshot();
    if (!snap) {
      return `<div class="section-title">Full Section Detail</div>
        <p style="color:var(--ink-mute);padding:14px 0;font-style:italic">No snapshot loaded.</p>`;
    }

    const bucket = state.fillBucket;  // 'empty' or 'full'
    const prevSnap = previousSnapshot();
    const prevByCode = {};
    if (prevSnap) prevSnap.rows.forEach(r => { prevByCode[r.Section] = r; });

    // Combined-class lookup for this snapshot. Maps section code -> group
    // metadata when the section is part of a co-meeting class (MATH only
    // this iteration). Renderer uses this to draw a "linked" header above
    // sections that belong together, with combined enrollment shown.
    const combinedMap = getCombinedClassMap(snap);

    // Get the filtered rows (respects discipline/location/sub-filter selection
    // AND the active fill bucket). These are the "triggered" sections — what
    // the user is currently filtering to.
    const triggered = filteredRows();

    // Apply table search if present (same logic as list view)
    const tokens = parseSearchTokens(state.tableSearch);
    const searched = tokens.length > 0
      ? triggered.filter(r => sectionMatchesAllTokens(r, tokens))
      : triggered;

    if (searched.length === 0) {
      const hasActiveSearch = tokens.length > 0;
      const emptyMessage = hasActiveSearch
        ? `No sections match "${escapeHtml(state.tableSearch)}".`
        : `No sections match the current filters.`;
      return `${renderTableToolbar(triggered.length, searched.length, hasActiveSearch)}
        <p style="color:var(--ink-mute);padding:24px;font-style:italic;text-align:center">${emptyMessage}</p>`;
    }

    // Group triggered sections by course code (e.g. "MATH-021", "ENGL-121")
    const byCourse = {};
    searched.forEach(r => {
      if (!byCourse[r.Course]) byCourse[r.Course] = [];
      byCourse[r.Course].push(r);
    });

    // Sort courses alphabetically. Predictable position is more valuable
    // than "biggest problem first" — chairs looking for a specific course
    // (e.g., "where's BIOL-112?") want to know exactly where to find it.
    const courseOrder = Object.keys(byCourse).sort((a, b) => a.localeCompare(b));

    // For each course, also collect ALL sections from the snapshot (not just
    // the triggered ones), so we can show alternatives.
    const allSectionsByCourse = {};
    snap.rows.forEach(r => {
      if (!allSectionsByCourse[r.Course]) allSectionsByCourse[r.Course] = [];
      allSectionsByCourse[r.Course].push(r);
    });

    // Determine "useful alternative" predicate based on bucket.
    //
    //   Empty bucket -> alternative = has enrollment AND open seats.
    //     The "has enrollment" part rules out other empty siblings (which
    //     don't help absorb students). The "open seats" part rules out
    //     siblings that are already full — a 23/23 section has zero room
    //     to redirect students to, even though it's nominally a sibling.
    //
    //   Full bucket  -> alternative = has open seats.
    //     Same logic from the other direction: full siblings don't help.
    const isAlternative = (s) => {
      const enr = Number(s['Enrolled Students']) || 0;
      const cap = Number(s.Capacity) || 0;
      const hasOpenSeats = cap > enr;
      if (bucket === 'empty') return enr > 0 && hasOpenSeats;
      // bucket === 'full'
      return hasOpenSeats;
    };

    // Render one course panel
    const panels = courseOrder.map(courseCode => {
      const triggeredSections = byCourse[courseCode];
      const allSections = allSectionsByCourse[courseCode] || [];
      const alternatives = allSections.filter(s =>
        !triggeredSections.some(t => t.Section === s.Section) && isAlternative(s)
      );
      const courseTitle = triggeredSections[0]['Course Title'] || '';
      const prefix = triggeredSections[0]._prefix;
      const color = colorFor(prefix);

      // Stats for the course header
      const totalSections = allSections.length;
      const triggeredCount = triggeredSections.length;
      const enrolledCount = allSections.filter(s => (Number(s['Enrolled Students']) || 0) > 0).length;
      const totalWait = sum(allSections, 'Wait List');

      const courseStats = bucket === 'empty'
        ? `<strong>${triggeredCount}</strong> of ${totalSections} section${totalSections === 1 ? '' : 's'} empty · <strong>${enrolledCount}</strong> with enrollment`
        : `<strong>${triggeredCount}</strong> of ${totalSections} section${totalSections === 1 ? '' : 's'} at/over capacity${totalWait > 0 ? ` · <strong>${totalWait}</strong> students waitlisted` : ''}`;

      // Waitlist callout for full bucket. Includes day-summary alongside
      // each section so chairs can see at a glance whether a schedule
      // mismatch might be why students aren't switching to an alternative.
      let waitlistCallout = '';
      if (bucket === 'full' && totalWait > 0) {
        const withWait = triggeredSections
          .filter(s => (Number(s['Wait List']) || 0) > 0)
          .sort((a, b) => (Number(b['Wait List']) || 0) - (Number(a['Wait List']) || 0));
        if (withWait.length > 0) {
          const parts = withWait.map(s => {
            const w = Number(s['Wait List']) || 0;
            const code = s.Section.split('-').slice(-1)[0] || s.Section;
            const days = cleanCell(s['Meeting Days'], '');
            const time = cleanCell(s['Section Start Time'], '');
            const schedule = (days || time)
              ? ` <span class="cg-callout-schedule">${escapeHtml(days)}${days && time ? ' ' : ''}${escapeHtml(time)}</span>`
              : '';
            return `${escapeHtml(code)} (${w})${schedule}`;
          }).join(', ');
          waitlistCallout = `<div class="cg-waitlist-callout">⚠ <strong>Unmet demand:</strong> Waitlists on ${parts}</div>`;
        }
      }

      // Placeholder-capacity note for fill > 200% (e.g. ACAD-089 with cap=1)
      let placeholderNote = '';
      if (bucket === 'full') {
        const allOverFill = triggeredSections.every(s => {
          const enr = Number(s['Enrolled Students']) || 0;
          const cap = Number(s.Capacity) || 0;
          return cap > 0 && (enr / cap) > 2;
        });
        if (allOverFill && triggeredSections.length > 0) {
          placeholderNote = `<div class="cg-placeholder-note">ℹ <strong>Note:</strong> Sections show very high fill percentages, likely due to placeholder-capacity convention (e.g., capacity of 1 for independent study). Decisions here differ from regular capacity decisions.</div>`;
        }
      }

      // Render triggered sections (compact rows). When the user has
      // explicitly expanded this course's triggered list, show all of them;
      // otherwise truncate after 6 with a "show all" toggle.
      const MAX_TRIGGERED_INLINE = 8;
      const triggeredExpansionKey = `${courseCode}:triggered`;
      const triggeredExpanded = state.groupedExpansion[triggeredExpansionKey] === true;
      const naturallyFits = triggeredSections.length <= MAX_TRIGGERED_INLINE;
      const showAllTriggered = triggeredExpanded || naturallyFits;
      const triggeredVisible = showAllTriggered ? triggeredSections : triggeredSections.slice(0, 6);

      // Render a single section row. Factored out so we can call it both
      // for standalone (non-linked) sections and for sub-rows of a
      // combined-class block. The inLinked flag adds the cg-linked-row
      // class for subtle indentation/styling and adds the neutral linked
      // tag next to the section code.
      const renderSectionRow = (s, inLinked) => {
        const sectionCode = s.Section.split('-').slice(-1)[0] || s.Section;
        const days = cleanCell(s['Meeting Days'], '—');
        const time = cleanCell(s['Section Start Time'], 'TBA');
        const instructor = cleanCell(s.Instructor, '');
        const instructorHTML = instructor
          ? escapeHtml(instructor)
          : '<span class="cg-instr-tba">TBA</span>';
        const enr = Number(s['Enrolled Students']) || 0;
        const cap = Number(s.Capacity) || 0;
        const wait = Number(s['Wait List']) || 0;
        const fillPct = cap > 0 ? (enr / cap * 100) : 0;
        const formatTag = formatTagFor(s);
        const locationCode = cleanCell(s.Location, '—');
        const linkedClass = inLinked ? ' cg-linked-row' : '';

        if (bucket === 'empty') {
          return `
            <div class="cg-triggered-row cg-row-empty${linkedClass}">
              <span class="code">${escapeHtml(sectionCode)}</span>
              <span>${escapeHtml(locationCode)}</span>
              <span>${formatTag}</span>
              <span>${escapeHtml(days)}</span>
              <span>${escapeHtml(time)}</span>
              <span>${instructorHTML}</span>
            </div>
          `;
        } else {
          const waitCell = wait > 0
            ? `<span style="color:var(--warn);font-weight:600">${wait} waiting</span>`
            : '<span style="color:var(--ink-mute)">—</span>';
          return `
            <div class="cg-triggered-row cg-row-full${linkedClass}">
              <span class="code">${escapeHtml(sectionCode)}</span>
              <span>${escapeHtml(locationCode)}</span>
              <span>${formatTag}</span>
              <span>${enr}/${cap} (${fillPct.toFixed(0)}%)</span>
              <span>${waitCell}</span>
              <span>${escapeHtml(days)}</span>
              <span>${escapeHtml(time)}</span>
              <span>${instructorHTML}</span>
            </div>
          `;
        }
      };

      // Build the ordered list of items to render. Walk triggeredVisible
      // in order; when a section belongs to a combined-class group, emit a
      // combined-block (header + all group members, even those not in the
      // triggered subset, so the chair sees the full picture) and skip
      // past the other group members. Sections not in any group emit as
      // standalone rows.
      const triggeredCodeSet = new Set(triggeredVisible.map(r => String(r.Section)));
      const emittedGroups = new Set();
      const triggeredRowsHTML = triggeredVisible.map(s => {
        const sectionCode = String(s.Section);
        const group = combinedMap.get(sectionCode);

        if (!group) {
          // Standalone (not part of any combined class)
          return renderSectionRow(s, false);
        }
        // Combined class — emit the group block once, on the first
        // visible member encountered.
        if (emittedGroups.has(group.key)) return '';
        emittedGroups.add(group.key);

        const combinedEnr = group.combinedEnrolled;
        const combinedCap = group.combinedCapacity;
        const combinedFill = group.combinedFill;
        const fillStr = combinedCap > 0
          ? `${combinedEnr}/${combinedCap} · ${combinedFill.toFixed(0)}%`
          : `${combinedEnr} enrolled (capacity not set)`;
        const partnerCodes = group.sectionCodes
          .map(c => c.split('-').slice(-1)[0])
          .join(' + ');
        // Render every member of the group as a sub-row, with a small
        // "linked · co-meets with X" tag pointing at the partner(s) other
        // than this section itself. Show all members even if some weren't
        // in triggeredVisible — the full combined picture is the point.
        const subRows = group.sections.map(member => {
          const memberCode = String(member.Section).split('-').slice(-1)[0];
          const partners = group.sectionCodes
            .filter(c => String(c) !== String(member.Section))
            .map(c => c.split('-').slice(-1)[0])
            .join(', ');
          const tag = `<span class="cg-linked-tag" title="Co-meets with ${escapeHtml(partners)}">linked</span>`;
          // Wrap with the linked-tag inline: we accomplish this by
          // replacing the section-code cell post-render. Cleaner to just
          // build the row markup ourselves, mirroring renderSectionRow:
          const days = cleanCell(member['Meeting Days'], '—');
          const time = cleanCell(member['Section Start Time'], 'TBA');
          const instructor = cleanCell(member.Instructor, '');
          const instructorHTML = instructor
            ? escapeHtml(instructor)
            : '<span class="cg-instr-tba">TBA</span>';
          const enr = Number(member['Enrolled Students']) || 0;
          const cap = Number(member.Capacity) || 0;
          const wait = Number(member['Wait List']) || 0;
          const fillPct = cap > 0 ? (enr / cap * 100) : 0;
          const formatTag = formatTagFor(member);
          const locationCode = cleanCell(member.Location, '—');

          if (bucket === 'empty') {
            return `
              <div class="cg-triggered-row cg-row-empty cg-linked-row">
                <span class="code">${escapeHtml(memberCode)} ${tag}</span>
                <span>${escapeHtml(locationCode)}</span>
                <span>${formatTag}</span>
                <span>${escapeHtml(days)}</span>
                <span>${escapeHtml(time)}</span>
                <span>${instructorHTML}</span>
              </div>
            `;
          } else {
            const waitCell = wait > 0
              ? `<span style="color:var(--warn);font-weight:600">${wait} waiting</span>`
              : '<span style="color:var(--ink-mute)">—</span>';
            return `
              <div class="cg-triggered-row cg-row-full cg-linked-row">
                <span class="code">${escapeHtml(memberCode)} ${tag}</span>
                <span>${escapeHtml(locationCode)}</span>
                <span>${formatTag}</span>
                <span>${enr}/${cap} (${fillPct.toFixed(0)}%)</span>
                <span>${waitCell}</span>
                <span>${escapeHtml(days)}</span>
                <span>${escapeHtml(time)}</span>
                <span>${instructorHTML}</span>
              </div>
            `;
          }
        }).join('');

        return `
          <div class="cg-linked-block">
            <div class="cg-linked-header">
              <span class="cg-linked-label">Combined class · ${escapeHtml(partnerCodes)}</span>
              <span class="cg-linked-fill">${fillStr} combined</span>
            </div>
            ${subRows}
          </div>
        `;
      }).filter(Boolean).join('');

      const triggeredHeaderRow = bucket === 'empty'
        ? `<div class="cg-triggered-row cg-row-empty cg-row-header">
            <span class="code">Section</span><span>Location</span><span>Format</span><span>Days</span><span>Time</span><span>Instructor</span>
          </div>`
        : `<div class="cg-triggered-row cg-row-full cg-row-header">
            <span class="code">Section</span><span>Location</span><span>Format</span><span>Fill</span><span>Waitlist</span><span>Days</span><span>Time</span><span>Instructor</span>
          </div>`;

      // Build the "show all / collapse" toggle (only when truncating could apply)
      let triggeredTruncatedMsg = '';
      if (!naturallyFits) {
        triggeredTruncatedMsg = triggeredExpanded
          ? `<div class="cg-truncation-note"><button type="button" class="cg-toggle-link" data-grouped-toggle="${escapeHtml(triggeredExpansionKey)}">show fewer</button></div>`
          : `<div class="cg-truncation-note">Showing first 6 of ${triggeredSections.length} · <button type="button" class="cg-toggle-link" data-grouped-toggle="${escapeHtml(triggeredExpansionKey)}">show all</button></div>`;
      }

      const triggeredPanel = `
        <div class="cg-triggered-sections">
          <div class="cg-panel-label">${bucket === 'empty' ? 'Empty sections' : 'Full sections'} (${triggeredSections.length})</div>
          ${triggeredHeaderRow}
          ${triggeredRowsHTML}
          ${triggeredTruncatedMsg}
        </div>
      `;

      // Render alternatives — split into priority (50%+ full) and more-room
      let alternativesPanel = '';
      if (alternatives.length === 0) {
        // The warning text adapts based on whether this course has just one
        // section or multiple. With one section, there's nothing to say about
        // "course-level problems" or "intervention" — it's just that the only
        // section is empty/full. With multiple sections all in the same state,
        // the broader "this is a course-level concern" framing is genuine and
        // worth surfacing.
        let warningText;
        if (totalSections === 1) {
          warningText = bucket === 'empty'
            ? `⚠ <strong>The only section of ${escapeHtml(courseCode)} is empty.</strong>`
            : `⚠ <strong>The only section of ${escapeHtml(courseCode)} is at or over capacity.</strong>`;
        } else {
          warningText = bucket === 'empty'
            ? `⚠ <strong>No in-course alternatives</strong> — all ${totalSections} sections of ${escapeHtml(courseCode)} are empty. This suggests a course-level enrollment problem, not a section-specific one. Cancellation or marketing-side intervention may be needed at the course level.`
            : `⚠ <strong>No in-course alternatives</strong> — all ${totalSections} sections of ${escapeHtml(courseCode)} are at or over capacity. Consider opening additional sections; redirecting waitlisted students within this course is not possible.`;
        }
        alternativesPanel = `<div class="cg-alternatives"><div class="cg-no-alts-warning">${warningText}</div></div>`;
      } else {
        // Merge all alternatives into a single list sorted by fill descending.
