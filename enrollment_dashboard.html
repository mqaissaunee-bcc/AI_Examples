<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Enrollment Ledger — Faculty Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #f4f1ea;
    --surface: #ffffff;
    --surface-2: #faf7f0;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-mute: #8a8580;
    --rule: #d9d3c4;
    --rule-strong: #1a1a1a;
    --good: #2d5a3d;
    --warn: #c4452d;
    --warn-soft: #e8a995;
    --info: #2c5f8d;
    --shadow: 0 1px 0 rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
    --up: #2d5a3d;
    --down: #c4452d;
    --flat: #8a8580;
  }
  [data-theme="dark"] {
    --bg: #1a1814;
    --surface: #252118;
    --surface-2: #2c2820;
    --ink: #f0ead8;
    --ink-soft: #c4bfb1;
    --ink-mute: #807a6e;
    --rule: #3a3528;
    --rule-strong: #f0ead8;
    --good: #6ba87f;
    --warn: #e36849;
    --warn-soft: #6b3025;
    --info: #6ea3c9;
    --shadow: 0 1px 0 rgba(0,0,0,0.2), 0 8px 24px rgba(0,0,0,0.4);
    --up: #6ba87f;
    --down: #e36849;
    --flat: #807a6e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
    line-height: 1.5;
    min-height: 100vh;
    padding: 24px;
    transition: background 0.3s, color 0.3s;
  }
  .container { max-width: 1400px; margin: 0 auto; }

  /* Masthead */
  header.masthead {
    border-top: 6px solid var(--rule-strong);
    border-bottom: 1px solid var(--rule-strong);
    padding: 16px 0 12px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
  }
  .masthead .edition {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-mute);
  }
  .masthead h1 {
    font-family: 'Didot', 'Bodoni 72', 'Bodoni MT', 'Playfair Display', Georgia, serif;
    font-weight: 400;
    font-size: clamp(28px, 4vw, 44px);
    letter-spacing: -0.01em;
    text-align: center;
    line-height: 1.05;
  }
  .masthead .controls {
    display: flex; gap: 8px; justify-content: flex-end; align-items: center; flex-wrap: wrap;
  }
  .btn {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    background: transparent;
    border: 1px solid var(--rule-strong);
    color: var(--ink);
    padding: 8px 14px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn:hover { background: var(--rule-strong); color: var(--bg); }
  .btn.primary { background: var(--rule-strong); color: var(--bg); }
  .btn.primary:hover { opacity: 0.85; }
  .btn.ghost { border-color: var(--rule); color: var(--ink-mute); }
  .btn.ghost:hover { border-color: var(--rule-strong); background: transparent; color: var(--ink); }
  .btn.danger { border-color: var(--warn); color: var(--warn); }
  .btn.danger:hover { background: var(--warn); color: #fff; }
  input[type="file"] { display: none; }

  .subline {
    text-align: center;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 14px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--rule);
  }
  .subline .pipe { color: var(--ink-mute); margin: 0 10px; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--rule-strong);
    margin-bottom: 24px;
  }
  .tab {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    color: var(--ink-mute);
    padding: 12px 20px;
    cursor: pointer;
    transition: color 0.15s;
  }
  .tab:hover { color: var(--ink); }
  .tab.active {
    color: var(--ink);
    border-bottom-color: var(--rule-strong);
    font-weight: 700;
  }
  .tab .count {
    display: inline-block;
    background: var(--surface-2);
    border: 1px solid var(--rule);
    padding: 1px 6px;
    margin-left: 6px;
    font-size: 10px;
    border-radius: 8px;
  }

  /* Welcome / empty state */
  .welcome {
    background: var(--surface);
    border: 1px solid var(--rule);
    padding: 60px 40px;
    text-align: center;
    box-shadow: var(--shadow);
    max-width: 720px;
    margin: 40px auto;
  }
  .welcome h2 {
    font-family: 'Didot', 'Bodoni 72', Georgia, serif;
    font-weight: 400;
    font-size: 36px;
    margin-bottom: 16px;
    line-height: 1.1;
  }
  .welcome p {
    color: var(--ink-soft);
    margin: 0 auto 16px;
    max-width: 540px;
  }
  .welcome .step {
    display: grid;
    grid-template-columns: 32px 1fr;
    gap: 16px;
    text-align: left;
    max-width: 480px;
    margin: 24px auto;
    padding: 12px 0;
    border-bottom: 1px dotted var(--rule);
  }
  .welcome .step:last-of-type { border-bottom: none; }
  .welcome .step .num {
    font-family: 'Didot', 'Bodoni 72', Georgia, serif;
    font-size: 24px;
    color: var(--ink-mute);
    text-align: center;
    line-height: 1.2;
  }
  .welcome .step .body { font-size: 14px; }
  .welcome .step .body strong { display: block; margin-bottom: 2px; font-family: 'Helvetica Neue', sans-serif; font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; }
  .welcome .upload-btn {
    display: inline-block;
    background: var(--rule-strong);
    color: var(--bg);
    padding: 14px 28px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    cursor: pointer;
    margin-top: 16px;
    border: none;
  }
  .welcome .upload-btn:hover { opacity: 0.85; }

  /* Discipline picker modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--rule-strong);
    max-width: 720px; width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 24px 60px rgba(0,0,0,0.3);
  }
  .modal .modal-head {
    padding: 20px 24px;
    border-bottom: 1px solid var(--rule);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal .modal-head h2 {
    font-family: 'Didot', 'Bodoni 72', Georgia, serif;
    font-weight: 400;
    font-size: 24px;
  }
  .modal .modal-body { padding: 20px 24px; }
  .modal .modal-foot {
    padding: 16px 24px;
    border-top: 1px solid var(--rule);
    display: flex; justify-content: space-between; gap: 8px;
    background: var(--surface-2);
  }
  .modal .close { background: none; border: none; cursor: pointer; color: var(--ink-mute); font-size: 24px; }

  .institute-group {
    margin-bottom: 18px;
    border: 1px solid var(--rule);
    background: var(--surface-2);
  }
  .institute-group .ig-head {
    padding: 8px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--rule);
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    display: flex; justify-content: space-between; align-items: center;
  }
  .institute-group .ig-head .ig-actions { display: flex; gap: 8px; }
  .institute-group .ig-head a {
    font-size: 10px; color: var(--ink-mute); cursor: pointer; text-decoration: underline;
  }
  .institute-group .ig-body {
    padding: 10px 14px;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .disc-chip {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px;
    padding: 6px 12px;
    border: 1px solid var(--rule);
    background: var(--surface);
    color: var(--ink);
    cursor: pointer;
    user-select: none;
    transition: all 0.12s;
    display: flex; align-items: center; gap: 6px;
  }
  .disc-chip:hover { border-color: var(--ink); }
  .disc-chip.selected {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .disc-chip .ct {
    font-size: 10px;
    opacity: 0.7;
  }

  .preset-row {
    padding: 12px 14px;
    background: var(--surface-2);
    border: 1px solid var(--rule);
    margin-bottom: 18px;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .preset-row .preset-label {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-mute);
    margin-right: 8px;
  }
  .preset-row .preset-chip {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    padding: 5px 10px;
    border: 1px solid var(--rule);
    background: var(--surface);
    color: var(--ink-soft);
    cursor: pointer;
  }
  .preset-row .preset-chip:hover { border-color: var(--ink); color: var(--ink); }
  .preset-row .preset-chip .x { color: var(--ink-mute); margin-left: 6px; }
  .preset-row .preset-chip .x:hover { color: var(--warn); }

  /* KPI strip */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: var(--surface);
    border-top: 1px solid var(--rule-strong);
    border-bottom: 1px solid var(--rule-strong);
    margin-bottom: 24px;
  }
  .kpi {
    padding: 18px 22px;
    border-right: 1px solid var(--rule);
  }
  .kpi:last-child { border-right: none; }
  .kpi .label {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-mute);
    margin-bottom: 6px;
  }
  .kpi .value {
    font-family: 'Didot', 'Bodoni 72', Georgia, serif;
    font-size: 34px;
    font-weight: 400;
    line-height: 1;
    display: flex; align-items: baseline; gap: 8px;
  }
  .kpi .delta {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px;
    font-weight: 600;
  }
  .kpi .delta.up { color: var(--up); }
  .kpi .delta.down { color: var(--down); }
  .kpi .delta.flat { color: var(--flat); }
  .kpi .sub { font-style: italic; color: var(--ink-soft); font-size: 12px; margin-top: 6px; }
  .kpi .bench {
    font-style: normal;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-left: 4px;
  }
  .bench.up { color: var(--up); }
  .bench.down { color: var(--down); }
  .bench.flat { color: var(--flat); font-weight: 400; font-style: italic; }

  /* Filter bar */
  .filter-bar {
    background: var(--surface-2);
    border: 1px solid var(--rule);
    padding: 14px 18px;
    margin-bottom: 24px;
    display: flex; flex-wrap: wrap; gap: 18px; align-items: center;
  }
  .filter-group { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .filter-group .lbl {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--ink-mute); margin-right: 4px;
  }
  .chip {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    padding: 5px 11px;
    border: 1px solid var(--rule);
    background: var(--surface);
    color: var(--ink-soft);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.12s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .chip:hover { border-color: var(--ink); color: var(--ink); }
  .chip.active {
    background: var(--rule-strong);
    color: var(--bg);
    border-color: var(--rule-strong);
  }
  .chip .swatch {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }
  .filter-bar .reset {
    margin-left: auto;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em;
    background: transparent; border: none; color: var(--ink-mute);
    cursor: pointer; text-decoration: underline;
  }
  .filter-bar .reset:hover { color: var(--ink); }

  /* Section title */
  .section-title {
    font-family: 'Didot', 'Bodoni 72', Georgia, serif;
    font-size: 22px;
    font-weight: 400;
    margin: 28px 0 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--rule-strong);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .section-title .meta {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-mute);
    font-style: normal;
  }

  .grid-auto {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 16px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-top: 3px solid var(--rule);
    padding: 16px 18px 14px;
    box-shadow: var(--shadow);
  }
  .panel h3 {
    font-family: 'Didot', 'Bodoni 72', Georgia, serif;
    font-weight: 400;
    font-size: 18px;
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 10px;
  }
  .panel h3 .swatch { width: 12px; height: 12px; display: inline-block; }
  .panel .panel-sub {
    font-style: italic; color: var(--ink-mute); font-size: 12px; margin-bottom: 12px;
  }
  .panel .stat-row {
    display: grid; grid-template-columns: 1fr auto auto; gap: 10px;
    padding: 5px 0;
    border-bottom: 1px dotted var(--rule);
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px;
    align-items: center;
  }
  .panel .stat-row:last-child { border-bottom: none; }
  .panel .stat-row .k { color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.1em; font-size: 10px; }
  .panel .stat-row .v { font-weight: 600; font-variant-numeric: tabular-nums; }
  .panel .stat-row .d {
    font-size: 10px; font-weight: 600;
    min-width: 40px; text-align: right;
  }
  .panel .stat-row .d.up { color: var(--up); }
  .panel .stat-row .d.down { color: var(--down); }
  .panel .stat-row .d.flat { color: var(--flat); }
  .panel .panel-sparkline { margin-top: 10px; }

  /* Course cards */
  .course-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 14px;
  }
  .course-card {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-left: 4px solid var(--rule);
    padding: 14px 16px;
    box-shadow: var(--shadow);
    transition: transform 0.15s;
  }
  .course-card:hover { transform: translateY(-2px); }
  .course-card .cc-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px; gap: 8px;
  }
  .course-card .code {
    font-family: 'Helvetica Neue', sans-serif;
    font-weight: 700; font-size: 13px; letter-spacing: 0.04em;
  }
  .course-card .loc {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--ink-mute);
    border: 1px solid var(--rule);
    padding: 2px 6px;
  }
  .course-card .title {
    font-style: italic; color: var(--ink-soft);
    font-size: 13px; margin-bottom: 10px; min-height: 2.6em;
  }
  .course-card .meter {
    height: 8px;
    background: var(--surface-2);
    border: 1px solid var(--rule);
    position: relative;
    margin-bottom: 6px;
    overflow: hidden;
  }
  .course-card .meter .fill {
    position: absolute; top: 0; left: 0; bottom: 0;
    background: var(--ink);
    transition: width 0.4s ease;
  }
  .course-card .num-row {
    display: flex; justify-content: space-between;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px; color: var(--ink-soft);
    margin-bottom: 4px;
  }
  .course-card .num-row strong { color: var(--ink); }
  .course-card .delta-row {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .course-card .delta-row .v-up { color: var(--up); font-weight: 700; }
  .course-card .delta-row .v-down { color: var(--down); font-weight: 700; }
  .course-card .delta-row .v-flat { color: var(--flat); }
  .course-card .meta-row {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-top: 1px dotted var(--rule);
    padding-top: 8px;
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px;
  }
  .course-card .meta-row .tag.full { color: var(--good); font-weight: 700; }
  .course-card .meta-row .tag.empty { color: var(--warn); font-weight: 700; }
  .course-card .meta-row .tag.wait { color: var(--warn); font-weight: 700; }

  /* Sparklines */
  .spark { display: inline-block; vertical-align: middle; }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--rule);
    overflow-x: auto;
    box-shadow: var(--shadow);
  }
  table { width: 100%; border-collapse: collapse; font-family: 'Helvetica Neue', sans-serif; font-size: 12px; }
  thead th {
    background: var(--surface-2);
    border-bottom: 2px solid var(--rule-strong);
    padding: 10px 12px;
    text-align: left;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  thead th:hover { background: var(--rule); }
  thead th .arrow { color: var(--ink-mute); margin-left: 4px; }
  tbody td { padding: 9px 12px; border-bottom: 1px solid var(--rule); vertical-align: middle; }
  tbody tr:hover { background: var(--surface-2); }
  td.right { text-align: right; font-variant-numeric: tabular-nums; }
  td.center { text-align: center; }
  td .mini-meter {
    width: 70px; height: 6px;
    background: var(--surface-2);
    border: 1px solid var(--rule);
    display: inline-block; position: relative; vertical-align: middle; margin-right: 8px;
  }
  td .mini-meter .mf { position: absolute; top: 0; left: 0; bottom: 0; background: var(--ink); }

  .badge {
    display: inline-block;
    padding: 2px 7px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border: 1px solid var(--rule);
    background: var(--surface);
    color: var(--ink-soft);
  }
  .badge.full { background: var(--good); color: #fff; border-color: var(--good); }
  .badge.high { background: var(--info); color: #fff; border-color: var(--info); }
  .badge.low { background: transparent; color: var(--warn); border-color: var(--warn); }
  .badge.zero { background: var(--warn); color: #fff; border-color: var(--warn); }

  .delta-cell {
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .delta-cell.up { color: var(--up); }
  .delta-cell.down { color: var(--down); }
  .delta-cell.flat { color: var(--flat); }

  /* Snapshot management */
  .snapshot-list {
    border: 1px solid var(--rule);
    background: var(--surface);
  }
  .snap-row {
    display: grid;
    grid-template-columns: auto 1fr auto auto auto;
    gap: 16px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--rule);
    align-items: center;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13px;
  }
  .snap-row:last-child { border-bottom: none; }
  .snap-row.current { background: var(--surface-2); }
  .snap-row .date {
    font-family: 'Didot', Georgia, serif;
    font-size: 18px;
    min-width: 100px;
  }
  .snap-row .name { color: var(--ink-soft); font-style: italic; }
  .snap-row .stats { font-size: 11px; color: var(--ink-mute); white-space: nowrap; }
  .snap-row .badge.cur { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--ink);
    color: var(--bg);
    padding: 14px 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13px;
    z-index: 200;
    max-width: 380px;
    animation: toastIn 0.25s ease;
  }
  @keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .toast .toast-actions { margin-top: 8px; display: flex; gap: 10px; }
  .toast button {
    background: transparent;
    border: 1px solid var(--bg);
    color: var(--bg);
    padding: 4px 10px;
    font-family: inherit;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
  }
  .toast button:hover { background: var(--bg); color: var(--ink); }

  /* Trend chart */
  .trend-chart-wrap {
    background: var(--surface);
    border: 1px solid var(--rule);
    padding: 18px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .trend-chart-wrap h4 {
    font-family: 'Didot', Georgia, serif;
    font-weight: 400;
    font-size: 16px;
    margin-bottom: 4px;
  }
  .trend-chart-wrap .legend {
    display: flex; gap: 14px; flex-wrap: wrap;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 12px;
  }
  .trend-chart-wrap .legend span {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .trend-chart-wrap .legend .sw {
    display: inline-block; width: 16px; height: 3px;
  }

  /* Footer */
  footer {
    margin-top: 48px;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-mute);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }

  @media (max-width: 880px) {
    .kpi-strip { grid-template-columns: repeat(2, 1fr); }
    .kpi { border-bottom: 1px solid var(--rule); }
    .kpi:nth-child(2n) { border-right: none; }
    .masthead { grid-template-columns: 1fr; text-align: center; }
    .masthead .controls { justify-content: center; }
    .masthead .edition { text-align: center; }
  }

  @media print {
    body { padding: 0; background: #fff; color: #000; }
    .masthead .controls, .filter-bar .reset, .welcome, .modal-overlay, .toast, .tabs { display: none; }
    .panel, .course-card, .table-wrap { box-shadow: none; break-inside: avoid; }
  }
</style>
</head>
<body>
<div class="container">

  <header class="masthead">
    <div class="edition">
      <div id="editionLeft">Faculty Edition</div>
      <div id="editionLeftSub">Department Dashboard</div>
    </div>
    <h1>The Enrollment Ledger</h1>
    <div class="controls">
      <label class="btn primary" for="fileInput">↑ Upload Report</label>
      <input type="file" id="fileInput" accept=".xlsx,.xls">
      <button class="btn" id="disciplineBtn" type="button" style="display:none">≡ Disciplines</button>
      <button class="btn" id="themeBtn" type="button">◐ Theme</button>
      <button class="btn ghost" id="printBtn" type="button">⎙ Print</button>
    </div>
  </header>

  <div class="subline" id="subline">
    <span id="reportDate">No data loaded</span>
    <span class="pipe">|</span>
    <span id="disciplineSummary">No disciplines selected</span>
    <span class="pipe">|</span>
    <span id="snapshotCount">0 snapshots</span>
  </div>

  <main id="dashboard"></main>

  <footer>
    <span>The Enrollment Ledger · Generic faculty dashboard</span>
    <span id="footerStamp"></span>
  </footer>
</div>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>
(function () {
  'use strict';

  /* =========================================================================
   * STATE & STORAGE
   * ========================================================================= */

  const STORAGE = {
    THEME: 'enroll-theme',
    DISCIPLINES: 'enroll-disciplines',
    PRESETS: 'enroll-presets',
    SNAPSHOTS: 'enroll-snapshots',
    INSTITUTE_INDEX: 'enroll-inst-idx',
    BENCHMARKS: 'enroll-benchmarks',
  };

  const state = {
    // Data
    snapshots: [],          // [{ id, date, label, filename, rows: [...] }] sorted ASC by date
    currentSnapshotId: null,
    instituteIndex: {},     // { 'BUSS': ['CULA','ACCT',...], ... }
    allDisciplines: [],     // [{ code, institute, count }]

    // User selections
    selectedDisciplines: new Set(),
    presets: [],            // [{ name, disciplines: [] }]

    // View / filters
    activeTab: 'snapshot',  // 'snapshot' | 'trends' | 'snapshots'
    activeLocations: new Set(),
    activeDisciplineFilter: new Set(), // sub-filter within selected
    sortKey: 'Section',
    sortDir: 1,
    showBenchmarks: true,
  };

  /* =========================================================================
   * UTILITIES
   * ========================================================================= */

  function uid() { return 'id-' + Math.random().toString(36).slice(2, 10); }
  function sum(arr, key) { return arr.reduce((a, r) => a + (Number(r[key]) || 0), 0); }
  function el(id) { return document.getElementById(id); }
  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // Deterministic color from string (used for discipline accent)
  function colorFor(code) {
    let h = 0;
    for (let i = 0; i < code.length; i++) h = (h * 31 + code.charCodeAt(i)) >>> 0;
    const hue = h % 360;
    // Avoid clashing with backgrounds: medium saturation/lightness
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    return `hsl(${hue} ${isDark ? '55%' : '55%'} ${isDark ? '60%' : '42%'})`;
  }

  // Parse date from filename: looks for MMDDYY or YYYYMMDD or _DDMMM patterns
  function parseDateFromFilename(name) {
    const noExt = name.replace(/\.[^.]+$/, '');
    // Pattern 1: MMDDYY (six trailing digits)
    let m = noExt.match(/(\d{2})(\d{2})(\d{2})(?!\d)/);
    if (m) {
      const [, mm, dd, yy] = m;
      const year = 2000 + parseInt(yy, 10);
      const date = new Date(year, parseInt(mm, 10) - 1, parseInt(dd, 10));
      if (!isNaN(date.getTime())) return date.toISOString().slice(0, 10);
    }
    // Pattern 2: YYYY-MM-DD or YYYYMMDD
    m = noExt.match(/(\d{4})[-_]?(\d{2})[-_]?(\d{2})/);
    if (m) {
      const date = new Date(parseInt(m[1], 10), parseInt(m[2], 10) - 1, parseInt(m[3], 10));
      if (!isNaN(date.getTime())) return date.toISOString().slice(0, 10);
    }
    return null;
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function fmtDateShort(iso) {
    if (!iso) return '—';
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function loadStorage() {
    try {
      const t = localStorage.getItem(STORAGE.THEME);
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

      const d = localStorage.getItem(STORAGE.DISCIPLINES);
      if (d) state.selectedDisciplines = new Set(JSON.parse(d));

      const p = localStorage.getItem(STORAGE.PRESETS);
      if (p) state.presets = JSON.parse(p);

      const s = localStorage.getItem(STORAGE.SNAPSHOTS);
      if (s) state.snapshots = JSON.parse(s);

      const ii = localStorage.getItem(STORAGE.INSTITUTE_INDEX);
      if (ii) state.instituteIndex = JSON.parse(ii);

      const bm = localStorage.getItem(STORAGE.BENCHMARKS);
      if (bm !== null) state.showBenchmarks = bm === 'true';

      // Set current snapshot to most recent
      if (state.snapshots.length > 0) {
        state.snapshots.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
        state.currentSnapshotId = state.snapshots[state.snapshots.length - 1].id;
        recomputeAllDisciplines();
      }
    } catch (err) {
      console.error('Storage load error:', err);
    }
  }

  function saveStorage() {
    try {
      localStorage.setItem(STORAGE.DISCIPLINES, JSON.stringify([...state.selectedDisciplines]));
      localStorage.setItem(STORAGE.PRESETS, JSON.stringify(state.presets));
      localStorage.setItem(STORAGE.SNAPSHOTS, JSON.stringify(state.snapshots));
      localStorage.setItem(STORAGE.INSTITUTE_INDEX, JSON.stringify(state.instituteIndex));
      localStorage.setItem(STORAGE.BENCHMARKS, String(state.showBenchmarks));
    } catch (err) {
      console.error('Storage save error (likely quota):', err);
      toast('⚠ Unable to save. Browser storage may be full. Consider exporting and clearing old snapshots.', 8000);
    }
  }

  /* =========================================================================
   * DATA INGEST
   * ========================================================================= */

  function getCoursePrefix(course) {
    if (!course) return '';
    const m = String(course).trim().toUpperCase().match(/^([A-Z]{2,5})/);
    return m ? m[1] : '';
  }

  // Returns explicit session length from the spreadsheet if a column carries it;
  // otherwise null (we don't guess — too many co-op/internship/lab courses
  // would be mislabeled). When Brookdale adds an explicit session/part-of-term
  // column, this just starts working.
  function getSessionLength(row) {
    const candidates = ['Session', 'Part of Term', 'Session Length', 'Session Code'];
    for (const c of candidates) {
      if (row[c]) {
        const s = String(row[c]).toUpperCase();
        if (s.includes('11')) return '11';
        if (s.includes('15')) return '15';
        return s;
      }
    }
    return null;
  }

  function ingestFile(file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const sheetName = wb.SheetNames.find(n => /individual\s*sect/i.test(n)) || wb.SheetNames[0];
        const sheet = wb.Sheets[sheetName];
        const rawRows = XLSX.utils.sheet_to_json(sheet, { defval: null });
        ingestRows(rawRows, file.name);
      } catch (err) {
        console.error(err);
        toast('⚠ Could not read this spreadsheet. Make sure it is the standard "Individual Sects All" report.', 6000);
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function ingestRows(rawRows, filename) {
    const fall = rawRows.filter(r => {
      const term = String(r.Term || '').toUpperCase();
      return r.Course && term.includes('FA');
    }).map(r => {
      const prefix = getCoursePrefix(r.Course);
      return {
        // Carry only what we need to keep storage small
        Section: r.Section,
        Course: r.Course,
        'Course Title': r['Course Title'],
        Institute: String(r.Institute || '').trim(),
        Location: String(r.Location || '').trim(),
        Capacity: Number(r.Capacity) || 0,
        'Enrolled Students': Number(r['Enrolled Students']) || 0,
        'Avail Seats': Number(r['Avail Seats']) || 0,
        'Section Fill %': Number(String(r['Section Fill %']).replace('%', '')) || 0,
        'Wait List': Number(r['Wait List']) || 0,
        'Course Credit': Number(r['Course Credit']) || 0,
        'Total Student Credit Hours': Number(r['Total Student Credit Hours']) || 0,
        'Maximum Course SCH': Number(r['Maximum Course SCH']) || 0,
        'Section Start Time': r['Section Start Time'],
        'Meeting Days': r['Meeting Days'],
        Instructor: r.Instructor,
        Term: r.Term,
        _prefix: prefix,
        _session: getSessionLength(r),
      };
    }).filter(r => r._prefix);

    if (fall.length === 0) {
      toast('⚠ No fall sections found in this spreadsheet.', 5000);
      return;
    }

    // Build/refresh institute index
    fall.forEach(r => {
      if (!r.Institute) return;
      if (!state.instituteIndex[r.Institute]) state.instituteIndex[r.Institute] = [];
      if (!state.instituteIndex[r.Institute].includes(r._prefix)) {
        state.instituteIndex[r.Institute].push(r._prefix);
      }
    });
    Object.keys(state.instituteIndex).forEach(k => state.instituteIndex[k].sort());

    // Determine snapshot date
    let date = parseDateFromFilename(filename);
    if (!date) date = new Date().toISOString().slice(0, 10);

    // Check for duplicate date — if so, replace
    const existingIdx = state.snapshots.findIndex(s => s.date === date);
    const snapshot = {
      id: uid(),
      date,
      label: fmtDate(date),
      filename,
      rows: fall,
      uploadedAt: new Date().toISOString(),
    };

    let isFirstSnapshot = state.snapshots.length === 0;
    let replaced = false;

    if (existingIdx >= 0) {
      state.snapshots[existingIdx] = snapshot;
      replaced = true;
    } else {
      state.snapshots.push(snapshot);
    }
    state.snapshots.sort((a, b) => a.date.localeCompare(b.date));
    state.currentSnapshotId = snapshot.id;

    recomputeAllDisciplines();
    saveStorage();

    if (isFirstSnapshot && state.selectedDisciplines.size === 0) {
      // First-ever upload — show discipline picker
      render();
      openDisciplineModal();
      toast(`Loaded ${fall.length} sections from ${fmtDate(date)}. Pick the disciplines you want to track.`, 4000);
    } else {
      render();
      toast(replaced
        ? `Replaced snapshot for ${fmtDate(date)} (${fall.length} sections).`
        : `Snapshot added: ${fmtDate(date)} (${fall.length} sections, ${state.snapshots.length} total).`,
        4000);
    }
  }

  function recomputeAllDisciplines() {
    // Aggregate across ALL snapshots so a discipline that disappears from a
    // later report still shows up in the picker.
    const counts = {};
    const institutes = {};
    state.snapshots.forEach(snap => {
      snap.rows.forEach(r => {
        if (!r._prefix) return;
        counts[r._prefix] = (counts[r._prefix] || 0) + 1;
        institutes[r._prefix] = r.Institute || '(unspecified)';
      });
    });
    state.allDisciplines = Object.keys(counts).sort().map(code => ({
      code,
      institute: institutes[code],
      count: counts[code],
    }));
  }

  /* =========================================================================
   * SNAPSHOT ACCESSORS
   * ========================================================================= */

  function currentSnapshot() {
    return state.snapshots.find(s => s.id === state.currentSnapshotId) || state.snapshots[state.snapshots.length - 1];
  }

  function previousSnapshot() {
    const cur = currentSnapshot();
    if (!cur) return null;
    const idx = state.snapshots.findIndex(s => s.id === cur.id);
    return idx > 0 ? state.snapshots[idx - 1] : null;
  }

  // Filtered current rows by selected disciplines + sub-filters
  function filteredRows() {
    const snap = currentSnapshot();
    if (!snap) return [];
    return snap.rows.filter(r => {
      if (!state.selectedDisciplines.has(r._prefix)) return false;
      if (state.activeDisciplineFilter.size > 0 && !state.activeDisciplineFilter.has(r._prefix)) return false;
      if (state.activeLocations.size > 0 && !state.activeLocations.has(r.Location)) return false;
      return true;
    });
  }

  // College-wide stats for a snapshot — every fall section, all disciplines.
  // Returns { sections, enrolled, capacity, fill, sch }.
  function collegeWideStats(snap) {
    if (!snap) return { sections: 0, enrolled: 0, capacity: 0, fill: 0, sch: 0 };
    const rows = snap.rows;
    const enrolled = sum(rows, 'Enrolled Students');
    const capacity = sum(rows, 'Capacity');
    return {
      sections: rows.length,
      enrolled,
      capacity,
      fill: capacity > 0 ? (enrolled / capacity * 100) : 0,
      sch: sum(rows, 'Total Student Credit Hours'),
    };
  }

  // True if comparison to college-wide is meaningful — i.e., user is looking
  // at a real subset, not (effectively) the whole college.
  function comparisonMeaningful() {
    if (!state.showBenchmarks) return false;
    const snap = currentSnapshot();
    if (!snap) return false;
    const totalDisciplines = state.allDisciplines.length;
    if (totalDisciplines === 0) return false;
    // Selected fewer than all disciplines OR has location/sub-filter narrowing
    if (state.selectedDisciplines.size < totalDisciplines) return true;
    if (state.activeDisciplineFilter.size > 0) return true;
    if (state.activeLocations.size > 0) return true;
    return false;
  }

  /* =========================================================================
   * RENDER ROOT
   * ========================================================================= */

  function render() {
    updateHeader();
    const dash = el('dashboard');

    if (state.snapshots.length === 0) {
      dash.innerHTML = renderWelcome();
      el('disciplineBtn').style.display = 'none';
      return;
    }

    if (state.selectedDisciplines.size === 0) {
      dash.innerHTML = renderNoDisciplines();
      el('disciplineBtn').style.display = '';
      bindBasic();
      return;
    }

    el('disciplineBtn').style.display = '';

    let body = renderTabs();
    if (state.activeTab === 'snapshot') {
      body += renderKPIs();
      body += renderFilters();
      body += renderDisciplineSummaries();
      body += renderCourseGrid();
      body += renderTable();
    } else if (state.activeTab === 'trends') {
      body += renderTrendsView();
    } else if (state.activeTab === 'snapshots') {
      body += renderSnapshotManager();
    }

    dash.innerHTML = body;
    bindAllEvents();
  }

  function updateHeader() {
    const snap = currentSnapshot();
    el('reportDate').textContent = snap ? `Report: ${fmtDate(snap.date)}` : 'No data loaded';

    if (state.selectedDisciplines.size === 0) {
      el('disciplineSummary').textContent = 'No disciplines selected';
    } else {
      const list = [...state.selectedDisciplines].sort();
      const display = list.length <= 4 ? list.join(' · ') : `${list.slice(0, 3).join(' · ')} +${list.length - 3} more`;
      el('disciplineSummary').textContent = display;
    }

    el('snapshotCount').textContent =
      state.snapshots.length === 0 ? '0 snapshots'
      : state.snapshots.length === 1 ? '1 snapshot'
      : `${state.snapshots.length} snapshots`;

    if (snap) {
      el('footerStamp').textContent = `Current: ${fmtDate(snap.date)} · ${snap.rows.length} total sections`;
    }
  }

  /* =========================================================================
   * WELCOME / EMPTY STATES
   * ========================================================================= */

  function renderWelcome() {
    return `
      <div class="welcome">
        <h2>A dashboard for the disciplines you watch.</h2>
        <p>Upload any Brookdale "Course Enrollment Report," pick the prefixes that matter to your department, and watch the numbers move from now to first day of class.</p>
        <div class="step">
          <div class="num">1</div>
          <div class="body"><strong>Upload</strong>The standard .xlsx report. Stays in your browser — nothing leaves your computer.</div>
        </div>
        <div class="step">
          <div class="num">2</div>
          <div class="body"><strong>Pick disciplines</strong>Any combination — ELEC, MATH, BIOL, whatever you teach or oversee. Save a preset for quick switching.</div>
        </div>
        <div class="step">
          <div class="num">3</div>
          <div class="body"><strong>Track over time</strong>Each new report becomes a snapshot. See velocity, trends, and which sections are filling vs. stalling.</div>
        </div>
        <label class="upload-btn" for="fileInput">Upload First Report</label>
      </div>
    `;
  }

  function renderNoDisciplines() {
    return `
      <div class="welcome">
        <h2>Choose the disciplines you teach.</h2>
        <p>Your data is loaded. Now tell the dashboard which course prefixes to focus on.</p>
        <button class="upload-btn" id="openDiscBtn" type="button">Choose Disciplines</button>
      </div>
    `;
  }

  function bindBasic() {
    const b = el('openDiscBtn');
    if (b) b.addEventListener('click', openDisciplineModal);
  }

  /* =========================================================================
   * TABS
   * ========================================================================= */

  function renderTabs() {
    const sections = filteredRows().length;
    return `
      <div class="tabs">
        <button class="tab ${state.activeTab === 'snapshot' ? 'active' : ''}" data-tab="snapshot">Current Snapshot <span class="count">${sections}</span></button>
        <button class="tab ${state.activeTab === 'trends' ? 'active' : ''}" data-tab="trends">Trends <span class="count">${state.snapshots.length}</span></button>
        <button class="tab ${state.activeTab === 'snapshots' ? 'active' : ''}" data-tab="snapshots">Snapshots</button>
      </div>
    `;
  }

  /* =========================================================================
   * KPI STRIP — with delta vs. previous snapshot
   * ========================================================================= */

  function renderKPIs() {
    const cur = filteredRows();
    const prevSnap = previousSnapshot();
    const prev = prevSnap
      ? prevSnap.rows.filter(r =>
          state.selectedDisciplines.has(r._prefix) &&
          (state.activeDisciplineFilter.size === 0 || state.activeDisciplineFilter.has(r._prefix)) &&
          (state.activeLocations.size === 0 || state.activeLocations.has(r.Location))
        )
      : null;

    const sectionsNow = cur.length;
    const enrolledNow = sum(cur, 'Enrolled Students');
    const capacityNow = sum(cur, 'Capacity');
    const fillNow = capacityNow > 0 ? (enrolledNow / capacityNow * 100) : 0;
    const schNow = sum(cur, 'Total Student Credit Hours');

    let dEnrolled = '', dFill = '', dSCH = '', dSections = '';
    if (prev) {
      const enrolledPrev = sum(prev, 'Enrolled Students');
      const capacityPrev = sum(prev, 'Capacity');
      const fillPrev = capacityPrev > 0 ? (enrolledPrev / capacityPrev * 100) : 0;
      const schPrev = sum(prev, 'Total Student Credit Hours');
      dSections = renderDelta(sectionsNow - prev.length, '');
      dEnrolled = renderDelta(enrolledNow - enrolledPrev, '');
      dFill = renderDelta(fillNow - fillPrev, 'pp', 1);
      dSCH = renderDelta(schNow - schPrev, '');
    }

    const fullCount = cur.filter(r => r['Section Fill %'] >= 100).length;
    const emptyCount = cur.filter(r => r['Enrolled Students'] === 0).length;
    const waitlistTotal = sum(cur, 'Wait List');

    // College-wide benchmark for fill comparison
    const showBench = comparisonMeaningful();
    const cw = showBench ? collegeWideStats(currentSnapshot()) : null;
    const fillVsCollege = cw ? (fillNow - cw.fill) : null;
    const fillSubtext = cw
      ? `${(capacityNow - enrolledNow).toLocaleString()} seats remaining · College: ${cw.fill.toFixed(1)}% ${benchDelta(fillVsCollege, 'pp', 1)}`
      : `${(capacityNow - enrolledNow).toLocaleString()} seats remaining`;

    return `
      <div class="kpi-strip">
        <div class="kpi">
          <div class="label">Sections</div>
          <div class="value">${sectionsNow} ${dSections}</div>
          <div class="sub">${fullCount} at capacity · ${emptyCount} with zero enrolled</div>
        </div>
        <div class="kpi">
          <div class="label">Students Enrolled</div>
          <div class="value">${enrolledNow} ${dEnrolled}</div>
          <div class="sub">of ${capacityNow} total seats</div>
        </div>
        <div class="kpi">
          <div class="label">Overall Fill</div>
          <div class="value">${fillNow.toFixed(1)}% ${dFill}</div>
          <div class="sub">${fillSubtext}</div>
        </div>
        <div class="kpi">
          <div class="label">Student Credit Hrs</div>
          <div class="value">${schNow} ${dSCH}</div>
          <div class="sub">${waitlistTotal > 0 ? waitlistTotal + ' on waitlist' : 'no waitlist activity'}</div>
        </div>
      </div>
    `;
  }

  // Inline benchmark delta, used in KPI subtexts and panel rows.
  // Distinct from time-delta: shows "+X.Xpp ahead" / "-X.Xpp behind".
  function benchDelta(n, unit, decimals) {
    if (n === null || n === undefined || isNaN(n)) return '';
    if (Math.abs(n) < 0.05) return `<span class="bench flat">at college avg</span>`;
    const sign = n > 0 ? '+' : '';
    const cls = n > 0 ? 'up' : 'down';
    const v = decimals ? n.toFixed(decimals) : n.toLocaleString();
    return `<span class="bench ${cls}">${sign}${v}${unit || ''}</span>`;
  }

  function renderDelta(n, unit, decimals) {
    if (n === 0 || n === undefined || isNaN(n)) return `<span class="delta flat">—</span>`;
    const sign = n > 0 ? '+' : '';
    const cls = n > 0 ? 'up' : 'down';
    const v = decimals ? n.toFixed(decimals) : n.toLocaleString();
    return `<span class="delta ${cls}">${sign}${v}${unit || ''}</span>`;
  }

  /* =========================================================================
   * FILTERS
   * ========================================================================= */

  function renderFilters() {
    const snap = currentSnapshot();
    if (!snap) return '';
    // Limit filter chips to selected disciplines that are present in current snapshot
    const present = [...state.selectedDisciplines].filter(p =>
      snap.rows.some(r => r._prefix === p)
    ).sort();
    const locations = [...new Set(snap.rows
      .filter(r => state.selectedDisciplines.has(r._prefix))
      .map(r => r.Location)
      .filter(Boolean))].sort();

    return `
      <div class="filter-bar">
        ${present.length > 1 ? `
          <div class="filter-group">
            <span class="lbl">Discipline</span>
            ${present.map(p => `
              <button class="chip ${state.activeDisciplineFilter.has(p) ? 'active' : ''}" data-disc-filter="${p}">
                <span class="swatch" style="background:${colorFor(p)}"></span>${p}
              </button>
            `).join('')}
          </div>
        ` : ''}
        ${locations.length > 1 ? `
          <div class="filter-group">
            <span class="lbl">Location</span>
            ${locations.map(l => `
              <button class="chip ${state.activeLocations.has(l) ? 'active' : ''}" data-location="${escapeHtml(l)}">${escapeHtml(l)}</button>
            `).join('')}
          </div>
        ` : ''}
        <div class="filter-group">
          <span class="lbl">Compare</span>
          <button class="chip ${state.showBenchmarks ? 'active' : ''}" id="benchToggle" type="button" title="Compare against college-wide fall enrollment">
            ⊕ vs. College
          </button>
        </div>
        <button class="reset" id="resetFilters">Reset filters</button>
      </div>
    `;
  }

  /* =========================================================================
   * DISCIPLINE SUMMARY PANELS
   * ========================================================================= */

  function renderDisciplineSummaries() {
    const snap = currentSnapshot();
    const prevSnap = previousSnapshot();
    let present = [...state.selectedDisciplines]
      .filter(p => snap.rows.some(r => r._prefix === p))
      .sort();

    // If the user has narrowed via the discipline filter chips, only show
    // panels for those disciplines. Empty panels for non-focused disciplines
    // would just be confusing zeros.
    if (state.activeDisciplineFilter.size > 0) {
      present = present.filter(p => state.activeDisciplineFilter.has(p));
    }

    if (present.length === 0) {
      return `<div class="section-title">By Discipline</div>
        <p style="color:var(--ink-mute);font-style:italic;padding:14px 0">None of your selected disciplines appear in this snapshot.</p>`;
    }

    const cards = present.map(p => {
      // Apply location/discipline-filter to be consistent with rest of view
      const inFilter = (r) =>
        (state.activeDisciplineFilter.size === 0 || state.activeDisciplineFilter.has(r._prefix)) &&
        (state.activeLocations.size === 0 || state.activeLocations.has(r.Location));

      const rows = snap.rows.filter(r => r._prefix === p && inFilter(r));
      const prevRows = prevSnap ? prevSnap.rows.filter(r => r._prefix === p && inFilter(r)) : null;

      const sections = rows.length;
      const enrolled = sum(rows, 'Enrolled Students');
      const capacity = sum(rows, 'Capacity');
      const fill = capacity > 0 ? (enrolled / capacity * 100) : 0;
      const sch = sum(rows, 'Total Student Credit Hours');
      const fullCount = rows.filter(r => r['Section Fill %'] >= 100).length;
      const emptyCount = rows.filter(r => r['Enrolled Students'] === 0).length;

      let dEnr = '', dFill = '', dSCH = '';
      if (prevRows) {
        const ePrev = sum(prevRows, 'Enrolled Students');
        const cPrev = sum(prevRows, 'Capacity');
        const fPrev = cPrev > 0 ? (ePrev / cPrev * 100) : 0;
        const schPrev = sum(prevRows, 'Total Student Credit Hours');
        dEnr = miniDelta(enrolled - ePrev);
        dFill = miniDelta(fill - fPrev, 'pp', 1);
        dSCH = miniDelta(sch - schPrev);
      }

      // College-wide benchmark row
      const showBench = state.showBenchmarks;
      const cw = showBench ? collegeWideStats(snap) : null;
      const benchRow = cw
        ? `<div class="stat-row"><span class="k">vs. College</span><span class="v" style="font-size:11px;color:var(--ink-mute)">${cw.fill.toFixed(1)}%</span><span class="d">${miniDelta(fill - cw.fill, 'pp', 1)}</span></div>`
        : '';

      // Sparkline of total enrollment for this discipline across snapshots
      const enrSeries = state.snapshots.map(s =>
        sum(s.rows.filter(r => r._prefix === p && inFilter(r)), 'Enrolled Students')
      );

      const sparkSVG = renderSparkline(enrSeries, colorFor(p), 220, 36);

      return `
        <div class="panel" style="border-top-color:${colorFor(p)}">
          <h3><span class="swatch" style="background:${colorFor(p)}"></span>${p}</h3>
          <div class="panel-sub">${sections} section${sections !== 1 ? 's' : ''}${prevRows ? ` · was ${prevRows.length}` : ''}</div>
          <div class="stat-row"><span class="k">Enrolled / Cap</span><span class="v">${enrolled} / ${capacity}</span><span class="d">${dEnr}</span></div>
          <div class="stat-row"><span class="k">Fill Rate</span><span class="v">${fill.toFixed(1)}%</span><span class="d">${dFill}</span></div>
          ${benchRow}
          <div class="stat-row"><span class="k">Credit Hours</span><span class="v">${sch}</span><span class="d">${dSCH}</span></div>
          <div class="stat-row"><span class="k">At Capacity</span><span class="v">${fullCount}</span><span class="d"></span></div>
          <div class="stat-row"><span class="k">Empty</span><span class="v">${emptyCount}</span><span class="d"></span></div>
          ${state.snapshots.length > 1 ? `<div class="panel-sparkline">${sparkSVG}</div>` : ''}
        </div>
      `;
    }).join('');

    return `
      <div class="section-title">By Discipline <span class="meta">${filteredRows().length} sections in view</span></div>
      <div class="grid-auto">${cards}</div>
    `;
  }

  function miniDelta(n, unit, dec) {
    if (n === 0 || isNaN(n)) return `<span class="flat">—</span>`;
    const cls = n > 0 ? 'up' : 'down';
    const sign = n > 0 ? '+' : '';
    const v = dec ? n.toFixed(dec) : n.toLocaleString();
    return `<span class="${cls}">${sign}${v}${unit || ''}</span>`;
  }

  /* =========================================================================
   * SPARKLINES (inline SVG)
   * ========================================================================= */

  function renderSparkline(series, color, w, h) {
    if (!series || series.length === 0) return '';
    if (series.length === 1) {
      return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
        <circle cx="${w/2}" cy="${h/2}" r="2.5" fill="${color}"/>
      </svg>`;
    }
    const max = Math.max(...series, 1);
    const min = Math.min(...series, 0);
    const pad = 4;
    const range = max - min || 1;
    const step = (w - 2 * pad) / (series.length - 1);
    const points = series.map((v, i) => {
      const x = pad + i * step;
      const y = pad + (h - 2 * pad) * (1 - (v - min) / range);
      return [x, y];
    });
    const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
    const lastPt = points[points.length - 1];
    // Light area fill
    const areaPath = path + ` L${lastPt[0]},${h - pad} L${pad},${h - pad} Z`;
    return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      <path d="${areaPath}" fill="${color}" opacity="0.12"/>
      <path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${lastPt[0].toFixed(1)}" cy="${lastPt[1].toFixed(1)}" r="2.5" fill="${color}"/>
    </svg>`;
  }

  /* =========================================================================
   * COURSE CARDS
   * ========================================================================= */

  function renderCourseGrid() {
    const rows = filteredRows().slice().sort((a, b) => {
      if (a._prefix !== b._prefix) return a._prefix.localeCompare(b._prefix);
      return String(a.Section).localeCompare(String(b.Section));
    });

    if (rows.length === 0) {
      return `<div class="section-title">Sections at a Glance</div>
        <p style="color:var(--ink-mute);font-style:italic;padding:14px 0">No sections match the current filters.</p>`;
    }

    const cards = rows.map(r => {
      const fill = r['Section Fill %'];
      const fillCapped = Math.min(100, fill);
      const tags = [];
      if (fill >= 100) tags.push('<span class="tag full">● At Capacity</span>');
      else if (r['Enrolled Students'] === 0) tags.push('<span class="tag empty">● Empty</span>');
      if (r['Wait List'] > 0) tags.push(`<span class="tag wait">+${r['Wait List']} waitlist</span>`);

      const days = cleanCell(r['Meeting Days'], '—');
      const time = cleanCell(r['Section Start Time'], 'TBA');
      const instructor = cleanCell(r.Instructor, 'TBA');
      const color = colorFor(r._prefix);

      // Section history series
      const hist = sectionHistory(r.Section);
      const enrSeries = hist.map(h => h.row ? h.row['Enrolled Students'] : null).filter(v => v !== null);
      const showSpark = enrSeries.length >= 2;

      // Velocity vs prev snapshot
      const prevSnap = previousSnapshot();
      let velocity = '';
      if (prevSnap) {
        const prevRow = prevSnap.rows.find(x => x.Section === r.Section);
        if (prevRow) {
          const diff = r['Enrolled Students'] - prevRow['Enrolled Students'];
          velocity = diff === 0
            ? '<span class="v-flat">no change</span>'
            : diff > 0
              ? `<span class="v-up">+${diff} since ${fmtDateShort(prevSnap.date)}</span>`
              : `<span class="v-down">${diff} since ${fmtDateShort(prevSnap.date)}</span>`;
        } else {
          velocity = '<span class="v-flat">new section</span>';
        }
      }

      return `
        <div class="course-card" style="border-left-color:${color}">
          <div class="cc-head">
            <span class="code">${escapeHtml(r.Section)}</span>
            <span class="loc">${escapeHtml(r.Location || '—')}</span>
          </div>
          <div class="title">${escapeHtml(r['Course Title'] || '')}</div>
          <div class="meter"><div class="fill" style="width:${fillCapped}%;background:${color}"></div></div>
          <div class="num-row">
            <span><strong>${r['Enrolled Students']}</strong> / ${r.Capacity} enrolled</span>
            <span><strong>${fill.toFixed(0)}%</strong></span>
          </div>
          <div class="delta-row">
            <span>${velocity}</span>
            ${showSpark ? renderSparkline(enrSeries, color, 90, 22) : ''}
          </div>
          <div class="meta-row">
            <span>${escapeHtml(days)} · ${escapeHtml(time)}</span>
            <span>${escapeHtml(instructor)}</span>
            ${tags.length ? '<span style="flex-basis:100%;margin-top:4px">' + tags.join(' &nbsp; ') + '</span>' : ''}
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="section-title">Sections at a Glance <span class="meta">card view</span></div>
      <div class="course-grid">${cards}</div>
    `;
  }

  function cleanCell(v, fallback) {
    if (v == null) return fallback;
    const s = String(v).trim();
    if (!s || s === ',' || s === ',,') return fallback;
    return s;
  }

  function sectionHistory(sectionCode) {
    return state.snapshots.map(s => ({
      date: s.date,
      row: s.rows.find(r => r.Section === sectionCode) || null,
    }));
  }

  /* =========================================================================
   * TABLE
   * ========================================================================= */

  function renderTable() {
    const headers = [
      { k: 'Section', label: 'Section' },
      { k: 'Course Title', label: 'Title' },
      { k: 'Location', label: 'Loc' },
      { k: 'Capacity', label: 'Cap', right: true },
      { k: 'Enrolled Students', label: 'Enr', right: true },
      { k: '_delta', label: 'Δ Enr', right: true },
      { k: 'Section Fill %', label: 'Fill %', right: true },
      { k: 'Wait List', label: 'Wait', right: true },
      { k: 'Course Credit', label: 'Cr', right: true },
      { k: 'Total Student Credit Hours', label: 'SCH', right: true },
      { k: 'Meeting Days', label: 'Days' },
      { k: 'Section Start Time', label: 'Time' },
      { k: 'Instructor', label: 'Instructor' },
    ];

    const prevSnap = previousSnapshot();
    const prevByCode = {};
    if (prevSnap) prevSnap.rows.forEach(r => { prevByCode[r.Section] = r; });

    const enriched = filteredRows().map(r => ({
      ...r,
      _delta: prevByCode[r.Section] != null
        ? (r['Enrolled Students'] - prevByCode[r.Section]['Enrolled Students'])
        : null,
    }));

    const sorted = enriched.slice().sort((a, b) => {
      let av = a[state.sortKey], bv = b[state.sortKey];
      if (av === null) av = -Infinity; if (bv === null) bv = -Infinity;
      if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * state.sortDir;
      av = String(av || ''); bv = String(bv || '');
      return av.localeCompare(bv) * state.sortDir;
    });

    const rows = sorted.map(r => {
      const fill = r['Section Fill %'];
      const fillBadge =
        fill >= 100 ? `<span class="badge full">FULL</span>` :
        fill >= 75 ? `<span class="badge high">${fill.toFixed(0)}%</span>` :
        r['Enrolled Students'] === 0 ? `<span class="badge zero">0%</span>` :
        `<span class="badge low">${fill.toFixed(0)}%</span>`;
      const days = cleanCell(r['Meeting Days'], '—');
      const time = cleanCell(r['Section Start Time'], '—');
      const instructor = cleanCell(r.Instructor, '');
      const fillCapped = Math.min(100, fill);
      const color = colorFor(r._prefix);

      let deltaCell = '<span style="color:var(--ink-mute)">—</span>';
      if (r._delta != null) {
        if (r._delta === 0) deltaCell = '<span class="delta-cell flat">0</span>';
        else if (r._delta > 0) deltaCell = `<span class="delta-cell up">+${r._delta}</span>`;
        else deltaCell = `<span class="delta-cell down">${r._delta}</span>`;
      } else if (prevSnap) {
        deltaCell = '<span style="color:var(--ink-mute);font-style:italic">new</span>';
      }

      return `
        <tr>
          <td style="border-left:3px solid ${color}"><strong>${escapeHtml(r.Section)}</strong></td>
          <td>${escapeHtml(r['Course Title'] || '')}</td>
          <td>${escapeHtml(r.Location || '')}</td>
          <td class="right">${r.Capacity}</td>
          <td class="right">${r['Enrolled Students']}</td>
          <td class="right">${deltaCell}</td>
          <td class="right"><span class="mini-meter"><span class="mf" style="width:${fillCapped}%;background:${color}"></span></span>${fillBadge}</td>
          <td class="right">${r['Wait List'] || ''}</td>
          <td class="right">${r['Course Credit']}</td>
          <td class="right">${r['Total Student Credit Hours']}</td>
          <td>${escapeHtml(days)}</td>
          <td>${escapeHtml(time)}</td>
          <td>${escapeHtml(instructor) || '<em style="color:var(--ink-mute)">TBA</em>'}</td>
        </tr>
      `;
    }).join('');

    const arrow = (k) => state.sortKey === k ? `<span class="arrow">${state.sortDir === 1 ? '▲' : '▼'}</span>` : '';

    return `
      <div class="section-title">Full Section Detail <span class="meta">click any column to sort</span></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              ${headers.map(h => `<th data-sort="${h.k}" class="${h.right ? 'right' : ''}">${h.label}${arrow(h.k)}</th>`).join('')}
            </tr>
          </thead>
          <tbody>${rows || '<tr><td colspan="13" style="text-align:center;padding:24px;color:var(--ink-mute);font-style:italic">No sections match the current filters.</td></tr>'}</tbody>
        </table>
      </div>
    `;
  }

  /* =========================================================================
   * TRENDS VIEW
   * ========================================================================= */

  function renderTrendsView() {
    if (state.snapshots.length < 2) {
      return `
        <div class="welcome" style="margin-top:32px">
          <h2>One snapshot so far.</h2>
          <p>Trends become visible once you've uploaded a second report. Each new release adds a point to the timeline.</p>
        </div>
      `;
    }

    let present = [...state.selectedDisciplines]
      .filter(p => state.snapshots.some(s => s.rows.some(r => r._prefix === p)))
      .sort();

    // Honor the discipline filter chips here too, so the trends chart focuses
    // on what the user has narrowed to.
    if (state.activeDisciplineFilter.size > 0) {
      present = present.filter(p => state.activeDisciplineFilter.has(p));
    }

    // Build series per discipline
    const series = present.map(p => {
      const enr = state.snapshots.map(s => sum(s.rows.filter(r => r._prefix === p), 'Enrolled Students'));
      const fill = state.snapshots.map(s => {
        const rows = s.rows.filter(r => r._prefix === p);
        const cap = sum(rows, 'Capacity');
        const en = sum(rows, 'Enrolled Students');
        return cap > 0 ? (en / cap * 100) : 0;
      });
      return { code: p, color: colorFor(p), enr, fill };
    });

    // College-wide reference series (rendered as dashed line on charts when toggle is on)
    const cwSeries = state.showBenchmarks ? {
      code: 'College',
      color: 'var(--flat)',
      dashed: true,
      enr: state.snapshots.map(s => sum(s.rows, 'Enrolled Students')),
      fill: state.snapshots.map(s => {
        const cap = sum(s.rows, 'Capacity');
        const en = sum(s.rows, 'Enrolled Students');
        return cap > 0 ? (en / cap * 100) : 0;
      }),
    } : null;

    const dates = state.snapshots.map(s => fmtDateShort(s.date));

    // Movers — biggest enrollment changes between first and last snapshot
    const firstSnap = state.snapshots[0];
    const lastSnap = state.snapshots[state.snapshots.length - 1];
    const allSections = new Set();
    state.snapshots.forEach(s => s.rows.forEach(r => {
      if (state.selectedDisciplines.has(r._prefix)) allSections.add(r.Section);
    }));

    const movers = [...allSections].map(sec => {
      const fr = firstSnap.rows.find(r => r.Section === sec);
      const lr = lastSnap.rows.find(r => r.Section === sec);
      if (!lr) return null;
      const startEnr = fr ? fr['Enrolled Students'] : 0;
      const endEnr = lr['Enrolled Students'];
      return {
        section: sec,
        title: lr['Course Title'],
        prefix: lr._prefix,
        location: lr.Location,
        capacity: lr.Capacity,
        startEnr, endEnr,
        diff: endEnr - startEnr,
        startFill: fr ? fr['Section Fill %'] : 0,
        endFill: lr['Section Fill %'],
        isNew: !fr,
      };
    }).filter(Boolean);

    const gainers = movers.filter(m => m.diff > 0).sort((a, b) => b.diff - a.diff).slice(0, 8);
    const stalled = movers.filter(m => m.diff === 0 && m.endFill < 50).sort((a, b) => a.endEnr - b.endEnr).slice(0, 8);
    const losers = movers.filter(m => m.diff < 0).sort((a, b) => a.diff - b.diff).slice(0, 8);

    return `
      <div class="section-title">Enrollment Over Time <span class="meta">${state.snapshots.length} snapshots · ${fmtDate(firstSnap.date)} → ${fmtDate(lastSnap.date)}</span></div>
      ${renderMultiSeriesChart(series, dates, 'enr', 'Enrolled Students', null)}
      ${renderMultiSeriesChart(series, dates, 'fill', 'Fill Rate (%)', cwSeries)}

      <div class="section-title">Movers</div>
      <div class="grid-auto">
        ${renderMoverPanel('Biggest Gainers', gainers, 'up')}
        ${renderMoverPanel('Stalled (no growth, under-filled)', stalled, 'flat')}
        ${renderMoverPanel('Lost Enrollment', losers, 'down')}
      </div>
    `;
  }

  function renderMultiSeriesChart(series, dates, key, title, refSeries) {
    const W = 1100, H = 280, padL = 60, padR = 20, padT = 30, padB = 50;
    const innerW = W - padL - padR;
    const innerH = H - padT - padB;
    if (series.length === 0 || dates.length === 0) return '';

    const allSeries = refSeries ? [...series, refSeries] : series;
    const allVals = allSeries.flatMap(s => s[key]);
    const max = Math.max(...allVals, key === 'fill' ? 100 : 1);
    const min = 0;
    const xStep = dates.length > 1 ? innerW / (dates.length - 1) : 0;

    const xCoord = (i) => padL + i * xStep;
    const yCoord = (v) => padT + innerH * (1 - (v - min) / (max - min || 1));

    // Y axis ticks (5)
    const ticks = 5;
    const yTicks = [];
    for (let i = 0; i <= ticks; i++) {
      const v = min + (max - min) * (i / ticks);
      yTicks.push({ v, y: yCoord(v) });
    }

    const renderLine = (s) => {
      const path = s[key].map((v, i) => `${i === 0 ? 'M' : 'L'}${xCoord(i)},${yCoord(v)}`).join(' ');
      const dots = s[key].map((v, i) => `<circle cx="${xCoord(i)}" cy="${yCoord(v)}" r="${s.dashed ? 2 : 3}" fill="${s.color}" opacity="${s.dashed ? 0.6 : 1}"/>`).join('');
      const dash = s.dashed ? 'stroke-dasharray="5,4"' : '';
      const opacity = s.dashed ? '0.6' : '1';
      return `
        <path d="${path}" fill="none" stroke="${s.color}" stroke-width="${s.dashed ? 1.5 : 2}" ${dash} stroke-linejoin="round" stroke-linecap="round" opacity="${opacity}"/>
        ${dots}
      `;
    };

    const lines = series.map(renderLine).join('') + (refSeries ? renderLine(refSeries) : '');

    const xLabels = dates.map((d, i) =>
      `<text x="${xCoord(i)}" y="${H - padB + 18}" text-anchor="middle" font-size="11" fill="var(--ink-mute)" font-family="Helvetica Neue, sans-serif">${escapeHtml(d)}</text>`
    ).join('');

    const yLabels = yTicks.map(t =>
      `<line x1="${padL}" x2="${W - padR}" y1="${t.y}" y2="${t.y}" stroke="var(--rule)" stroke-width="0.5"/>
       <text x="${padL - 8}" y="${t.y + 3}" text-anchor="end" font-size="10" fill="var(--ink-mute)" font-family="Helvetica Neue, sans-serif">${key === 'fill' ? t.v.toFixed(0) + '%' : t.v.toFixed(0)}</text>`
    ).join('');

    const legendItems = series.map(s =>
      `<span><span class="sw" style="background:${s.color}"></span>${escapeHtml(s.code)}</span>`
    );
    if (refSeries) {
      legendItems.push(`<span><span class="sw" style="background:${refSeries.color};opacity:0.6;background-image:repeating-linear-gradient(90deg, ${refSeries.color} 0 4px, transparent 4px 7px)"></span>${escapeHtml(refSeries.code)} <em style="color:var(--ink-mute)">(reference)</em></span>`);
    }
    const legend = legendItems.join('');

    return `
      <div class="trend-chart-wrap">
        <h4>${escapeHtml(title)}</h4>
        <div class="legend">${legend}</div>
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
          ${yLabels}
          ${lines}
          ${xLabels}
        </svg>
      </div>
    `;
  }

  function renderMoverPanel(title, items, kind) {
    if (items.length === 0) {
      return `<div class="panel">
        <h3>${escapeHtml(title)}</h3>
        <div class="panel-sub">None in current view.</div>
      </div>`;
    }
    const rows = items.map(m => {
      const cls = kind === 'up' ? 'up' : kind === 'down' ? 'down' : 'flat';
      const sign = m.diff > 0 ? '+' : m.diff < 0 ? '' : '';
      const color = colorFor(m.prefix);
      return `
        <div class="stat-row">
          <span class="k" style="text-transform:none;letter-spacing:0;font-size:11px">
            <strong style="color:var(--ink);font-family:Helvetica Neue, sans-serif">${escapeHtml(m.section)}</strong>
            <span style="color:var(--ink-mute)"> · ${escapeHtml(m.location || '')}</span>
          </span>
          <span class="v" style="font-size:11px">${m.endEnr}/${m.capacity}</span>
          <span class="d ${cls}" style="font-weight:700">${m.isNew ? 'NEW' : sign + m.diff}</span>
        </div>
      `;
    }).join('');
    return `
      <div class="panel">
        <h3>${escapeHtml(title)}</h3>
        <div class="panel-sub">${items.length} section${items.length !== 1 ? 's' : ''}</div>
        ${rows}
      </div>
    `;
  }

  /* =========================================================================
   * SNAPSHOT MANAGER
   * ========================================================================= */

  function renderSnapshotManager() {
    const rows = state.snapshots.slice().reverse().map(s => {
      const isCurrent = s.id === state.currentSnapshotId;
      const totalSections = s.rows.length;
      const totalEnr = sum(s.rows, 'Enrolled Students');
      return `
        <div class="snap-row ${isCurrent ? 'current' : ''}">
          <div class="date">${fmtDateShort(s.date)}</div>
          <div>
            <div style="font-weight:600">${escapeHtml(s.label)}</div>
            <div class="name">${escapeHtml(s.filename)}</div>
          </div>
          <div class="stats">${totalSections} sections · ${totalEnr} enrolled</div>
          ${isCurrent ? '<span class="badge cur">VIEWING</span>' : `<button class="btn ghost" data-set-current="${s.id}">View</button>`}
          <button class="btn danger" data-delete-snap="${s.id}">Delete</button>
        </div>
      `;
    }).join('');

    return `
      <div class="section-title">Snapshot Library <span class="meta">${state.snapshots.length} snapshots stored locally</span></div>

      <div style="background:var(--surface-2);border:1px solid var(--rule);padding:14px 18px;margin-bottom:18px;font-size:13px;color:var(--ink-soft)">
        <strong style="font-family:Helvetica Neue, sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink)">Storage</strong><br>
        Snapshots are saved in this browser's local storage. They never leave your computer. To move them to another device, export the JSON below and import it on the other side.
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn" id="exportBtn" type="button">↓ Export All Snapshots</button>
          <label class="btn" for="importInput">↑ Import Snapshots</label>
          <input type="file" id="importInput" accept=".json">
          <button class="btn danger" id="clearAllBtn" type="button">Clear All Snapshots</button>
        </div>
      </div>

      <div class="snapshot-list">${rows || '<div style="padding:20px;color:var(--ink-mute);font-style:italic">No snapshots yet.</div>'}</div>
    `;
  }

  /* =========================================================================
   * DISCIPLINE PICKER MODAL
   * ========================================================================= */

  function openDisciplineModal() {
    const root = el('modalRoot');
    root.innerHTML = renderDisciplineModal();
    bindDisciplineModal();
  }

  function closeModal() {
    el('modalRoot').innerHTML = '';
  }

  function renderDisciplineModal() {
    const grouped = {};
    state.allDisciplines.forEach(d => {
      const inst = d.institute || '(unspecified)';
      if (!grouped[inst]) grouped[inst] = [];
      grouped[inst].push(d);
    });
    const institutes = Object.keys(grouped).sort();

    const presetChips = state.presets.map((p, i) => `
      <button class="preset-chip" data-load-preset="${i}">
        ${escapeHtml(p.name)} <span style="color:var(--ink-mute)">(${p.disciplines.length})</span>
        <span class="x" data-delete-preset="${i}" title="Delete preset">×</span>
      </button>
    `).join('');

    const groups = institutes.map(inst => `
      <div class="institute-group">
        <div class="ig-head">
          <span>${escapeHtml(inst)} <span style="color:var(--ink-mute);font-weight:400">· ${grouped[inst].length} disciplines</span></span>
          <span class="ig-actions">
            <a data-select-inst="${escapeHtml(inst)}">Select all</a>
            <a data-deselect-inst="${escapeHtml(inst)}">Clear</a>
          </span>
        </div>
        <div class="ig-body">
          ${grouped[inst].map(d => `
            <span class="disc-chip ${state.selectedDisciplines.has(d.code) ? 'selected' : ''}" data-discipline="${d.code}">
              <span class="swatch" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${colorFor(d.code)}"></span>
              ${d.code}
              <span class="ct">${d.count}</span>
            </span>
          `).join('')}
        </div>
      </div>
    `).join('');

    return `
      <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalCard">
          <div class="modal-head">
            <h2>Choose Your Disciplines</h2>
            <button class="close" id="modalClose">×</button>
          </div>
          <div class="modal-body">
            <p style="color:var(--ink-soft);font-size:13px;margin-bottom:18px">Select any course prefixes you want to track. Counts shown reflect sections across all your snapshots.</p>

            ${state.presets.length > 0 ? `
              <div class="preset-row">
                <span class="preset-label">Presets</span>
                ${presetChips}
              </div>
            ` : ''}

            ${groups || '<p style="color:var(--ink-mute);font-style:italic">No disciplines found. Upload a report first.</p>'}

            <div style="margin-top:18px;padding:12px 14px;background:var(--surface-2);border:1px solid var(--rule)">
              <div style="font-family:Helvetica Neue, sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-mute);margin-bottom:6px">Save current selection as preset</div>
              <div style="display:flex;gap:8px">
                <input type="text" id="presetName" placeholder="e.g., Engineering & Tech Chair" style="flex:1;padding:8px 10px;border:1px solid var(--rule);background:var(--surface);color:var(--ink);font-family:inherit;font-size:13px">
                <button class="btn" id="savePresetBtn" type="button">Save</button>
              </div>
            </div>
          </div>
          <div class="modal-foot">
            <span style="color:var(--ink-mute);font-size:12px;align-self:center" id="selectedCount">${state.selectedDisciplines.size} selected</span>
            <div style="display:flex;gap:8px">
              <button class="btn ghost" id="clearAllDisc" type="button">Clear All</button>
              <button class="btn primary" id="applyDisc" type="button">Apply</button>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function bindDisciplineModal() {
    el('modalClose').addEventListener('click', closeModal);
    el('modalOverlay').addEventListener('click', (e) => {
      if (e.target.id === 'modalOverlay') closeModal();
    });

    document.querySelectorAll('[data-discipline]').forEach(chip => {
      chip.addEventListener('click', () => {
        const code = chip.dataset.discipline;
        if (state.selectedDisciplines.has(code)) state.selectedDisciplines.delete(code);
        else state.selectedDisciplines.add(code);
        chip.classList.toggle('selected');
        el('selectedCount').textContent = state.selectedDisciplines.size + ' selected';
      });
    });

    document.querySelectorAll('[data-select-inst]').forEach(a => {
      a.addEventListener('click', () => {
        const inst = a.dataset.selectInst;
        state.allDisciplines.filter(d => (d.institute || '(unspecified)') === inst)
          .forEach(d => state.selectedDisciplines.add(d.code));
        openDisciplineModal();
      });
    });
    document.querySelectorAll('[data-deselect-inst]').forEach(a => {
      a.addEventListener('click', () => {
        const inst = a.dataset.deselectInst;
        state.allDisciplines.filter(d => (d.institute || '(unspecified)') === inst)
          .forEach(d => state.selectedDisciplines.delete(d.code));
        openDisciplineModal();
      });
    });

    document.querySelectorAll('[data-load-preset]').forEach(b => {
      b.addEventListener('click', (e) => {
        if (e.target.dataset.deletePreset != null) return; // delete handler will fire
        const idx = parseInt(b.dataset.loadPreset, 10);
        const preset = state.presets[idx];
        if (preset) {
          state.selectedDisciplines = new Set(preset.disciplines);
          openDisciplineModal();
        }
      });
    });
    document.querySelectorAll('[data-delete-preset]').forEach(x => {
      x.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(x.dataset.deletePreset, 10);
        if (confirm(`Delete preset "${state.presets[idx].name}"?`)) {
          state.presets.splice(idx, 1);
          saveStorage();
          openDisciplineModal();
        }
      });
    });

    el('savePresetBtn').addEventListener('click', () => {
      const name = el('presetName').value.trim();
      if (!name) { toast('Give the preset a name.', 3000); return; }
      if (state.selectedDisciplines.size === 0) { toast('Select at least one discipline.', 3000); return; }
      // Replace if name exists
      const idx = state.presets.findIndex(p => p.name === name);
      const preset = { name, disciplines: [...state.selectedDisciplines] };
      if (idx >= 0) state.presets[idx] = preset;
      else state.presets.push(preset);
      saveStorage();
      toast(`Saved preset "${name}".`, 3000);
      openDisciplineModal();
    });

    el('clearAllDisc').addEventListener('click', () => {
      state.selectedDisciplines.clear();
      openDisciplineModal();
    });

    el('applyDisc').addEventListener('click', () => {
      saveStorage();
      closeModal();
      // Reset sub-filters that no longer apply
      state.activeDisciplineFilter = new Set(
        [...state.activeDisciplineFilter].filter(p => state.selectedDisciplines.has(p))
      );
      render();
    });
  }

  /* =========================================================================
   * EVENT BINDING (DASHBOARD)
   * ========================================================================= */

  function bindAllEvents() {
    // Tabs
    document.querySelectorAll('[data-tab]').forEach(t => {
      t.addEventListener('click', () => {
        state.activeTab = t.dataset.tab;
        render();
      });
    });

    // Discipline sub-filters
    document.querySelectorAll('[data-disc-filter]').forEach(b => {
      b.addEventListener('click', () => {
        const code = b.dataset.discFilter;
        if (state.activeDisciplineFilter.has(code)) state.activeDisciplineFilter.delete(code);
        else state.activeDisciplineFilter.add(code);
        render();
      });
    });

    // Location filters
