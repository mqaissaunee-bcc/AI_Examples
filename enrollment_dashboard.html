<!DOCTYPE html>
<!--
  Enrollment Dashboard — Brookdale Community College
  ====================================================
  Version:  v5.4
  Date:     May 18, 2026
  Features: Refinements to grouped Empty/Full view and labels:
            - Courses sorted alphabetically (was: triggered count desc) for
              predictable position when scanning
            - No-alternatives warning trimmed to one sentence for
              single-section courses ("The only section of X is empty")
            - Alternatives merged into one fill-descending list; subgroup
              headings ("Push these over the line", "More room available")
              removed; subtle priority row tint retained as visual cue;
              added a column header row
            - KPI label "Students Enrolled" -> "Enrollment"
            - Filter bar group label "Scope" -> "Discipline group"
            Built on v4.9 canonical baseline.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enrollment Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #f4f1ea;
    --surface: #ffffff;
    --surface-2: #faf7f0;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-mute: #8a8580;
    --rule: #d9d3c4;
    --rule-strong: #1a1a1a;
    --good: #2d5a3d;
    --warn: #c4452d;
    --warn-soft: #e8a995;
    --info: #2c5f8d;
    --shadow: 0 1px 0 rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
    --up: #2d5a3d;
    --down: #c4452d;
    --flat: #8a8580;
  }
  /* Crisp white theme — cooler, more dashboard-like, less editorial-paper */
  [data-theme="white"] {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface-2: #f5f7fa;
    --ink: #0f172a;
    --ink-soft: #475569;
    --ink-mute: #94a3b8;
    --rule: #e2e8f0;
    --rule-strong: #0f172a;
    --good: #0f766e;
    --warn: #b91c1c;
    --warn-soft: #fecaca;
    --info: #1e40af;
    --shadow: 0 1px 0 rgba(0,0,0,0.03), 0 4px 14px rgba(15,23,42,0.06);
    --up: #0f766e;
    --down: #b91c1c;
    --flat: #94a3b8;
  }
  [data-theme="dark"] {
    --bg: #1a1814;
    --surface: #252118;
    --surface-2: #2c2820;
    --ink: #f0ead8;
    --ink-soft: #c4bfb1;
    --ink-mute: #807a6e;
    --rule: #3a3528;
    --rule-strong: #f0ead8;
    --good: #6ba87f;
    --warn: #e36849;
    --warn-soft: #6b3025;
    --info: #6ea3c9;
    --shadow: 0 1px 0 rgba(0,0,0,0.2), 0 8px 24px rgba(0,0,0,0.4);
    --up: #6ba87f;
    --down: #e36849;
    --flat: #807a6e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
    line-height: 1.5;
    min-height: 100vh;
    padding: 24px;
    transition: background 0.3s, color 0.3s;
  }
  .container { max-width: 1400px; margin: 0 auto; }

  /* Masthead */
  header.masthead {
    border-top: 6px solid var(--rule-strong);
    border-bottom: 1px solid var(--rule-strong);
    padding: 16px 0 12px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
  }
  .masthead .edition {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-mute);
  }
  .masthead h1 {
    font-family: 'Didot', 'Bodoni 72', 'Bodoni MT', 'Playfair Display', Georgia, serif;
    font-weight: 400;
    font-size: clamp(28px, 4vw, 44px);
    letter-spacing: -0.01em;
    text-align: center;
    line-height: 1.05;
  }
  .masthead .controls {
    display: flex; gap: 8px; justify-content: flex-end; align-items: center; flex-wrap: wrap;
  }
  .btn {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    background: transparent;
    border: 1px solid var(--rule-strong);
    color: var(--ink);
    padding: 8px 14px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn:hover { background: var(--rule-strong); color: var(--bg); }
  .btn.primary { background: var(--rule-strong); color: var(--bg); }
  .btn.primary:hover { opacity: 0.85; }
  .btn.ghost { border-color: var(--rule); color: var(--ink-mute); }
  .btn.ghost:hover { border-color: var(--rule-strong); background: transparent; color: var(--ink); }
  .btn.danger { border-color: var(--warn); color: var(--warn); }
  .btn.danger:hover { background: var(--warn); color: #fff; }
  input[type="file"] { display: none; }

  .subline {
    text-align: center;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 14px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--rule);
  }
  .subline .pipe { color: var(--ink-mute); margin: 0 10px; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--rule-strong);
    margin-bottom: 24px;
  }
  .tab {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    color: var(--ink-mute);
    padding: 12px 20px;
    cursor: pointer;
    transition: color 0.15s;
  }
  .tab:hover { color: var(--ink); }
  .tab.active {
    color: var(--ink);
    border-bottom-color: var(--rule-strong);
    font-weight: 700;
  }
  .tab .count {
    display: inline-block;
    background: var(--surface-2);
    border: 1px solid var(--rule);
    padding: 1px 6px;
    margin-left: 6px;
    font-size: 10px;
    border-radius: 8px;
  }

  /* Welcome / empty state */
  .welcome {
    background: var(--surface);
    border: 1px solid var(--rule);
    padding: 60px 40px;
    text-align: center;
    box-shadow: var(--shadow);
    max-width: 720px;
    margin: 40px auto;
  }
  .welcome h2 {
    font-family: 'Didot', 'Bodoni 72', Georgia, serif;
    font-weight: 400;
    font-size: 36px;
    margin-bottom: 16px;
    line-height: 1.1;
  }
  .welcome p {
    color: var(--ink-soft);
    margin: 0 auto 16px;
    max-width: 540px;
  }
  .welcome .step {
    display: grid;
    grid-template-columns: 32px 1fr;
    gap: 16px;
    text-align: left;
    max-width: 480px;
    margin: 24px auto;
    padding: 12px 0;
    border-bottom: 1px dotted var(--rule);
  }
  .welcome .step:last-of-type { border-bottom: none; }
  .welcome .step .num {
    font-family: 'Didot', 'Bodoni 72', Georgia, serif;
    font-size: 24px;
    color: var(--ink-mute);
    text-align: center;
    line-height: 1.2;
  }
  .welcome .step .body { font-size: 14px; }
  .welcome .step .body strong { display: block; margin-bottom: 2px; font-family: 'Helvetica Neue', sans-serif; font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; }
  .welcome .upload-btn {
    display: inline-block;
    background: var(--rule-strong);
    color: var(--bg);
    padding: 14px 28px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    cursor: pointer;
    margin-top: 16px;
    border: none;
  }
  .welcome .upload-btn:hover { opacity: 0.85; }

  .loader-bar {
    width: 240px;
    height: 4px;
    background: var(--surface-2);
    border: 1px solid var(--rule);
    margin: 24px auto 0;
    overflow: hidden;
    position: relative;
  }
  .loader-fill {
    position: absolute;
    top: 0; left: -40%;
    width: 40%;
    height: 100%;
    background: var(--rule-strong);
    animation: loaderSlide 1.4s ease-in-out infinite;
  }
  @keyframes loaderSlide {
    0% { left: -40%; }
    100% { left: 100%; }
  }

  /* Discipline picker modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--rule-strong);
    max-width: 720px; width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 24px 60px rgba(0,0,0,0.3);
  }
  .modal .modal-head {
    padding: 20px 24px;
    border-bottom: 1px solid var(--rule);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal .modal-head h2 {
    font-family: 'Didot', 'Bodoni 72', Georgia, serif;
    font-weight: 400;
    font-size: 24px;
  }
  .modal .modal-body { padding: 20px 24px; }
  .modal .modal-foot {
    padding: 16px 24px;
    border-top: 1px solid var(--rule);
    display: flex; justify-content: space-between; gap: 8px;
    background: var(--surface-2);
  }
  .modal .close { background: none; border: none; cursor: pointer; color: var(--ink-mute); font-size: 24px; }

  .institute-group {
    margin-bottom: 18px;
    border: 1px solid var(--rule);
    background: var(--surface-2);
  }
  .institute-group .ig-head {
    padding: 8px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--rule);
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    display: flex; justify-content: space-between; align-items: center;
  }
  .institute-group .ig-head .ig-actions { display: flex; gap: 8px; }
  .institute-group .ig-head a {
    font-size: 10px; color: var(--ink-mute); cursor: pointer; text-decoration: underline;
  }
  .institute-group .ig-body {
    padding: 10px 14px;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .disc-chip {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px;
    padding: 6px 12px;
    border: 1px solid var(--rule);
    background: var(--surface);
    color: var(--ink);
    cursor: pointer;
    user-select: none;
    transition: all 0.12s;
    display: flex; align-items: center; gap: 6px;
  }
  .disc-chip:hover { border-color: var(--ink); }
  .disc-chip.selected {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .disc-chip .ct {
    font-size: 10px;
    opacity: 0.7;
  }

  .preset-row {
    padding: 12px 14px;
    background: var(--surface-2);
    border: 1px solid var(--rule);
    margin-bottom: 18px;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .preset-row .preset-label {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-mute);
    margin-right: 8px;
  }
  .preset-row .preset-chip {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    padding: 5px 10px;
    border: 1px solid var(--rule);
    background: var(--surface);
    color: var(--ink-soft);
    cursor: pointer;
  }
  .preset-row .preset-chip:hover { border-color: var(--ink); color: var(--ink); }
  .preset-row .preset-chip .x { color: var(--ink-mute); margin-left: 6px; }
  .preset-row .preset-chip .x:hover { color: var(--warn); }

  /* KPI strip */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: var(--surface);
    border-top: 1px solid var(--rule-strong);
    border-bottom: 1px solid var(--rule-strong);
    margin-bottom: 24px;
  }
  .kpi-strip.has-fte {
    grid-template-columns: repeat(5, 1fr);
  }
  .kpi {
    padding: 18px 22px;
    border-right: 1px solid var(--rule);
  }
  .kpi:last-child { border-right: none; }
  .kpi .label {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-mute);
    margin-bottom: 6px;
  }
  .kpi .value {
    font-family: 'Didot', 'Bodoni 72', Georgia, serif;
    font-size: 34px;
    font-weight: 400;
    line-height: 1;
    display: flex; align-items: baseline; gap: 8px;
  }
  .kpi .delta {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px;
    font-weight: 600;
  }
  .kpi .delta.up { color: var(--up); }
  .kpi .delta.down { color: var(--down); }
  .kpi .delta.flat { color: var(--flat); }
  .kpi .sub { font-style: italic; color: var(--ink-soft); font-size: 12px; margin-top: 6px; }
  .kpi .delta { cursor: help; }
  .kpi .bench {
    font-style: normal;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-left: 4px;
    cursor: help;
  }
  .bench.up { color: var(--up); }
  .bench.down { color: var(--down); }
  .bench.flat { color: var(--flat); font-weight: 400; font-style: italic; }
  .panel .stat-row .d { cursor: help; }

  /* Filter bar */
  .filter-bar {
    background: var(--surface-2);
    border: 1px solid var(--rule);
    padding: 14px 18px;
    margin-bottom: 24px;
    display: flex; flex-wrap: wrap; gap: 18px; align-items: center;
  }
  .filter-group { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .filter-group .lbl {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--ink-mute); margin-right: 4px;
  }
  .chip {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    padding: 5px 11px;
    border: 1px solid var(--rule);
    background: var(--surface);
    color: var(--ink-soft);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.12s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .chip:hover { border-color: var(--ink); color: var(--ink); }
  .chip.active {
    background: var(--rule-strong);
    color: var(--bg);
    border-color: var(--rule-strong);
  }
  .chip .swatch {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }
  .filter-bar .reset {
    margin-left: auto;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em;
    background: transparent; border: none; color: var(--ink-mute);
    cursor: pointer; text-decoration: underline;
  }
  .filter-bar .reset:hover { color: var(--ink); }

  /* Section title */
  .section-title {
    font-family: 'Didot', 'Bodoni 72', Georgia, serif;
    font-size: 22px;
    font-weight: 400;
    margin: 28px 0 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--rule-strong);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }
  .section-title .meta {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-mute);
    font-style: normal;
    flex: 1;
    text-align: right;
  }
  /* Bulk-toggle button (Collapse all / Expand all) sits at the far right
     of the Sections at a Glance heading. Same chip-style as Institute
     discipline-group chips for visual parity. */
  .section-title .bulk-toggle {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    background: transparent;
    border: 1px solid var(--rule-strong);
    color: var(--ink);
    padding: 4px 12px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    align-self: center;
  }
  .section-title .bulk-toggle:hover {
    background: var(--ink);
    color: var(--surface);
  }
  .section-title .bulk-toggle:focus-visible {
    outline: 2px solid var(--info);
    outline-offset: 2px;
  }

  .grid-auto {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 16px;
  }

  /* Compact discipline comparison table (replaces card grid in v4.5) */
  .discipline-table-wrap {
    background: var(--surface);
    border: 1px solid var(--rule);
    box-shadow: var(--shadow);
    margin-bottom: 24px;
    overflow-x: auto;
  }
  .discipline-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13px;
  }
  .discipline-table thead th {
    background: var(--surface-2);
    border-bottom: 2px solid var(--rule-strong);
    padding: 8px 12px;
    text-align: left;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 10px;
    color: var(--ink-mute);
    font-weight: 600;
  }
  .discipline-table thead th.right { text-align: right; }
  .discipline-table tbody td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--rule);
    vertical-align: middle;
  }
  .discipline-table tbody td.right { text-align: right; }
  .discipline-table tbody tr:last-child td { border-bottom: none; }
  .discipline-table tbody tr:hover { background: var(--surface-2); }
  .discipline-table .ds-disc {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .discipline-table .ds-disc .swatch {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 1px solid var(--rule);
  }
  .discipline-table .ds-trend {
    width: 110px;
    padding-right: 14px;
  }
  .discipline-table .ds-bench {
    font-size: 11px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-top: 3px solid var(--rule);
    padding: 16px 18px 14px;
    box-shadow: var(--shadow);
  }
  .panel h3 {
    font-family: 'Didot', 'Bodoni 72', Georgia, serif;
    font-weight: 400;
    font-size: 18px;
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 10px;
  }
  .panel h3 .swatch { width: 12px; height: 12px; display: inline-block; }
  .panel .panel-sub {
    font-style: italic; color: var(--ink-mute); font-size: 12px; margin-bottom: 12px;
  }
  .panel .stat-row {
    display: grid; grid-template-columns: 1fr auto auto; gap: 10px;
    padding: 5px 0;
    border-bottom: 1px dotted var(--rule);
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px;
    align-items: center;
  }
  .panel .stat-row:last-child { border-bottom: none; }
  .panel .stat-row .k { color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.1em; font-size: 10px; }
  .panel .stat-row .v { font-weight: 600; font-variant-numeric: tabular-nums; }
  .panel .stat-row .d {
    font-size: 10px; font-weight: 600;
    min-width: 40px; text-align: right;
  }
  .panel .stat-row .d.up { color: var(--up); }
  .panel .stat-row .d.down { color: var(--down); }
  .panel .stat-row .d.flat { color: var(--flat); }
  .panel .panel-sparkline { margin-top: 10px; }

  /* Course cards */
  .discipline-group {
    margin-bottom: 16px;
  }
  .discipline-header {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-left: 4px solid var(--rule);
    box-shadow: var(--shadow);
    cursor: pointer;
    font-family: 'Helvetica Neue', sans-serif;
    text-align: left;
    transition: background 0.15s;
    margin-bottom: 10px;
  }
  .discipline-header:hover { background: var(--surface-2); }
  .discipline-header .dh-arrow {
    font-size: 10px;
    color: var(--ink-mute);
    width: 12px;
    display: inline-block;
  }
  .discipline-header .dh-swatch {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 1px solid var(--rule);
  }
  .discipline-header .dh-label {
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--ink);
  }
  .discipline-header .discipline-meta {
    font-size: 11px;
    color: var(--ink-mute);
    margin-left: auto;
    font-weight: 400;
  }
  .discipline-header .collapsed-trace {
    font-style: italic;
  }

  .course-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 14px;
    margin-bottom: 14px;
  }
  .course-card {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-left: 4px solid var(--rule);
    padding: 14px 16px;
    box-shadow: var(--shadow);
    transition: transform 0.15s;
  }
  .course-card:hover { transform: translateY(-2px); }
  .course-card .cc-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px; gap: 8px;
  }
  .course-card .code {
    font-family: 'Helvetica Neue', sans-serif;
    font-weight: 700; font-size: 13px; letter-spacing: 0.04em;
  }
  .course-card .loc {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--ink-mute);
    border: 1px solid var(--rule);
    padding: 2px 6px;
  }
  .course-card .title {
    font-style: italic; color: var(--ink-soft);
    font-size: 13px; margin-bottom: 10px; min-height: 2.6em;
  }
  .course-card .meter {
    height: 8px;
    background: var(--surface-2);
    border: 1px solid var(--rule);
    position: relative;
    margin-bottom: 6px;
    overflow: hidden;
  }
  .course-card .meter .fill {
    position: absolute; top: 0; left: 0; bottom: 0;
    background: var(--ink);
    transition: width 0.4s ease;
  }
  .course-card .num-row {
    display: flex; justify-content: space-between;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px; color: var(--ink-soft);
    margin-bottom: 4px;
  }
  .course-card .num-row strong { color: var(--ink); }
  .course-card .delta-row {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .course-card .delta-row .v-up { color: var(--up); font-weight: 700; }
  .course-card .delta-row .v-down { color: var(--down); font-weight: 700; }
  .course-card .delta-row .v-flat { color: var(--flat); }
  .course-card .meta-row {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-top: 1px dotted var(--rule);
    padding-top: 8px;
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px;
  }
  .course-card .meta-row .tag.full { color: var(--good); font-weight: 700; }
  .course-card .meta-row .tag.empty { color: var(--warn); font-weight: 700; }
  .course-card .meta-row .tag.wait { color: var(--warn); font-weight: 700; }

  /* Sparklines */
  .spark { display: inline-block; vertical-align: middle; }

  /* Table */
  .table-toolbar {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
  }
  .table-search {
    flex: 1;
    max-width: 480px;
    position: relative;
    display: flex;
    align-items: center;
  }
  .table-search .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-mute);
    font-size: 14px;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 9px 36px 9px 32px;
    border: 1px solid var(--rule);
    background: var(--surface);
    color: var(--ink);
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13px;
    transition: border-color 0.15s;
  }
  .search-input:focus {
    outline: none;
    border-color: var(--rule-strong);
  }
  .search-input::placeholder {
    color: var(--ink-mute);
    font-style: italic;
  }
  .search-clear {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--ink-mute);
    font-size: 18px;
    line-height: 1;
    width: 24px;
    height: 24px;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .search-clear:hover { color: var(--ink); }
  .search-count {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-mute);
    white-space: nowrap;
  }
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--rule);
    overflow-x: auto;
    box-shadow: var(--shadow);
  }
  table { width: 100%; border-collapse: collapse; font-family: 'Helvetica Neue', sans-serif; font-size: 12px; }
  thead th {
    background: var(--surface-2);
    border-bottom: 2px solid var(--rule-strong);
    padding: 10px 12px;
    text-align: left;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  thead th:hover { background: var(--rule); }
  thead th .arrow { color: var(--ink-mute); margin-left: 4px; }
  tbody td { padding: 9px 12px; border-bottom: 1px solid var(--rule); vertical-align: middle; }
  tbody tr:hover { background: var(--surface-2); }
  td.right { text-align: right; font-variant-numeric: tabular-nums; }
  td.center { text-align: center; }
  td .mini-meter {
    width: 70px; height: 6px;
    background: var(--surface-2);
    border: 1px solid var(--rule);
    display: inline-block; position: relative; vertical-align: middle; margin-right: 8px;
  }
  td .mini-meter .mf { position: absolute; top: 0; left: 0; bottom: 0; background: var(--ink); }

  .badge {
    display: inline-block;
    padding: 2px 7px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border: 1px solid var(--rule);
    background: var(--surface);
    color: var(--ink-soft);
  }
  .badge.full { background: var(--good); color: #fff; border-color: var(--good); }
  .badge.high { background: var(--info); color: #fff; border-color: var(--info); }
  .badge.low { background: transparent; color: var(--warn); border-color: var(--warn); }
  .badge.zero { background: var(--warn); color: #fff; border-color: var(--warn); }

  /* Sibling section indicator — shown beneath section codes when a
     fill-status filter is active, to surface context the filter hides */
  .sibling-row {
    display: block;
    margin-top: 5px;
    padding-top: 5px;
    border-top: 1px dotted var(--rule);
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    font-weight: 400;
    color: var(--ink-mute);
    letter-spacing: 0.02em;
    line-height: 1.5;
  }
  .sibling-row.warn { color: var(--warn); font-weight: 600; }
  .sibling-row .sib {
    display: inline-block;
    margin-right: 10px;
    padding: 1px 6px;
    border: 1px solid var(--rule);
    background: var(--surface-2);
    border-radius: 2px;
  }
  .sibling-row .sib strong { color: var(--ink); font-weight: 700; }
  .sibling-row .sib em { font-style: normal; }
  .sibling-row .sib.sib-full strong { color: var(--good); }
  .sibling-row .sib.sib-empty strong { color: var(--warn); }
  .sibling-row .sib.sib-available em { color: var(--good); font-weight: 600; }
  .sibling-row .sib .sib-scope {
    display: inline-block;
    margin-left: 4px;
    padding: 0 4px;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border: 1px solid var(--rule);
    color: var(--ink-mute);
  }
  .sibling-row .sib-note {
    color: var(--ink-mute);
    font-style: italic;
    font-size: 10px;
    margin-left: 4px;
  }

  .delta-cell {
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .delta-cell.up { color: var(--up); }
  .delta-cell.down { color: var(--down); }
  .delta-cell.flat { color: var(--flat); }

  /* ============================================================ */
  /* Course-grouped view (cg-*) — Empty and Full buckets           */
  /* Consolidates per-section sibling listings into per-course     */
  /* panels with shared alternatives.                              */
  /* ============================================================ */
  .cg-container {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .cg-panel {
    border: 1px solid var(--rule);
    border-left: 4px solid var(--warn);
    background: var(--surface);
    box-shadow: var(--shadow);
  }
  .cg-panel.cg-full {
    border-left-color: var(--info);
  }
  .cg-panel-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 14px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--rule);
  }
  .cg-panel-head .cg-course-id {
    font-weight: 700;
    font-size: 14px;
    color: var(--ink);
  }
  .cg-panel-head .cg-course-title {
    color: var(--ink-soft);
    margin-left: 8px;
    font-size: 13px;
  }
  .cg-panel-head .cg-course-stats {
    font-size: 11px;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
  }
  .cg-panel-head .cg-course-stats strong { color: var(--ink); }

  /* Waitlist callout (full bucket) */
  .cg-waitlist-callout {
    padding: 7px 14px;
    background: #fff7e8;
    border-bottom: 1px solid var(--rule);
    font-size: 11px;
    color: #6a5417;
  }
  .cg-waitlist-callout strong { color: #4a3a0f; }

  /* Placeholder-capacity note (ACAD-089 etc.) */
  .cg-placeholder-note {
    padding: 7px 14px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--rule);
    font-size: 11px;
    color: var(--ink-soft);
  }
  .cg-placeholder-note strong { color: var(--ink); }

  /* Subpanel sections (triggered + alternatives) */
  .cg-triggered-sections,
  .cg-alternatives {
    padding: 10px 14px;
  }
  .cg-alternatives {
    border-top: 1px solid var(--rule);
  }
  .cg-panel-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    font-weight: 600;
    margin-bottom: 6px;
  }

  /* Triggered section rows. Empty bucket: 5 columns. Full bucket: 7 columns
     (adds Fill and Waitlist between Format and Days). Both grids share the
     same row-level styling. */
  .cg-triggered-row {
    display: grid;
    gap: 10px;
    padding: 4px 0;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .cg-row-empty {
    grid-template-columns: 90px 90px 80px 80px 1fr;
  }
  .cg-row-full {
    grid-template-columns: 90px 90px 100px 90px 70px 80px 1fr;
  }
  .cg-triggered-row.cg-row-header {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-mute);
    font-weight: 600;
    padding-bottom: 3px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 4px;
  }
  .cg-triggered-row .code { font-weight: 700; }
  .cg-instr-tba { color: var(--ink-mute); font-style: italic; }

  /* Alternatives section */
  .cg-alt-group {
    margin-bottom: 10px;
  }
  .cg-alt-group:last-child { margin-bottom: 0; }
  .cg-alt-group-label {
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .cg-alt-group.priority .cg-alt-group-label::before {
    content: '★ ';
    color: var(--good);
  }
  .cg-alt-row {
    display: grid;
    grid-template-columns: 75px 100px 50px 95px 65px 1fr;
    gap: 10px;
    padding: 3px 0 3px 10px;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    border-left: 2px solid transparent;
  }
  .cg-alt-row.priority {
    border-left-color: var(--good);
    background: rgba(45, 90, 61, 0.06);
  }
  .cg-alt-row .code { font-weight: 700; }
  .cg-alt-row .right { text-align: right; }
  .cg-alt-row .cg-open { font-weight: 600; color: var(--ink); }
  /* Column header for the merged alternatives list */
  .cg-alt-row.cg-alt-header {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-mute);
    font-weight: 600;
    padding-top: 4px;
    padding-bottom: 3px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 4px;
    border-left: none;
  }

  /* Fill bar (mini visual in alternatives) */
  .cg-fill-bar {
    display: inline-block;
    width: 50px;
    height: 6px;
    background: var(--surface-2);
    border: 1px solid var(--rule);
    position: relative;
    vertical-align: middle;
  }
  .cg-fill-bar-inner {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    background: var(--good);
  }
  .cg-fill-bar-inner.over { background: var(--info); }

  /* Format tags */
  .cg-format-tag {
    display: inline-block;
    padding: 1px 5px;
    font-size: 10px;
    background: var(--surface-2);
    border: 1px solid var(--rule);
    border-radius: 2px;
    color: var(--ink-soft);
    line-height: 1.5;
  }
  .cg-format-tag.online {
    background: rgba(30, 78, 140, 0.12);
    border-color: rgba(30, 78, 140, 0.35);
    color: var(--info);
  }
  .cg-format-tag.evening {
    background: rgba(196, 169, 90, 0.18);
    border-color: rgba(196, 169, 90, 0.5);
    color: #6a5417;
  }
  .cg-format-tag.wall { background: rgba(139, 71, 137, 0.12); border-color: rgba(139, 71, 137, 0.35); color: #6b3469; }

  /* Truncation footer */
  .cg-truncation-note {
    text-align: center;
    padding: 5px 4px;
    font-size: 11px;
    color: var(--ink-mute);
    font-style: italic;
  }
  .cg-truncation-note a {
    color: var(--info);
    text-decoration: none;
    border-bottom: 1px dotted var(--info);
  }
  /* Styled-as-link button for expansion toggles. Real <button> for keyboard
     accessibility and to avoid href="#" jumping to top of page. */
  .cg-toggle-link {
    background: none;
    border: none;
    padding: 0;
    margin: 0;
    cursor: pointer;
    color: var(--info);
    font-size: inherit;
    font-family: inherit;
    font-style: inherit;
    text-decoration: none;
    border-bottom: 1px dotted var(--info);
  }
  .cg-toggle-link:hover {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }
  .cg-toggle-link:focus-visible {
    outline: 2px solid var(--info);
    outline-offset: 2px;
  }
  /* Inline schedule in waitlist callout */
  .cg-callout-schedule {
    color: var(--ink-mute);
    font-size: 10px;
    margin-left: 1px;
  }

  /* No-alternatives warning */
  .cg-no-alts-warning {
    padding: 10px 12px;
    background: rgba(196, 69, 45, 0.08);
    border: 1px solid var(--warn);
    border-left: 3px solid var(--warn);
    font-size: 12px;
    color: var(--warn);
    line-height: 1.45;
  }
  .cg-no-alts-warning strong { color: var(--warn); }

  /* Snapshot management */
  .snapshot-list {
    border: 1px solid var(--rule);
    background: var(--surface);
  }
  .snap-row {
    display: grid;
    grid-template-columns: auto 1fr auto auto auto;
    gap: 16px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--rule);
    align-items: center;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13px;
  }
  .snap-row:last-child { border-bottom: none; }
  .snap-row.current { background: var(--surface-2); }
  .snap-row .date {
    font-family: 'Didot', Georgia, serif;
    font-size: 18px;
    min-width: 100px;
  }
  .snap-row .name { color: var(--ink-soft); font-style: italic; }
  .snap-row .stats { font-size: 11px; color: var(--ink-mute); white-space: nowrap; }
  .snap-row .badge.cur { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--ink);
    color: var(--bg);
    padding: 14px 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13px;
    z-index: 200;
    max-width: 380px;
    animation: toastIn 0.25s ease;
  }
  @keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .toast .toast-actions { margin-top: 8px; display: flex; gap: 10px; }
  .toast button {
    background: transparent;
    border: 1px solid var(--bg);
    color: var(--bg);
    padding: 4px 10px;
    font-family: inherit;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
  }
  .toast button:hover { background: var(--bg); color: var(--ink); }

  /* Trend chart */
  .trend-chart-wrap {
    background: var(--surface);
    border: 1px solid var(--rule);
    padding: 18px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .trend-chart-wrap h4 {
    font-family: 'Didot', Georgia, serif;
    font-weight: 400;
    font-size: 16px;
    margin-bottom: 4px;
  }
  .trend-chart-wrap .legend {
    display: flex; gap: 14px; flex-wrap: wrap;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 12px;
  }
  .trend-chart-wrap .legend span {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .trend-chart-wrap .legend .sw {
    display: inline-block; width: 16px; height: 3px;
  }

  /* Footer */
  footer {
    margin-top: 48px;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-mute);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }

  @media (max-width: 880px) {
    .kpi-strip,
    .kpi-strip.has-fte { grid-template-columns: repeat(2, 1fr); }
    .kpi { border-bottom: 1px solid var(--rule); }
    .kpi:nth-child(2n) { border-right: none; }
    .masthead { grid-template-columns: 1fr; text-align: center; }
    .masthead .controls { justify-content: center; }
    .masthead .edition { text-align: center; }
  }

  @media print {
    body { padding: 0; background: #fff; color: #000; }
    .masthead .controls, .filter-bar .reset, .welcome, .modal-overlay, .toast, .tabs { display: none; }
    .panel, .course-card, .table-wrap { box-shadow: none; break-inside: avoid; }
  }
</style>
</head>
<body>
<div class="container">

  <header class="masthead">
    <div class="edition">
      <div id="editionLeft">Faculty Edition</div>
      <div id="editionLeftSub">Fall 2026</div>
    </div>
    <h1>Enrollment Dashboard</h1>
    <div class="controls">
      <button class="btn" id="disciplineBtn" type="button" style="display:none">≡ Disciplines</button>
      <button class="btn" id="refreshBtn" type="button" title="Reload latest data from GitHub">↻ Refresh</button>
      <button class="btn" id="themeBtn" type="button">◐ Theme</button>
      <button class="btn ghost" id="printBtn" type="button">⎙ Print</button>
    </div>
  </header>

  <div class="subline" id="subline">
    <span id="reportDate">No data loaded</span>
    <span class="pipe">|</span>
    <span id="disciplineSummary">No disciplines selected</span>
    <span class="pipe">|</span>
    <span id="snapshotCount">0 snapshots</span>
  </div>

  <main id="dashboard"></main>

  <footer>
    <span>Enrollment Dashboard · Generic faculty tool · v5.4</span>
    <span id="footerStamp"></span>
  </footer>
</div>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>
(function () {
  'use strict';

  /* =========================================================================
   * CONFIGURATION
   * =========================================================================
   * The dashboard loads enrollment reports from a GitHub-hosted data folder.
   * To track a different semester, change DATA_PATH and update the manifest.
   * To work locally with files instead, leave as-is and serve the directory
   * with a static server (python3 -m http.server, etc.) — fetch() respects
   * relative paths.
   */
  const DATA_PATH = 'data/26FA/';
  const MANIFEST_FILE = 'manifest.json';

  /* =========================================================================
   * STATE & STORAGE
   * ========================================================================= */

  const STORAGE = {
    THEME: 'enroll-theme',
    DISCIPLINES: 'enroll-disciplines',
    PRESETS: 'enroll-presets',
    SNAPSHOTS: 'enroll-snapshots',
    INSTITUTE_INDEX: 'enroll-inst-idx',
    BENCHMARKS: 'enroll-benchmarks',
    CARD_EXPANSION: 'enroll-card-expansion',
    GROUPED_VIEW: 'enroll-grouped-view',
  };

  const state = {
    // Data
    snapshots: [],          // [{ id, date, label, filename, rows: [...] }] sorted ASC by date
    currentSnapshotId: null,
    instituteIndex: {},     // { 'BUSS': ['CULA','ACCT',...], ... }
    allDisciplines: [],     // [{ code, institute, count }]

    // User selections
    selectedDisciplines: new Set(),
    presets: [],            // [{ name, disciplines: [] }]

    // View / filters
    activeTab: 'snapshot',  // 'snapshot' | 'trends' | 'snapshots'
    activeLocations: new Set(),
    activeDisciplineFilter: new Set(), // sub-filter within selected
    sortKey: 'Section',
    sortDir: 1,
    showBenchmarks: true,
    tableSearch: '',        // search box content for full section detail table
    fillBucket: 'all',      // 'all' | 'full' | 'almost' | 'under' | 'empty'
    cardExpansion: {},      // explicit per-discipline overrides: { ELEC: true, MATH: false }
                            //   missing key => use smart default (expand if <20 sections)

    // Per-course expansion state for the grouped table view. Keys are
    // "{courseCode}:{group}" where group is 'triggered', 'priority', or 'room'.
    // Missing key => collapsed (show truncated list). Cleared per session;
    // not persisted to keep the default predictable.
    groupedExpansion: {},

    // When Empty or Full fill bucket is active, choose between a course-grouped
    // panel view (default) and the traditional one-row-per-section list. The
    // grouped view consolidates redundant alternative listings; the list view
    // is the original behavior, kept as a fallback for users who prefer it.
    groupedView: true,

    // Loading state for GitHub-hosted data
    loadStatus: 'idle',     // 'idle' | 'loading' | 'loaded' | 'error'
    loadError: null,
    loadedAt: null,         // when manifest was fetched
    manifestUpdatedAt: null,// "updated" field from manifest if present
    goals: null,            // { fte: 2953.0 } from manifest, or null
  };

  /* =========================================================================
   * UTILITIES
   * ========================================================================= */

  function uid() { return 'id-' + Math.random().toString(36).slice(2, 10); }
  function sum(arr, key) { return arr.reduce((a, r) => a + (Number(r[key]) || 0), 0); }
  function el(id) { return document.getElementById(id); }
  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // Deterministic color from string (used for discipline accent)
  function colorFor(code) {
    let h = 0;
    for (let i = 0; i < code.length; i++) h = (h * 31 + code.charCodeAt(i)) >>> 0;
    const hue = h % 360;
    // Avoid clashing with backgrounds: medium saturation/lightness
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    return `hsl(${hue} ${isDark ? '55%' : '55%'} ${isDark ? '60%' : '42%'})`;
  }

  // Parse date from filename: looks for MMDDYY or YYYYMMDD or _DDMMM patterns
  function parseDateFromFilename(name) {
    const noExt = name.replace(/\.[^.]+$/, '');
    // Pattern 1: MMDDYY (six trailing digits)
    let m = noExt.match(/(\d{2})(\d{2})(\d{2})(?!\d)/);
    if (m) {
      const [, mm, dd, yy] = m;
      const year = 2000 + parseInt(yy, 10);
      const date = new Date(year, parseInt(mm, 10) - 1, parseInt(dd, 10));
      if (!isNaN(date.getTime())) return date.toISOString().slice(0, 10);
    }
    // Pattern 2: YYYY-MM-DD or YYYYMMDD
    m = noExt.match(/(\d{4})[-_]?(\d{2})[-_]?(\d{2})/);
    if (m) {
      const date = new Date(parseInt(m[1], 10), parseInt(m[2], 10) - 1, parseInt(m[3], 10));
      if (!isNaN(date.getTime())) return date.toISOString().slice(0, 10);
    }
    return null;
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function fmtDateShort(iso) {
    if (!iso) return '—';
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function loadStorage() {
    try {
      const t = localStorage.getItem(STORAGE.THEME);
      if (t === 'dark' || t === 'white') {
        document.documentElement.setAttribute('data-theme', t);
      }
      // 'cream' / 'light' / null all mean default (no attribute)

      const d = localStorage.getItem(STORAGE.DISCIPLINES);
      if (d) state.selectedDisciplines = new Set(JSON.parse(d));

      const p = localStorage.getItem(STORAGE.PRESETS);
      if (p) state.presets = JSON.parse(p);

      // Snapshots now come from GitHub via loadFromManifest(); we do not
      // restore them from localStorage anymore.

      const ii = localStorage.getItem(STORAGE.INSTITUTE_INDEX);
      if (ii) state.instituteIndex = JSON.parse(ii);

      const bm = localStorage.getItem(STORAGE.BENCHMARKS);
      if (bm !== null) state.showBenchmarks = bm === 'true';

      const ce = localStorage.getItem(STORAGE.CARD_EXPANSION);
      if (ce) state.cardExpansion = JSON.parse(ce);

      const gv = localStorage.getItem(STORAGE.GROUPED_VIEW);
      if (gv !== null) state.groupedView = gv === 'true';
    } catch (err) {
      console.error('Storage load error:', err);
    }
  }

  function saveStorage() {
    try {
      localStorage.setItem(STORAGE.DISCIPLINES, JSON.stringify([...state.selectedDisciplines]));
      localStorage.setItem(STORAGE.PRESETS, JSON.stringify(state.presets));
      localStorage.setItem(STORAGE.INSTITUTE_INDEX, JSON.stringify(state.instituteIndex));
      localStorage.setItem(STORAGE.BENCHMARKS, String(state.showBenchmarks));
      localStorage.setItem(STORAGE.CARD_EXPANSION, JSON.stringify(state.cardExpansion));
      localStorage.setItem(STORAGE.GROUPED_VIEW, String(state.groupedView));
    } catch (err) {
      console.error('Storage save error (likely quota):', err);
    }
  }

  /* =========================================================================
   * DATA INGEST
   * ========================================================================= */

  function getCoursePrefix(course) {
    if (!course) return '';
    const m = String(course).trim().toUpperCase().match(/^([A-Z]{2,5})/);
    return m ? m[1] : '';
  }

  // Returns explicit session length from the spreadsheet if a column carries it;
  // otherwise null (we don't guess — too many co-op/internship/lab courses
  // would be mislabeled). When Brookdale adds an explicit session/part-of-term
  // column, this just starts working.
  function getSessionLength(row) {
    const candidates = ['Session', 'Part of Term', 'Session Length', 'Session Code'];
    for (const c of candidates) {
      if (row[c]) {
        const s = String(row[c]).toUpperCase();
        if (s.includes('11')) return '11';
        if (s.includes('15')) return '15';
        return s;
      }
    }
    return null;
  }

  function ingestFile(file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const sheetName = wb.SheetNames.find(n => /individual\s*sect/i.test(n)) || wb.SheetNames[0];
        const sheet = wb.Sheets[sheetName];
        const rawRows = XLSX.utils.sheet_to_json(sheet, { defval: null });
        ingestRows(rawRows, file.name);
      } catch (err) {
        console.error(err);
        toast('⚠ Could not read this spreadsheet. Make sure it is the standard "Individual Sects All" report.', 6000);
      }
    };
    reader.readAsArrayBuffer(file);
  }

  // Fetch manifest + all listed spreadsheets from the configured DATA_PATH.
  // Manifest format:
  //   {
  //     "updated": "2026-05-03T14:00:00Z",   // optional, ISO timestamp
  //     "term": "26FA",                       // optional, display label
  //     "snapshots": [
  //       { "date": "2026-04-28", "file": "26FA_Course_Enrollment_Report_042826.xlsx" },
  //       ...
  //     ]
  //   }
  async function loadFromManifest() {
    state.loadStatus = 'loading';
    render();

    const manifestUrl = DATA_PATH + MANIFEST_FILE;
    try {
      // Cache-bust to ensure freshly-pushed data shows up without hard refresh
      const manifestResp = await fetch(manifestUrl + '?t=' + Date.now());
      if (!manifestResp.ok) {
        throw new Error(`Manifest not found (HTTP ${manifestResp.status} at ${manifestUrl})`);
      }
      const manifest = await manifestResp.json();

      if (!manifest.snapshots || !Array.isArray(manifest.snapshots) || manifest.snapshots.length === 0) {
        throw new Error('Manifest contains no snapshots.');
      }

      state.manifestUpdatedAt = manifest.updated || null;
      state.goals = manifest.goals || null;  // e.g., { fte: 2953.0 } or null if not set

      // Fetch all spreadsheets in parallel
      const fetches = manifest.snapshots.map(async entry => {
        const fileUrl = DATA_PATH + entry.file;
        const resp = await fetch(fileUrl);
        if (!resp.ok) throw new Error(`Failed to fetch ${entry.file} (HTTP ${resp.status})`);
        const buf = await resp.arrayBuffer();
        return { entry, buf };
      });

      const results = await Promise.all(fetches);

      // Reset snapshots and rebuild from manifest order
      state.snapshots = [];

      for (const { entry, buf } of results) {
        try {
          const wb = XLSX.read(new Uint8Array(buf), { type: 'array' });
          const sheetName = wb.SheetNames.find(n => /individual\s*sect/i.test(n)) || wb.SheetNames[0];
          const sheet = wb.Sheets[sheetName];
          const rawRows = XLSX.utils.sheet_to_json(sheet, { defval: null });
          ingestRowsSilent(rawRows, entry.file, entry.date);
        } catch (err) {
          console.error(`Failed to parse ${entry.file}:`, err);
        }
      }

      if (state.snapshots.length === 0) {
        throw new Error('No snapshots could be parsed from manifest entries.');
      }

      state.snapshots.sort((a, b) => a.date.localeCompare(b.date));
      state.currentSnapshotId = state.snapshots[state.snapshots.length - 1].id;
      recomputeAllDisciplines();

      state.loadStatus = 'loaded';
      state.loadError = null;
      state.loadedAt = new Date().toISOString();

      // First-time visitors: open the discipline picker since they haven't
      // chosen yet. Returning visitors keep their saved disciplines.
      const isFirstVisit = state.selectedDisciplines.size === 0;
      render();
      if (isFirstVisit) {
        openDisciplineModal();
      }
    } catch (err) {
      console.error('Failed to load enrollment data:', err);
      state.loadStatus = 'error';
      state.loadError = err.message || String(err);
      render();
    }
  }

  // Like ingestRows, but used during manifest load — does not toast or modify
  // currentSnapshotId (the caller decides). Uses the manifest-provided date
  // rather than re-parsing it from the filename.
  function ingestRowsSilent(rawRows, filename, manifestDate) {
    const fall = rawRows.filter(r => {
      const term = String(r.Term || '').toUpperCase();
      return r.Course && term.includes('FA');
    }).map(r => {
      const prefix = getCoursePrefix(r.Course);
      return {
        Section: r.Section,
        Course: r.Course,
        'Course Title': r['Course Title'],
        Institute: String(r.Institute || '').trim(),
        Location: String(r.Location || '').trim(),
        Capacity: Number(r.Capacity) || 0,
        'Enrolled Students': Number(r['Enrolled Students']) || 0,
        'Avail Seats': Number(r['Avail Seats']) || 0,
        'Section Fill %': Number(String(r['Section Fill %']).replace('%', '')) || 0,
        'Wait List': Number(r['Wait List']) || 0,
        'Course Credit': Number(r['Course Credit']) || 0,
        'Total Student Credit Hours': Number(r['Total Student Credit Hours']) || 0,
        'Maximum Course SCH': Number(r['Maximum Course SCH']) || 0,
        'Section Start Time': r['Section Start Time'],
        'Meeting Days': r['Meeting Days'],
        Instructor: r.Instructor,
        Term: r.Term,
        _prefix: prefix,
        _session: getSessionLength(r),
      };
    }).filter(r => r._prefix);

    if (fall.length === 0) return;

    fall.forEach(r => {
      // Use "Other" as the Institute bucket for any row missing an Institute
      // classification. This surfaces orphan disciplines like ESPT (where IR
      // left Institute blank) in the discipline-group chips rather than hiding them.
      const inst = r.Institute || 'Other';
      if (!state.instituteIndex[inst]) state.instituteIndex[inst] = [];
      if (!state.instituteIndex[inst].includes(r._prefix)) {
        state.instituteIndex[inst].push(r._prefix);
      }
    });
    Object.keys(state.instituteIndex).forEach(k => state.instituteIndex[k].sort());

    const date = manifestDate || parseDateFromFilename(filename) || new Date().toISOString().slice(0, 10);

    state.snapshots.push({
      id: uid(),
      date,
      label: fmtDate(date),
      filename,
      rows: fall,
      uploadedAt: new Date().toISOString(),
    });
  }

  function ingestRows(rawRows, filename) {
    const fall = rawRows.filter(r => {
      const term = String(r.Term || '').toUpperCase();
      return r.Course && term.includes('FA');
    }).map(r => {
      const prefix = getCoursePrefix(r.Course);
      return {
        // Carry only what we need to keep storage small
        Section: r.Section,
        Course: r.Course,
        'Course Title': r['Course Title'],
        Institute: String(r.Institute || '').trim(),
        Location: String(r.Location || '').trim(),
        Capacity: Number(r.Capacity) || 0,
        'Enrolled Students': Number(r['Enrolled Students']) || 0,
        'Avail Seats': Number(r['Avail Seats']) || 0,
        'Section Fill %': Number(String(r['Section Fill %']).replace('%', '')) || 0,
        'Wait List': Number(r['Wait List']) || 0,
        'Course Credit': Number(r['Course Credit']) || 0,
        'Total Student Credit Hours': Number(r['Total Student Credit Hours']) || 0,
        'Maximum Course SCH': Number(r['Maximum Course SCH']) || 0,
        'Section Start Time': r['Section Start Time'],
        'Meeting Days': r['Meeting Days'],
        Instructor: r.Instructor,
        Term: r.Term,
        _prefix: prefix,
        _session: getSessionLength(r),
      };
    }).filter(r => r._prefix);

    if (fall.length === 0) {
      toast('⚠ No fall sections found in this spreadsheet.', 5000);
      return;
    }

    // Build/refresh institute index
    fall.forEach(r => {
      const inst = r.Institute || 'Other';
      if (!state.instituteIndex[inst]) state.instituteIndex[inst] = [];
      if (!state.instituteIndex[inst].includes(r._prefix)) {
        state.instituteIndex[inst].push(r._prefix);
      }
    });
    Object.keys(state.instituteIndex).forEach(k => state.instituteIndex[k].sort());

    // Determine snapshot date
    let date = parseDateFromFilename(filename);
    if (!date) date = new Date().toISOString().slice(0, 10);

    // Check for duplicate date — if so, replace
    const existingIdx = state.snapshots.findIndex(s => s.date === date);
    const snapshot = {
      id: uid(),
      date,
      label: fmtDate(date),
      filename,
      rows: fall,
      uploadedAt: new Date().toISOString(),
    };

    let isFirstSnapshot = state.snapshots.length === 0;
    let replaced = false;

    if (existingIdx >= 0) {
      state.snapshots[existingIdx] = snapshot;
      replaced = true;
    } else {
      state.snapshots.push(snapshot);
    }
    state.snapshots.sort((a, b) => a.date.localeCompare(b.date));
    state.currentSnapshotId = snapshot.id;

    recomputeAllDisciplines();
    saveStorage();

    if (isFirstSnapshot && state.selectedDisciplines.size === 0) {
      // First-ever upload — show discipline picker
      render();
      openDisciplineModal();
      toast(`Loaded ${fall.length} sections from ${fmtDate(date)}. Pick the disciplines you want to track.`, 4000);
    } else {
      render();
      toast(replaced
        ? `Replaced snapshot for ${fmtDate(date)} (${fall.length} sections).`
        : `Snapshot added: ${fmtDate(date)} (${fall.length} sections, ${state.snapshots.length} total).`,
        4000);
    }
  }

  function recomputeAllDisciplines() {
    // Aggregate across ALL snapshots so a discipline that disappears from a
    // later report still shows up in the picker.
    const counts = {};
    const institutes = {};
    state.snapshots.forEach(snap => {
      snap.rows.forEach(r => {
        if (!r._prefix) return;
        counts[r._prefix] = (counts[r._prefix] || 0) + 1;
        institutes[r._prefix] = r.Institute || '(unspecified)';
      });
    });
    state.allDisciplines = Object.keys(counts).sort().map(code => ({
      code,
      institute: institutes[code],
      count: counts[code],
    }));
  }

  /* =========================================================================
   * SNAPSHOT ACCESSORS
   * ========================================================================= */

  function currentSnapshot() {
    return state.snapshots.find(s => s.id === state.currentSnapshotId) || state.snapshots[state.snapshots.length - 1];
  }

  function previousSnapshot() {
    const cur = currentSnapshot();
    if (!cur) return null;
    const idx = state.snapshots.findIndex(s => s.id === cur.id);
    return idx > 0 ? state.snapshots[idx - 1] : null;
  }

  // Filtered current rows by selected disciplines + sub-filters
  // Returns true if a row matches the active fill-status bucket.
  // Buckets match the same thresholds the dashboard uses for badge colors:
  //   full     fill >= 100%
  //   almost   75% <= fill < 100%
  //   under    0 < fill < 50% (i.e., has some enrollment but under-filled)
  //   empty    enrolled === 0
  // Sections ending in -295 (Special Projects) or -299 (Internships) are
  // independent-enrollment courses — students sign up individually, often
  // late, and "0 enrolled" doesn't indicate a section in trouble. Excluded
  // from the Empty bucket filter and from empty-section counts in the
  // "By Discipline" summary table. Still visible under "All" and findable
  // via search ("295", "299", "internship").
  function isIndependentEnrollment(r) {
    const course = String(r.Course || '');
    return /-295$/.test(course) || /-299$/.test(course);
  }

  function rowInFillBucket(r, bucket) {
    if (bucket === 'all') return true;
    const fill = Number(r['Section Fill %']) || 0;
    const enrolled = Number(r['Enrolled Students']) || 0;
    if (bucket === 'full')   return fill >= 100;
    if (bucket === 'almost') return fill >= 75 && fill < 100;
    if (bucket === 'under')  return enrolled > 0 && fill < 50;
    if (bucket === 'empty')  return enrolled === 0 && !isIndependentEnrollment(r);
    return true;
  }

  function filteredRows() {
    const snap = currentSnapshot();
    if (!snap) return [];
    return snap.rows.filter(r => {
      if (!state.selectedDisciplines.has(r._prefix)) return false;
      if (state.activeDisciplineFilter.size > 0 && !state.activeDisciplineFilter.has(r._prefix)) return false;
      if (state.activeLocations.size > 0 && !state.activeLocations.has(r.Location)) return false;
      if (!rowInFillBucket(r, state.fillBucket)) return false;
      return true;
    });
  }

  // College-wide stats for a snapshot — every fall section, all disciplines.
  // Returns { sections, enrolled, capacity, fill, sch }.
  function collegeWideStats(snap) {
    if (!snap) return { sections: 0, enrolled: 0, capacity: 0, fill: 0, sch: 0 };
    const rows = snap.rows;
    const enrolled = sum(rows, 'Enrolled Students');
    const capacity = sum(rows, 'Capacity');
    return {
      sections: rows.length,
      enrolled,
      capacity,
      fill: capacity > 0 ? (enrolled / capacity * 100) : 0,
      sch: sum(rows, 'Total Student Credit Hours'),
    };
  }

  // FTE (Full-Time Equivalent) = Total Student Credit Hours / 30.
  // This is the institutional planning metric, used here to track progress
  // toward a college-wide FTE goal (set in manifest.json as goals.fte).
  const FTE_DIVISOR = 30;

  function fteFromRows(rows) {
    return sum(rows, 'Total Student Credit Hours') / FTE_DIVISOR;
  }

  function collegeWideFTE(snap) {
    if (!snap) return 0;
    return fteFromRows(snap.rows);
  }

  function fteGoal() {
    return state.goals && state.goals.fte ? Number(state.goals.fte) : null;
  }

  function pctOfGoal(fte) {
    const g = fteGoal();
    return g ? (fte / g * 100) : null;
  }

  // True if comparison to college-wide is meaningful — i.e., user is looking
  // at a real subset, not (effectively) the whole college.
  function comparisonMeaningful() {
    if (!state.showBenchmarks) return false;
    const snap = currentSnapshot();
    if (!snap) return false;
    const totalDisciplines = state.allDisciplines.length;
    if (totalDisciplines === 0) return false;
    // Selected fewer than all disciplines OR has location/sub-filter narrowing
    if (state.selectedDisciplines.size < totalDisciplines) return true;
    if (state.activeDisciplineFilter.size > 0) return true;
    if (state.activeLocations.size > 0) return true;
    return false;
  }

  /* =========================================================================
   * RENDER ROOT
   * ========================================================================= */

  function render() {
    updateHeader();
    const dash = el('dashboard');

    // Loading or error → show welcome panel which handles those states
    if (state.loadStatus === 'loading' || state.loadStatus === 'error' || state.snapshots.length === 0) {
      dash.innerHTML = renderWelcome();
      el('disciplineBtn').style.display = 'none';
      bindBasic();
      return;
    }

    if (state.selectedDisciplines.size === 0) {
      dash.innerHTML = renderNoDisciplines();
      el('disciplineBtn').style.display = '';
      bindBasic();
      return;
    }

    el('disciplineBtn').style.display = '';

    let body = renderTabs();
    if (state.activeTab === 'snapshot') {
      body += renderKPIs();
      body += renderFilters();
      body += renderDisciplineSummaries();
      body += renderCourseGrid();
      body += renderTable();
    } else if (state.activeTab === 'trends') {
      body += renderTrendsView();
    } else if (state.activeTab === 'snapshots') {
      body += renderSnapshotManager();
    }

    dash.innerHTML = body;
    bindAllEvents();
  }

  function updateHeader() {
    const snap = currentSnapshot();
    if (state.loadStatus === 'loading') {
      el('reportDate').textContent = 'Loading…';
    } else if (state.loadStatus === 'error') {
      el('reportDate').textContent = 'Load failed';
    } else if (snap) {
      el('reportDate').textContent = `Latest report: ${fmtDate(snap.date)}`;
    } else {
      el('reportDate').textContent = 'No data loaded';
    }

    if (state.selectedDisciplines.size === 0) {
      el('disciplineSummary').textContent = 'No disciplines selected';
    } else {
      const list = [...state.selectedDisciplines].sort();
      const display = list.length <= 4 ? list.join(' · ') : `${list.slice(0, 3).join(' · ')} +${list.length - 3} more`;
      el('disciplineSummary').textContent = display;
    }

    el('snapshotCount').textContent =
      state.snapshots.length === 0 ? '0 snapshots'
      : state.snapshots.length === 1 ? '1 snapshot'
      : `${state.snapshots.length} snapshots`;

    if (snap) {
      const updated = state.manifestUpdatedAt
        ? `Data updated ${fmtDate(state.manifestUpdatedAt.slice(0, 10))}`
        : `Loaded ${state.loadedAt ? new Date(state.loadedAt).toLocaleString() : ''}`;
      el('footerStamp').textContent = `${updated} · ${snap.rows.length} sections in latest`;
    }
  }

  /* =========================================================================
   * WELCOME / EMPTY STATES
   * ========================================================================= */

  function renderWelcome() {
    if (state.loadStatus === 'loading') {
      return `
        <div class="welcome">
          <h2>Loading enrollment data…</h2>
          <p>Fetching the latest reports from the data folder. This usually takes a couple of seconds.</p>
          <div class="loader-bar"><div class="loader-fill"></div></div>
        </div>
      `;
    }

    if (state.loadStatus === 'error') {
      return `
        <div class="welcome">
          <h2>Couldn't load enrollment data.</h2>
          <p>${escapeHtml(state.loadError || 'Unknown error.')}</p>
          <p style="font-size:12px;color:var(--ink-mute);margin-top:16px">
            This dashboard reads from <code>${escapeHtml(DATA_PATH + MANIFEST_FILE)}</code> in the same folder as this page.
            If you're testing locally, make sure you're serving the directory through a web server (open files via <code>file://</code> won't work — browsers block fetch from local files).
          </p>
          <button class="upload-btn" id="retryBtn" type="button">Retry</button>
        </div>
      `;
    }

    // idle, no data — shouldn't normally hit this since init triggers a load
    return `
      <div class="welcome">
        <h2>Enrollment Dashboard</h2>
        <p>This dashboard tracks Fall enrollment for the disciplines you select. Data updates automatically as new reports are published.</p>
        <button class="upload-btn" id="loadDataBtn" type="button">Load Data</button>
      </div>
    `;
  }

  function renderNoDisciplines() {
    return `
      <div class="welcome">
        <h2>Choose the disciplines you teach.</h2>
        <p>Your data is loaded. Now tell the dashboard which course prefixes to focus on.</p>
        <button class="upload-btn" id="openDiscBtn" type="button">Choose Disciplines</button>
      </div>
    `;
  }

  function bindBasic() {
    const b = el('openDiscBtn');
    if (b) b.addEventListener('click', openDisciplineModal);
    const r = el('retryBtn');
    if (r) r.addEventListener('click', loadFromManifest);
    const l = el('loadDataBtn');
    if (l) l.addEventListener('click', loadFromManifest);
  }

  /* =========================================================================
   * TABS
   * ========================================================================= */

  function renderTabs() {
    const sections = filteredRows().length;
    return `
      <div class="tabs">
        <button class="tab ${state.activeTab === 'snapshot' ? 'active' : ''}" data-tab="snapshot">Current Snapshot <span class="count">${sections}</span></button>
        <button class="tab ${state.activeTab === 'trends' ? 'active' : ''}" data-tab="trends">Trends <span class="count">${state.snapshots.length}</span></button>
        <button class="tab ${state.activeTab === 'snapshots' ? 'active' : ''}" data-tab="snapshots">Snapshots</button>
      </div>
    `;
  }

  /* =========================================================================
   * KPI STRIP — with delta vs. previous snapshot
   * ========================================================================= */

  function renderKPIs() {
    const cur = filteredRows();
    const prevSnap = previousSnapshot();
    const prev = prevSnap
      ? prevSnap.rows.filter(r =>
          state.selectedDisciplines.has(r._prefix) &&
          (state.activeDisciplineFilter.size === 0 || state.activeDisciplineFilter.has(r._prefix)) &&
          (state.activeLocations.size === 0 || state.activeLocations.has(r.Location)) &&
          rowInFillBucket(r, state.fillBucket)
        )
      : null;

    const sectionsNow = cur.length;
    const enrolledNow = sum(cur, 'Enrolled Students');
    const capacityNow = sum(cur, 'Capacity');
    const fillNow = capacityNow > 0 ? (enrolledNow / capacityNow * 100) : 0;
    const schNow = sum(cur, 'Total Student Credit Hours');

    let dEnrolled = '', dFill = '', dSCH = '', dSections = '';
    if (prev) {
      const enrolledPrev = sum(prev, 'Enrolled Students');
      const capacityPrev = sum(prev, 'Capacity');
      const fillPrev = capacityPrev > 0 ? (enrolledPrev / capacityPrev * 100) : 0;
      const schPrev = sum(prev, 'Total Student Credit Hours');
      dSections = renderDelta(sectionsNow - prev.length, '');
      dEnrolled = renderDelta(enrolledNow - enrolledPrev, '');
      dFill = renderDelta(fillNow - fillPrev, 'pp', 1);
      dSCH = renderDelta(schNow - schPrev, '');
    }

    const fullCount = cur.filter(r => r['Section Fill %'] >= 100).length;
    const emptyCount = cur.filter(r => r['Enrolled Students'] === 0).length;
    const waitlistTotal = sum(cur, 'Wait List');

    // College-wide benchmark for fill comparison
    const showBench = comparisonMeaningful();
    const cw = showBench ? collegeWideStats(currentSnapshot()) : null;
    const fillVsCollege = cw ? (fillNow - cw.fill) : null;
    const fillSubtext = cw
      ? `${(capacityNow - enrolledNow).toLocaleString()} seats remaining · College: ${cw.fill.toFixed(1)}% ${benchDelta(fillVsCollege, 'pp', 1)}`
      : `${(capacityNow - enrolledNow).toLocaleString()} seats remaining`;

    // Fifth KPI: FTE Progress (only renders if a goal is set)
    const goal = fteGoal();
    const snap = currentSnapshot();
    let fteCard = '';
    if (goal && snap) {
      const collegeFTE = collegeWideFTE(snap);
      const collegePct = pctOfGoal(collegeFTE);
      const prevFTE = prevSnap ? collegeWideFTE(prevSnap) : null;
      const dFTE = prevFTE !== null ? collegeFTE - prevFTE : null;
      const dStr = dFTE !== null && Math.abs(dFTE) >= 0.05
        ? `<span class="delta ${dFTE > 0 ? 'up' : 'down'}" title="Change in college-wide FTE since the previous snapshot">${dFTE > 0 ? '+' : ''}${dFTE.toFixed(1)}</span>`
        : '';

      // Your selection's contribution
      const yourFTE = fteFromRows(cur);
      const yourPct = goal > 0 ? (yourFTE / goal * 100) : 0;
      const totalDisciplines = state.allDisciplines.length;
      const showYourSelection =
        state.selectedDisciplines.size > 0 &&
        state.selectedDisciplines.size < totalDisciplines;

      const sub = showYourSelection
        ? `${collegePct.toFixed(1)}% of ${goal.toLocaleString()} · You: ${yourFTE.toFixed(1)} (${yourPct.toFixed(1)}%)`
        : `${collegePct.toFixed(1)}% of ${goal.toLocaleString()} FTE goal`;

      fteCard = `
        <div class="kpi" title="Full-Time Equivalent (FTE) = Total Student Credit Hours ÷ 30. Compared against the college-wide goal for this term.">
          <div class="label">FTE Progress</div>
          <div class="value">${collegeFTE.toFixed(1)} ${dStr}</div>
          <div class="sub">${sub}</div>
        </div>
      `;
    }

    return `
      <div class="kpi-strip${goal ? ' has-fte' : ''}">
        <div class="kpi">
          <div class="label">Sections</div>
          <div class="value">${sectionsNow} ${dSections}</div>
          <div class="sub">${fullCount} at capacity · ${emptyCount} with zero enrolled</div>
        </div>
        <div class="kpi">
          <div class="label">Enrollment</div>
          <div class="value">${enrolledNow} ${dEnrolled}</div>
          <div class="sub">of ${capacityNow} total seats</div>
        </div>
        <div class="kpi">
          <div class="label">Overall Fill</div>
          <div class="value">${fillNow.toFixed(1)}% ${dFill}</div>
          <div class="sub">${fillSubtext}</div>
        </div>
        <div class="kpi">
          <div class="label">Student Credit Hrs</div>
          <div class="value">${schNow} ${dSCH}</div>
          <div class="sub">${waitlistTotal > 0 ? waitlistTotal + ' on waitlist' : 'no waitlist activity'}</div>
        </div>
        ${fteCard}
      </div>
    `;
  }

  // Inline benchmark delta, used in KPI subtexts and panel rows.
  // Distinct from time-delta: shows "+X.Xpp ahead" / "-X.Xpp behind".
  function benchDelta(n, unit, decimals) {
    if (n === null || n === undefined || isNaN(n)) return '';
    const tt = 'Compared to the college-wide fill rate right now (across every fall section). "pp" = percentage points.';
    if (Math.abs(n) < 0.05) return `<span class="bench flat" title="${escapeHtml(tt)}">at college avg</span>`;
    const sign = n > 0 ? '+' : '';
    const cls = n > 0 ? 'up' : 'down';
    const v = decimals ? n.toFixed(decimals) : n.toLocaleString();
    return `<span class="bench ${cls}" title="${escapeHtml(tt)}">${sign}${v}${unit || ''}</span>`;
  }

  function renderDelta(n, unit, decimals, title) {
    if (n === 0 || n === undefined || isNaN(n)) return `<span class="delta flat" title="No change since the previous snapshot">—</span>`;
    const sign = n > 0 ? '+' : '';
    const cls = n > 0 ? 'up' : 'down';
    const v = decimals ? n.toFixed(decimals) : n.toLocaleString();
    const tt = title || (unit === 'pp'
      ? 'Change since the previous snapshot. "pp" = percentage points (a simple subtraction between two percentages).'
      : 'Change since the previous snapshot.');
    return `<span class="delta ${cls}" title="${escapeHtml(tt)}">${sign}${v}${unit || ''}</span>`;
  }

  /* =========================================================================
   * FILTERS
   * ========================================================================= */

  function renderFilters() {
    const snap = currentSnapshot();
    if (!snap) return '';
    // Limit filter chips to selected disciplines that are present in current snapshot
    const present = [...state.selectedDisciplines].filter(p =>
      snap.rows.some(r => r._prefix === p)
    ).sort();
    const locations = [...new Set(snap.rows
      .filter(r => state.selectedDisciplines.has(r._prefix))
      .map(r => r.Location)
      .filter(Boolean))].sort();

    const buckets = [
      { id: 'all',    label: 'All',         title: 'Show every section' },
      { id: 'full',   label: 'Full',        title: 'Sections at 100% capacity' },
      { id: 'almost', label: 'Almost full', title: 'Sections at 75-99% fill — likely to fill before classes start' },
      { id: 'under',  label: 'Underfilled', title: 'Sections under 50% fill with at least one student' },
      { id: 'empty',  label: 'Empty',       title: 'Sections with zero enrolled students' },
    ];

    // Discipline-group shortcuts: institute-level chips (BUSS, STEM, etc.) for quick
    // broad-category switching. Institutes are mutually exclusive sets of
    // disciplines, so clicking BUSS adds all BUSS disciplines to the
    // selection. Clicking again (when BUSS is fully selected) removes them.
    //
    // A chip shows as "active" when every discipline in that institute is
    // currently in the selection. "Other" (orphans without an Institute
    // classification from IR) always sorts last so the five primary
    // Institutes appear in their familiar order first.
    const institutes = Object.keys(state.instituteIndex).sort((a, b) => {
      if (a === 'Other') return 1;
      if (b === 'Other') return -1;
      return a.localeCompare(b);
    });

    const isInstituteFullySelected = (inst) => {
      const codes = state.instituteIndex[inst] || [];
      return codes.length > 0 && codes.every(c => state.selectedDisciplines.has(c));
    };

    const instituteChips = institutes.length > 0
      ? institutes.map(inst => {
          const codes = state.instituteIndex[inst] || [];
          const active = isInstituteFullySelected(inst);
          // Special tooltip for "Other" since it isn't an actual Institute
          // — it's the dashboard's catch-all for disciplines without an
          // Institute assignment in IR's data.
          let tip;
          if (inst === 'Other') {
            const list = codes.join(', ');
            tip = active
              ? `Remove unclassified disciplines from selection (${list})`
              : `Add unclassified disciplines to selection. These have no Institute assignment in IR's data: ${list}`;
          } else {
            tip = active
              ? `Remove all ${codes.length} ${inst} disciplines from selection`
              : `Add all ${codes.length} ${inst} disciplines to selection`;
          }
          return `<button class="chip ${active ? 'active' : ''}" data-institute="${escapeHtml(inst)}" title="${escapeHtml(tip)}">${escapeHtml(inst)}</button>`;
        }).join('')
      : '';

    // Show "Show all" button when the user has narrowed to a subset.
    // Lets users restore the full college view without opening the
    // discipline picker modal.
    const totalDisciplines = state.allDisciplines.length;
    const selectedCount = state.selectedDisciplines.size;
    const showAllChip = (totalDisciplines > 0 && selectedCount < totalDisciplines)
      ? `<button class="chip" id="showAllDisciplines" type="button" title="Select all ${totalDisciplines} disciplines (currently showing ${selectedCount})">≡ Show all (${totalDisciplines})</button>`
      : '';

    const scopeGroup = (instituteChips || showAllChip)
      ? `<div class="filter-group">
          <span class="lbl">Discipline group</span>
          ${showAllChip}
          ${instituteChips}
        </div>`
      : '';

    return `
      <div class="filter-bar">
        ${present.length > 1 ? `
          <div class="filter-group">
            <span class="lbl">Discipline</span>
            ${present.map(p => `
              <button class="chip ${state.activeDisciplineFilter.has(p) ? 'active' : ''}" data-disc-filter="${p}">
                <span class="swatch" style="background:${colorFor(p)}"></span>${p}
              </button>
            `).join('')}
          </div>
        ` : ''}
        ${locations.length > 1 ? `
          <div class="filter-group">
            <span class="lbl">Location</span>
            ${locations.map(l => `
              <button class="chip ${state.activeLocations.has(l) ? 'active' : ''}" data-location="${escapeHtml(l)}">${escapeHtml(l)}</button>
            `).join('')}
          </div>
        ` : ''}
        <div class="filter-group">
          <span class="lbl">Fill</span>
          ${buckets.map(b => `
            <button class="chip ${state.fillBucket === b.id ? 'active' : ''}" data-bucket="${b.id}" title="${escapeHtml(b.title)}">${escapeHtml(b.label)}</button>
          `).join('')}
        </div>
        ${(state.fillBucket === 'empty' || state.fillBucket === 'full') ? `
          <div class="filter-group">
            <span class="lbl">View</span>
            <button class="chip ${state.groupedView ? 'active' : ''}" data-view-mode="grouped" title="Group sections by course with shared alternatives">Grouped</button>
            <button class="chip ${!state.groupedView ? 'active' : ''}" data-view-mode="list" title="Show each section as its own row (original behavior)">List</button>
          </div>
        ` : ''}
        <div class="filter-group">
          <span class="lbl">Compare</span>
          <button class="chip ${state.showBenchmarks ? 'active' : ''}" id="benchToggle" type="button" title="Compare against college-wide fall enrollment">
            ⊕ vs. College
          </button>
        </div>
        ${scopeGroup}
        <button class="reset" id="resetFilters">Reset filters</button>
      </div>
    `;
  }

  /* =========================================================================
   * DISCIPLINE SUMMARY PANELS
   * ========================================================================= */

  function renderDisciplineSummaries() {
    const snap = currentSnapshot();
    const prevSnap = previousSnapshot();
    let present = [...state.selectedDisciplines]
      .filter(p => snap.rows.some(r => r._prefix === p))
      .sort();

    // If the user has narrowed via the discipline filter chips, only show
    // panels for those disciplines.
    if (state.activeDisciplineFilter.size > 0) {
      present = present.filter(p => state.activeDisciplineFilter.has(p));
    }

    if (present.length === 0) {
      return `<div class="section-title">By Discipline</div>
        <p style="color:var(--ink-mute);font-style:italic;padding:14px 0">None of your selected disciplines appear in this snapshot.</p>`;
    }

    // Auto-hide: with only one discipline in view, the KPI strip above already
