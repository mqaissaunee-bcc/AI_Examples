<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D2L HTML Content Tutorial</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b27;
    --surface2: #1e2535;
    --border: #2a3347;
    --accent: #4f9cf9;
    --accent2: #38d9a9;
    --accent3: #ffd43b;
    --text: #e8edf5;
    --text-dim: #7a8ba8;
    --text-muted: #4a5568;
    --d2l-blue: #0066cc;
    --d2l-nav: #003366;
    --d2l-light: #f0f4f8;
    --d2l-border: #c8d3df;
    --d2l-hover: #e6f0fb;
    --d2l-orange: #e87722;
    --success: #38d9a9;
    --warning: #ffd43b;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .app-title .badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    background: var(--accent);
    color: #000;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.08em;
    font-weight: 500;
  }

  /* ─── MODE SWITCHER ─── */
  .mode-bar {
    display: flex;
    gap: 6px;
    background: var(--bg);
    padding: 5px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .mode-btn {
    font-family: 'Outfit', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    background: transparent;
    color: var(--text-dim);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .mode-btn:hover { background: var(--surface2); color: var(--text); }
  .mode-btn.active {
    background: var(--accent);
    color: #000;
    font-weight: 600;
  }
  .mode-icon { font-size: 1rem; }

  /* ─── MAIN LAYOUT ─── */
  .app-body { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

  /* ─── STEP PROGRESS ─── */
  .step-track {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 28px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .step-item {
    display: flex;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
  }
  .step-dot {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  .step-dot:hover { background: var(--surface2); }
  .step-dot.active { background: var(--surface2); border-color: var(--accent); }
  .step-dot.done .step-num { background: var(--success); color: #000; }
  .step-num {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
    transition: all 0.3s;
  }
  .step-dot.active .step-num { background: var(--accent); border-color: var(--accent); color: #000; }
  .step-label {
    font-size: 0.78rem;
    color: var(--text-dim);
    white-space: nowrap;
    font-weight: 500;
  }
  .step-dot.active .step-label { color: var(--text); }
  .step-connector {
    width: 28px;
    height: 2px;
    background: var(--border);
    flex-shrink: 0;
  }
  .step-connector.done { background: var(--success); }

  /* ─── PANELS ─── */
  .panel-row {
    display: grid;
    gap: 20px;
    margin-bottom: 20px;
  }
  .panel-row.side-by-side { grid-template-columns: 1fr 1fr; }
  .panel-row.walkthrough { grid-template-columns: 1fr; }
  .panel-row.annotated { grid-template-columns: 1fr; }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .panel-header {
    padding: 12px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .panel-dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-blue { background: var(--accent); }
  .dot-green { background: var(--success); }
  .dot-yellow { background: var(--warning); }

  /* ─── D2L MOCK ─── */
  .d2l-mock {
    font-family: 'Outfit', sans-serif;
    background: #f5f7fa;
    min-height: 480px;
    position: relative;
    overflow: hidden;
  }
  .d2l-topbar {
    background: var(--d2l-nav);
    padding: 0 16px;
    display: flex;
    align-items: center;
    height: 44px;
    gap: 20px;
  }
  .d2l-logo {
    color: white;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .d2l-logo span { color: #80b3e0; font-weight: 300; font-size: 0.75rem; }
  .d2l-nav-items {
    display: flex;
    gap: 4px;
    margin-left: auto;
    align-items: center;
  }
  .d2l-nav-pill {
    color: #aac4e0;
    font-size: 0.72rem;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
  }
  .d2l-nav-pill:hover { background: rgba(255,255,255,0.1); color: white; }

  .d2l-course-bar {
    background: white;
    border-bottom: 3px solid var(--d2l-blue);
    padding: 0 16px;
    display: flex;
    align-items: center;
    height: 38px;
    gap: 6px;
  }
  .d2l-course-name {
    font-weight: 700;
    font-size: 0.82rem;
    color: var(--d2l-nav);
  }
  .d2l-course-nav {
    display: flex;
    gap: 2px;
    margin-left: 20px;
  }
  .d2l-cnav-item {
    font-size: 0.72rem;
    padding: 4px 10px;
    color: #555;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -3px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .d2l-cnav-item:hover { color: var(--d2l-blue); }
  .d2l-cnav-item.active { color: var(--d2l-blue); border-bottom-color: var(--d2l-blue); font-weight: 600; }

  .d2l-content-area {
    padding: 16px;
    background: var(--d2l-light);
    min-height: 370px;
    position: relative;
  }

  /* breadcrumb */
  .d2l-breadcrumb {
    font-size: 0.7rem;
    color: #666;
    margin-bottom: 12px;
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .d2l-breadcrumb a { color: var(--d2l-blue); cursor: pointer; text-decoration: none; }
  .d2l-breadcrumb a:hover { text-decoration: underline; }

  /* ─── ACTION BUTTON ─── */
  .d2l-new-btn {
    background: var(--d2l-blue);
    color: white;
    border: none;
    padding: 8px 18px;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Outfit', sans-serif;
    transition: all 0.15s;
    box-shadow: 0 2px 6px rgba(0,102,204,0.3);
  }
  .d2l-new-btn:hover { background: #0055aa; transform: translateY(-1px); }
  .d2l-new-btn.secondary {
    background: white;
    color: var(--d2l-blue);
    border: 1.5px solid var(--d2l-blue);
    box-shadow: none;
  }
  .d2l-new-btn.secondary:hover { background: var(--d2l-hover); }

  /* ─── CONTENT LIST ─── */
  .d2l-module {
    background: white;
    border: 1px solid var(--d2l-border);
    border-radius: 6px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .d2l-module-header {
    background: #e8eff8;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 0.82rem;
    color: var(--d2l-nav);
    border-bottom: 1px solid var(--d2l-border);
    cursor: pointer;
  }
  .d2l-module-header .chevron { font-size: 0.6rem; color: #888; margin-left: auto; }
  .d2l-item {
    padding: 9px 14px 9px 32px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.78rem;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background 0.1s;
    color: #333;
  }
  .d2l-item:hover { background: var(--d2l-hover); }
  .d2l-item:last-child { border-bottom: none; }
  .d2l-item .item-icon { color: var(--d2l-blue); font-size: 0.85rem; }
  .d2l-item .item-new { background: var(--d2l-orange); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; font-weight: 700; }

  /* ─── TOOLBAR MOCK ─── */
  .d2l-editor-toolbar {
    background: #f0f0f0;
    border: 1px solid #ccc;
    border-bottom: none;
    padding: 4px 8px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    align-items: center;
    border-radius: 4px 4px 0 0;
  }
  .tb-btn {
    padding: 3px 8px;
    background: white;
    border: 1px solid #ccc;
    border-radius: 3px;
    font-size: 0.7rem;
    cursor: pointer;
    color: #333;
    font-family: 'Outfit', sans-serif;
    transition: all 0.1s;
    white-space: nowrap;
  }
  .tb-btn:hover { background: #e0e8f4; border-color: var(--d2l-blue); color: var(--d2l-blue); }
  .tb-btn.active, .tb-btn.highlighted {
    background: var(--d2l-blue);
    color: white;
    border-color: var(--d2l-blue);
  }
  .tb-sep { width: 1px; height: 20px; background: #ccc; margin: 0 3px; }

  .d2l-editor-area {
    border: 1px solid #ccc;
    border-radius: 0 0 4px 4px;
    min-height: 180px;
    background: white;
    padding: 12px;
    font-size: 0.78rem;
    color: #333;
    position: relative;
    overflow: hidden;
  }

  /* ─── HTML CODE AREA ─── */
  .d2l-html-area {
    border: 1px solid #0066cc;
    border-radius: 0 0 4px 4px;
    min-height: 180px;
    background: #1a1a2e;
    padding: 12px;
    font-size: 0.72rem;
    color: #a8d8ea;
    font-family: 'DM Mono', monospace;
    position: relative;
    overflow: auto;
    line-height: 1.6;
  }
  .html-kw { color: #ff79c6; }
  .html-tag { color: #8be9fd; }
  .html-attr { color: #f1fa8c; }
  .html-str { color: #50fa7b; }
  .html-comment { color: #6272a4; font-style: italic; }

  /* ─── INSTRUCTION PANEL ─── */
  .instruction-panel {
    padding: 24px;
  }
  .step-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .step-subtitle {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .action-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }
  .action-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 12px 14px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 0.83rem;
    line-height: 1.5;
    transition: all 0.2s;
  }
  .action-item.current {
    border-color: var(--accent);
    background: rgba(79,156,249,0.08);
  }
  .action-item.done {
    border-color: var(--success);
    opacity: 0.7;
  }
  .action-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
    color: var(--text-dim);
  }
  .action-item.current .action-num { background: var(--accent); color: #000; }
  .action-item.done .action-num { background: var(--success); color: #000; }
  .action-text { color: var(--text); }
  .action-text .kbd {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    color: var(--accent);
  }
  .action-text .highlight { color: var(--accent3); font-weight: 600; }
  .action-text .click-target {
    display: inline-block;
    background: var(--d2l-blue);
    color: white;
    padding: 1px 7px;
    border-radius: 3px;
    font-size: 0.72rem;
    font-weight: 600;
  }

  /* ─── TIP BOX ─── */
  .tip-box {
    background: rgba(56,217,169,0.08);
    border: 1px solid rgba(56,217,169,0.3);
    border-left: 4px solid var(--success);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.8rem;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .tip-box .tip-label {
    font-weight: 700;
    color: var(--success);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .warn-box {
    background: rgba(255,212,59,0.08);
    border: 1px solid rgba(255,212,59,0.3);
    border-left: 4px solid var(--warning);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.8rem;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .warn-box .warn-label {
    font-weight: 700;
    color: var(--warning);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* ─── NAV BUTTONS ─── */
  .nav-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    align-items: center;
  }
  .nav-btn {
    font-family: 'Outfit', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-btn.primary { background: var(--accent); color: #000; }
  .nav-btn.primary:hover { background: #3a8df0; transform: translateX(2px); }
  .nav-btn.ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .nav-btn.ghost:hover { background: var(--border); }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .step-counter {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  /* ─── ANNOTATION OVERLAY ─── */
  .annotation-overlay {
    position: absolute;
    pointer-events: none;
    top: 0; left: 0; right: 0; bottom: 0;
  }
  .callout {
    position: absolute;
    pointer-events: all;
  }
  .callout-bubble {
    background: #ffd43b;
    color: #1a1a00;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 0.7rem;
    font-weight: 700;
    font-family: 'Outfit', sans-serif;
    box-shadow: 0 3px 12px rgba(0,0,0,0.3);
    white-space: nowrap;
    line-height: 1.3;
    cursor: default;
    max-width: 180px;
    white-space: normal;
  }
  .callout-num {
    display: inline-flex;
    width: 20px; height: 20px;
    background: #1a1a00;
    color: #ffd43b;
    border-radius: 50%;
    align-items: center; justify-content: center;
    font-size: 0.65rem;
    font-weight: 800;
    margin-right: 4px;
    flex-shrink: 0;
  }
  .callout-line {
    position: absolute;
    background: #ffd43b;
    transform-origin: 0 50%;
  }

  /* ─── INTERACTIVE HIGHLIGHTS ─── */
  .highlight-pulse {
    animation: pulse-ring 1.5s ease-out infinite;
    border-radius: 6px;
    position: absolute;
    pointer-events: none;
    border: 2px solid var(--accent);
  }
  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(79,156,249,0.5); }
    70% { box-shadow: 0 0 0 8px rgba(79,156,249,0); }
    100% { box-shadow: 0 0 0 0 rgba(79,156,249,0); }
  }

  /* ─── SIMULATE CLICK BUTTON ─── */
  .sim-btn {
    position: absolute;
    font-family: 'Outfit', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 5px 12px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    box-shadow: 0 3px 12px rgba(79,156,249,0.5);
    animation: float 2s ease-in-out infinite;
    z-index: 10;
    transition: all 0.15s;
  }
  .sim-btn:hover { background: #3a8df0; transform: scale(1.05); }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  /* ─── DIALOG MOCK ─── */
  .d2l-dialog {
    background: white;
    border: 1px solid #aaa;
    border-radius: 6px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.25);
    overflow: hidden;
    width: 380px;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 50;
  }
  .d2l-dialog-header {
    background: var(--d2l-nav);
    color: white;
    padding: 10px 16px;
    font-size: 0.82rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .d2l-dialog-close {
    background: none;
    border: none;
    color: #aaa;
    cursor: pointer;
    font-size: 1rem;
    padding: 0 4px;
  }
  .d2l-dialog-body { padding: 16px; }
  .d2l-field { margin-bottom: 12px; }
  .d2l-label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: #333;
    margin-bottom: 4px;
  }
  .d2l-input {
    width: 100%;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 7px 10px;
    font-size: 0.78rem;
    font-family: 'Outfit', sans-serif;
    color: #333;
    background: white;
  }
  .d2l-input:focus { border-color: var(--d2l-blue); outline: none; box-shadow: 0 0 0 3px rgba(0,102,204,0.15); }
  .d2l-select {
    width: 100%;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 7px 10px;
    font-size: 0.78rem;
    font-family: 'Outfit', sans-serif;
    color: #333;
    background: white;
  }
  .d2l-dialog-footer {
    padding: 10px 16px;
    border-top: 1px solid #eee;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .d2l-dialog-btn {
    padding: 6px 16px;
    border-radius: 4px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    border: none;
    transition: all 0.15s;
  }
  .d2l-dialog-btn.primary { background: var(--d2l-blue); color: white; }
  .d2l-dialog-btn.primary:hover { background: #0055aa; }
  .d2l-dialog-btn.cancel { background: #eee; color: #555; border: 1px solid #ccc; }

  /* ─── OVERLAY ─── */
  .modal-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 40;
  }

  /* ─── SAVE BAR ─── */
  .d2l-save-bar {
    background: #f9f9f9;
    border-top: 1px solid #ddd;
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  /* ─── COMPLETION ─── */
  .completion-card {
    text-align: center;
    padding: 48px 32px;
  }
  .completion-icon {
    font-size: 4rem;
    margin-bottom: 16px;
    display: block;
    animation: bounce 1s ease-out;
  }
  @keyframes bounce {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }
  .completion-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: var(--success);
    margin-bottom: 10px;
  }
  .completion-sub {
    color: var(--text-dim);
    font-size: 0.9rem;
    max-width: 480px;
    margin: 0 auto 24px;
    line-height: 1.7;
  }
  .checklist {
    text-align: left;
    max-width: 400px;
    margin: 0 auto 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .checklist-item {
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 0.83rem;
    color: var(--text);
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 6px;
  }
  .check-icon { color: var(--success); font-size: 1rem; }

  /* ─── ANNOTATED LEGEND ─── */
  .annotation-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 16px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--text-dim);
    background: var(--surface);
    padding: 5px 10px;
    border-radius: 5px;
    border: 1px solid var(--border);
  }
  .legend-num {
    width: 18px; height: 18px;
    background: #ffd43b;
    color: #1a1a00;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    font-weight: 800;
    flex-shrink: 0;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 900px) {
    .panel-row.side-by-side { grid-template-columns: 1fr; }
    .app-body { padding: 16px; }
    .app-header { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
  }

  /* fade transition */
  .fade-in {
    animation: fadeIn 0.3s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* WYSIWYG cursor blink */
  .cursor-blink {
    display: inline-block;
    width: 2px; height: 14px;
    background: #333;
    margin-left: 1px;
    animation: blink 1s step-end infinite;
    vertical-align: middle;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .d2l-type-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .d2l-type-card {
    border: 2px solid var(--d2l-border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 0.75rem;
    text-align: center;
    cursor: pointer;
    background: white;
    color: #333;
    min-width: 80px;
    transition: all 0.15s;
  }
  .d2l-type-card:hover { border-color: var(--d2l-blue); color: var(--d2l-blue); }
  .d2l-type-card.selected { border-color: var(--d2l-blue); background: #e6f0fb; color: var(--d2l-blue); font-weight: 700; }
  .d2l-type-card .type-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
</style>

<body>

<header class="app-header">
  <div class="app-title">
    📄 D2L HTML Content Tutorial
    <span class="badge">FACULTY GUIDE</span>
  </div>
  <div class="mode-bar">
    <button class="mode-btn active" onclick="setMode('walkthrough')" id="btn-walkthrough">
      <span class="mode-icon">▶</span> Walkthrough
    </button>
    <button class="mode-btn" onclick="setMode('sidebyside')" id="btn-sidebyside">
      <span class="mode-icon">⊞</span> Side-by-Side
    </button>
    <button class="mode-btn" onclick="setMode('annotated')" id="btn-annotated">
      <span class="mode-icon">🏷</span> Annotated
    </button>
  </div>
</header>

<div class="app-body">

  <!-- Step Progress Bar -->
  <div class="step-track" id="stepTrack"></div>

  <!-- Content -->
  <div id="mainContent"></div>

</div>

<script>
// ─── STATE ───────────────────────────────────────────────
let currentMode = 'walkthrough';
let currentStep = 0;
let simState = {}; // tracks interactive states per step

// ─── STEP DEFINITIONS ────────────────────────────────────
const steps = [
  {
    id: 'overview',
    label: 'Overview',
    title: 'Embedding HTML5 in D2L Brightspace',
    subtitle: 'In this tutorial you\'ll learn to create a new Content page in D2L, switch the editor to HTML source view, and paste a complete HTML5 file with embedded CSS and JavaScript — so your interactive learning tools display right inside the course.',
    actions: [
      { text: 'Navigate to <span class="highlight">Content</span> in your course', num: '1' },
      { text: 'Create a new <span class="click-target">+ New</span> content item', num: '2' },
      { text: 'Switch the editor to <span class="highlight">HTML Source</span> view', num: '3' },
      { text: 'Paste your complete HTML5 code and save', num: '4' },
    ],
    tip: { type: 'tip', text: 'This workflow supports full HTML5 files with embedded CSS and JavaScript. No external hosting required — everything lives inside D2L.' },
    mockScreen: 'overview',
    annotations: []
  },
  {
    id: 'navigate',
    label: 'Go to Content',
    title: 'Step 1 — Navigate to the Content Tool',
    subtitle: 'Every D2L course has a Content area in the course navigation bar. This is where all modules, files, and pages live.',
    actions: [
      { text: 'Open your course in D2L Brightspace', num: '1' },
      { text: 'Look for the <span class="highlight">course navigation bar</span> below the course title', num: '2' },
      { text: 'Click <span class="click-target">Content</span> in the navigation tabs', num: '3' },
      { text: 'You\'ll see your Table of Contents (modules) on the left', num: '4' },
    ],
    tip: { type: 'tip', text: 'If you don\'t see "Content" in the nav bar, your institution may have renamed it to "Course Materials" or similar — look for the folder/document icon.' },
    mockScreen: 'content-home',
    annotations: [
      { x: '50%', y: '44px', label: 'Click Content here', num: 1 },
      { x: '18%', y: '120px', label: 'Module list (left sidebar)', num: 2 },
    ]
  },
  {
    id: 'newitem',
    label: 'New Content Item',
    title: 'Step 2 — Create a New Content Item',
    subtitle: 'Inside your target module, you\'ll add a new item. D2L offers several types — we want to create a blank "page" where we can paste our HTML.',
    actions: [
      { text: 'Select the <span class="highlight">module</span> where you want to add the content', num: '1' },
      { text: 'Click the <span class="click-target">New</span> button (or "Add Existing Activities")', num: '2' },
      { text: 'Choose <span class="highlight">Create a File</span> from the dropdown menu', num: '3' },
      { text: 'A new editor window will open', num: '4' },
    ],
    tip: { type: 'warn', text: 'Choose "Create a File" — not "Upload Files." We\'re building the content directly in the editor, not uploading a .html file from your computer.' },
    mockScreen: 'new-item-menu',
    annotations: [
      { x: '14px', y: '155px', label: 'Click "+ New" here', num: 1 },
      { x: '14px', y: '230px', label: 'Select "Create a File"', num: 2 },
    ]
  },
  {
    id: 'editor',
    label: 'The Editor',
    title: 'Step 3 — The D2L Content Editor',
    subtitle: 'D2L opens a rich-text WYSIWYG editor. By default it shows formatted text — but we need to access the HTML source to paste our code.',
    actions: [
      { text: 'Give your page a <span class="highlight">Title</span> in the title field at the top', num: '1' },
      { text: 'Look at the editor toolbar — find the <span class="click-target">&lt;/&gt;</span> or <span class="click-target">HTML Source</span> button', num: '2' },
      { text: 'The button is often at the far right or under a "More" menu', num: '3' },
      { text: 'Don\'t paste HTML into the WYSIWYG view — it won\'t render correctly', num: '4' },
    ],
    tip: { type: 'tip', text: 'In newer versions of D2L, the HTML source button looks like &lt;/&gt; and may be tucked into a "…" overflow menu in the toolbar.' },
    mockScreen: 'editor-wysiwyg',
    annotations: [
      { x: '94%', y: '170px', label: 'Find the </> button here', num: 1 },
      { x: '14px', y: '155px', label: 'Enter page title here', num: 2 },
    ]
  },
  {
    id: 'htmlview',
    label: 'Switch to HTML',
    title: 'Step 4 — Switch to HTML Source View',
    subtitle: 'Clicking the HTML source button transforms the editor into a code editor. This is where your entire HTML5 file content goes.',
    actions: [
      { text: 'Click <span class="click-target">&lt;/&gt;</span> in the toolbar to open HTML Source view', num: '1' },
      { text: 'The editor changes to a dark code area with monospace font', num: '2' },
      { text: '<span class="highlight">Select All</span> any existing content with <span class="kbd">Ctrl+A</span>', num: '3' },
      { text: 'You\'re now ready to paste your HTML', num: '4' },
    ],
    tip: { type: 'warn', text: 'D2L may insert default HTML like <body> tags. Select All and delete before pasting your own code to avoid conflicts.' },
    mockScreen: 'html-source',
    annotations: [
      { x: '6px', y: '158px', label: 'HTML source editor — paste code here', num: 1 },
    ]
  },
  {
    id: 'paste',
    label: 'Paste HTML',
    title: 'Step 5 — Paste Your HTML5 Content',
    subtitle: 'Now paste your complete HTML5 file. D2L accepts full documents with embedded CSS and JavaScript — your interactive content will render inside an iframe.',
    actions: [
      { text: 'Copy your entire HTML5 file content from your text editor', num: '1' },
      { text: 'Click inside the HTML source editor area to focus it', num: '2' },
      { text: 'Paste with <span class="kbd">Ctrl+V</span> (Windows) or <span class="kbd">Cmd+V</span> (Mac)', num: '3' },
      { text: 'Verify your code appears — look for your <span class="highlight">&lt;html&gt;</span>, <span class="highlight">&lt;style&gt;</span>, and <span class="highlight">&lt;script&gt;</span> tags', num: '4' },
    ],
    tip: { type: 'tip', text: 'Your HTML file should be self-contained: all CSS in <style> tags, all JavaScript in <script> tags, no external file references. D2L renders it in a sandboxed iframe.' },
    mockScreen: 'html-pasted',
    annotations: [
      { x: '6px', y: '158px', label: 'Your full HTML5 code goes here', num: 1 },
    ]
  },
  {
    id: 'save',
    label: 'Save & Preview',
    title: 'Step 6 — Save and Preview Your Content',
    subtitle: 'After pasting your code, switch back to WYSIWYG view to preview, then save. D2L will render your HTML5 page inside the content frame.',
    actions: [
      { text: 'Click <span class="click-target">&lt;/&gt;</span> again to toggle back to the WYSIWYG preview', num: '1' },
      { text: 'You should see your interactive content rendered in the editor', num: '2' },
      { text: 'Scroll to the bottom and click <span class="click-target">Save and Close</span>', num: '3' },
      { text: 'Your content item is now live — click it in the module to test', num: '4' },
    ],
    tip: { type: 'tip', text: 'If the preview looks blank in the editor, don\'t worry — some JavaScript won\'t run in the editor preview but will work fine when students open the actual content page.' },
    mockScreen: 'save-complete',
    annotations: [
      { x: '62%', y: '450px', label: 'Click Save and Close', num: 1 },
    ]
  },
  {
    id: 'done',
    label: 'Complete',
    title: 'Tutorial Complete!',
    subtitle: '',
    actions: [],
    tip: null,
    mockScreen: 'complete',
    annotations: []
  }
];

// ─── RENDER HELPERS ──────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  ['walkthrough','sidebyside','annotated'].forEach(m => {
    document.getElementById('btn-'+m).classList.toggle('active', m === mode);
  });
  renderCurrent();
}

function goStep(n) {
  currentStep = Math.max(0, Math.min(steps.length-1, n));
  simState = {};
  renderAll();
}

function renderAll() {
  renderStepTrack();
  renderCurrent();
}

function renderStepTrack() {
  const el = document.getElementById('stepTrack');
  el.innerHTML = steps.map((s, i) => {
    const isDone = i < currentStep;
    const isActive = i === currentStep;
    const connector = i < steps.length-1 ? `<div class="step-connector${isDone ? ' done' : ''}"></div>` : '';
    return `
      <div class="step-item">
        <div class="step-dot${isActive ? ' active' : ''}${isDone ? ' done' : ''}" onclick="goStep(${i})">
          <div class="step-num">${isDone ? '✓' : i+1}</div>
          <div class="step-label">${s.label}</div>
        </div>
        ${connector}
      </div>`;
  }).join('');
}

function renderCurrent() {
  const el = document.getElementById('mainContent');
  el.className = 'fade-in';
  const step = steps[currentStep];

  if (currentMode === 'walkthrough') {
    el.innerHTML = renderWalkthrough(step);
  } else if (currentMode === 'sidebyside') {
    el.innerHTML = renderSideBySide(step);
  } else {
    el.innerHTML = renderAnnotated(step);
  }

  // re-attach interactive handlers
  attachHandlers();
}

// ─── WALKTHROUGH MODE ─────────────────────────────────────
function renderWalkthrough(step) {
  if (step.id === 'done') return renderComplete();
  return `
    <div class="panel-row walkthrough">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-dot dot-blue"></div>
          <div class="panel-dot dot-green"></div>
          <div class="panel-dot dot-yellow"></div>
          D2L Brightspace — Interactive Simulation
        </div>
        <div class="d2l-mock" style="position:relative">
          ${renderMock(step.mockScreen)}
        </div>
      </div>
    </div>
    <div class="panel-row walkthrough">
      <div class="panel">
        <div class="instruction-panel">
          <div class="step-title">${step.title}</div>
          <div class="step-subtitle">${step.subtitle}</div>
          ${renderActions(step)}
          ${renderTip(step)}
          ${renderNavRow()}
        </div>
      </div>
    </div>`;
}

// ─── SIDE-BY-SIDE MODE ────────────────────────────────────
function renderSideBySide(step) {
  if (step.id === 'done') return renderComplete();
  return `
    <div class="panel-row side-by-side">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-dot dot-blue"></div>
          <div class="panel-dot dot-green"></div>
          <div class="panel-dot dot-yellow"></div>
          D2L Brightspace Simulation
        </div>
        <div class="d2l-mock" style="position:relative">
          ${renderMock(step.mockScreen)}
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <div class="panel-dot dot-green"></div>
          Step Instructions
        </div>
        <div class="instruction-panel">
          <div class="step-title">${step.title}</div>
          <div class="step-subtitle">${step.subtitle}</div>
          ${renderActions(step)}
          ${renderTip(step)}
          ${renderNavRow()}
        </div>
      </div>
    </div>`;
}

// ─── ANNOTATED MODE ───────────────────────────────────────
function renderAnnotated(step) {
  if (step.id === 'done') return renderComplete();
  return `
    <div class="panel-row annotated">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-dot dot-yellow"></div>
          Annotated Screenshot — ${step.label}
        </div>
        <div class="d2l-mock" style="position:relative; min-height:520px;">
          ${renderMock(step.mockScreen)}
          ${renderAnnotations(step)}
        </div>
        ${renderAnnotationLegend(step)}
      </div>
    </div>
    <div class="panel-row annotated">
      <div class="panel">
        <div class="instruction-panel">
          <div class="step-title">${step.title}</div>
          <div class="step-subtitle">${step.subtitle}</div>
          ${renderActions(step)}
          ${renderTip(step)}
          ${renderNavRow()}
        </div>
      </div>
    </div>`;
}

// ─── SHARED RENDERERS ─────────────────────────────────────
function renderActions(step) {
  if (!step.actions.length) return '';
  return `<ul class="action-list">
    ${step.actions.map((a, i) => `
      <li class="action-item${i === 0 ? ' current' : ''}">
        <div class="action-num">${a.num}</div>
        <div class="action-text">${a.text}</div>
      </li>`).join('')}
  </ul>`;
}

function renderTip(step) {
  if (!step.tip) return '';
  if (step.tip.type === 'tip') {
    return `<div class="tip-box"><div class="tip-label">💡 Pro Tip</div>${step.tip.text}</div>`;
  }
  return `<div class="warn-box"><div class="warn-label">⚠ Watch Out</div>${step.tip.text}</div>`;
}

function renderNavRow() {
  const isFirst = currentStep === 0;
  const isLast = currentStep === steps.length - 1;
  return `<div class="nav-row">
    <button class="nav-btn ghost" onclick="goStep(${currentStep-1})" ${isFirst ? 'disabled' : ''}>← Back</button>
    <button class="nav-btn primary" onclick="goStep(${currentStep+1})" ${isLast ? 'disabled' : ''}>
      ${currentStep === steps.length - 2 ? '🏁 Finish' : 'Next →'}
    </button>
    <span class="step-counter">Step ${currentStep+1} of ${steps.length}</span>
  </div>`;
}

function renderAnnotations(step) {
  if (!step.annotations || !step.annotations.length) return '';
  return step.annotations.map((a, i) => `
    <div class="callout" style="left:${a.x}; top:${a.y}; transform: translate(-50%,-50%);">
      <div class="callout-bubble">
        <span class="callout-num">${a.num}</span>${a.label}
      </div>
    </div>`).join('');
}

function renderAnnotationLegend(step) {
  if (!step.annotations || !step.annotations.length) return '';
  return `<div class="annotation-legend">
    ${step.annotations.map(a => `
      <div class="legend-item">
        <div class="legend-num">${a.num}</div>
        ${a.label}
      </div>`).join('')}
  </div>`;
}

function renderComplete() {
  return `
    <div class="panel">
      <div class="completion-card">
        <span class="completion-icon">🎉</span>
        <div class="completion-title">You're Ready to Go!</div>
        <div class="completion-sub">
          You now know how to create a D2L content page, switch to HTML source view, and embed a full HTML5 file with CSS and JavaScript directly in your course.
        </div>
        <div class="checklist">
          <div class="checklist-item"><span class="check-icon">✅</span> Navigate to the Content tool</div>
          <div class="checklist-item"><span class="check-icon">✅</span> Create a new file with "Create a File"</div>
          <div class="checklist-item"><span class="check-icon">✅</span> Access HTML source view via &lt;/&gt;</div>
          <div class="checklist-item"><span class="check-icon">✅</span> Paste a complete HTML5 document</div>
          <div class="checklist-item"><span class="check-icon">✅</span> Save and verify the content renders</div>
        </div>
        <div class="tip-box" style="max-width:500px;margin:0 auto 24px;text-align:left">
          <div class="tip-label">💡 Remember</div>
          Your HTML file must be <strong>self-contained</strong> — all CSS inside &lt;style&gt; tags, all JS inside &lt;script&gt; tags. D2L renders it in a sandboxed iframe, so external file references won't work.
        </div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
          <button class="nav-btn ghost" onclick="goStep(0)" style="font-family:'Outfit',sans-serif">↩ Restart Tutorial</button>
          <button class="nav-btn primary" onclick="goStep(1)" style="font-family:'Outfit',sans-serif">▶ Step Through Again</button>
        </div>
      </div>
    </div>`;
}

    case 'content-home':
      return topbar + `

// ─── SIM CLICK HANDLERS ───────────────────────────────────
function simClick(action) {
  switch(action) {
    case 'toggle-menu':
      simState['menu-open'] = !simState['menu-open'];
      renderCurrent();
      break;
    case 'select-create-file':
      goStep(currentStep + 1);
      break;
    case 'switch-to-html':
      goStep(currentStep + 1);
      break;
    case 'do-save':
      goStep(steps.length - 1);
      break;
    default:
      break;
  }
}

function attachHandlers() {
  // handlers are inline via onclick, nothing extra needed
}

// ─── INIT ─────────────────────────────────────────────────
renderAll();
